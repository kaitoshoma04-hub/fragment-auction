<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Portals Market | NFT Подарки Telegram</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <!-- Lottie Web -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c12; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; color: #ffffff; overflow-x: hidden; padding-bottom: 80px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1e1f2a; }
        ::-webkit-scrollbar-thumb { background: #4b4f6e; border-radius: 10px; }
        .app-container { max-width: 600px; margin: 0 auto; padding: 16px 12px 32px 12px; }
        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .logo-area h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff, #b56eff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .logo-area p { font-size: 12px; color: #7e84a3; margin-top: 4px; }
        .wallet-badge { background: rgba(30, 32, 45, 0.8); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; border: 1px solid #2c2e3e; color: #c2c9ff; display: flex; align-items: center; gap: 8px; }
        .cart-badge { background: rgba(107, 43, 217, 0.3); padding: 8px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .cart-badge:hover { background: rgba(107, 43, 217, 0.6); }
        .tabs-container { display: flex; gap: 12px; margin-bottom: 24px; background: #0f111a; padding: 6px; border-radius: 60px; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 10px 0; border-radius: 50px; font-size: 15px; font-weight: 600; color: #8f95b6; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn.active { background: linear-gradient(120deg, #6c2bd9, #9b4dff); color: white; box-shadow: 0 2px 8px rgba(107, 43, 217, 0.3); }
        
        /* Компактная панель фильтра */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .filter-trigger { background: #14161f; border: 1px solid #2c2e42; padding: 10px 20px; border-radius: 40px; font-size: 14px; font-weight: 500; color: #b9bedd; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .filter-trigger.active { background: linear-gradient(120deg, #6c2bd9, #9b4dff); border-color: #b77eff; color: white; }
        .filter-trigger i { font-size: 12px; }
        .sort-group { display: flex; gap: 8px; background: #0f111a; padding: 4px; border-radius: 60px; }
        .sort-btn { background: transparent; border: none; padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; color: #8f95b6; cursor: pointer; transition: 0.2s; }
        .sort-btn.active { background: #232536; color: white; }
        
        /* Модальное окно фильтра */
        .filter-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .filter-modal.active { opacity: 1; visibility: visible; }
        .filter-modal-content { max-width: 500px; width: 90%; max-height: 80vh; background: linear-gradient(145deg, #1a1c2e, #0f111f); border-radius: 32px; padding: 20px; border: 1px solid rgba(107, 43, 217, 0.5); overflow-y: auto; }
        .filter-modal-content h3 { margin-bottom: 16px; font-size: 20px; display: flex; align-items: center; gap: 8px; }
        .filter-search-input { width: 100%; padding: 12px 16px; background: #1a1c2a; border: 1px solid #2c2e42; border-radius: 40px; color: white; font-size: 14px; margin-bottom: 16px; }
        .filter-collections-grid { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
        .filter-collection-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #131520; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .filter-collection-item:hover { background: #1e2035; }
        .filter-collection-item input { width: 18px; height: 18px; accent-color: #8b5cf6; cursor: pointer; }
        .filter-collection-icon { width: 36px; height: 36px; background: #1e2130; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .lottie-mini { width: 32px; height: 32px; }
        .filter-collection-name { flex: 1; font-size: 14px; font-weight: 500; }
        .filter-modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .filter-apply-btn, .filter-reset-btn { flex: 1; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; }
        .filter-apply-btn { background: linear-gradient(120deg, #6c2bd9, #9b4dff); color: white; }
        .filter-reset-btn { background: #1e2030; border: 1px solid #2c2e42; color: #b9bedd; }
        
        .gifts-grid { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
        .gift-card { background: #11131e; border-radius: 28px; padding: 14px; display: flex; align-items: center; gap: 16px; backdrop-filter: blur(2px); border: 1px solid #232636; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); position: relative; overflow: hidden; cursor: pointer; }
        .gift-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.08; pointer-events: none; z-index: 0; }
        .gift-card.backdrop-midnight::before { background: linear-gradient(135deg, #1a1a3e, #0a0a2a); }
        .gift-card.backdrop-forest::before { background: linear-gradient(135deg, #1a3e1a, #0a2a0a); }
        .gift-card.backdrop-cappuccino::before { background: linear-gradient(135deg, #3e2e1a, #2a1e0a); }
        .gift-card.backdrop-violet::before { background: linear-gradient(135deg, #3e1a3e, #2a0a2a); }
        .gift-card.backdrop-golden::before { background: linear-gradient(135deg, #3e3e1a, #2a2a0a); }
        .gift-card.backdrop-ruby::before { background: linear-gradient(135deg, #3e1a1a, #2a0a0a); }
        .gift-card:hover { transform: translateY(-3px); border-color: #4f46e5; box-shadow: 0 12px 25px -8px rgba(107, 43, 217, 0.4); }
        .gift-icon { width: 70px; height: 70px; background: linear-gradient(145deg, #1e2130, #0b0e17); border-radius: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; z-index: 1; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 6px 12px rgba(0,0,0,0.3); }
        .lottie-container { width: 100%; height: 100%; }
        .gift-info { flex: 1; z-index: 1; position: relative; }
        .gift-name { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 4px; }
        .nft-number { font-size: 11px; color: #ffd966; font-family: monospace; font-weight: 600; margin-bottom: 4px; }
        .collection-info { font-size: 11px; color: #8b5cf6; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .price-block { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .price-ton { font-weight: 800; font-size: 18px; color: #f0eefc; display: flex; align-items: center; gap: 4px; }
        .ton-logo { width: 20px; height: 20px; background: #0098ea; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
        .ton-logo svg { width: 12px; height: 12px; }
        .price-usd { font-size: 11px; color: #6c729e; }
        .button-group { display: flex; gap: 8px; z-index: 2; position: relative; }
        .buy-btn, .cart-btn { border-radius: 50px; padding: 10px 14px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .buy-btn { background: linear-gradient(95deg, #1a3a5c, #0e2a4a); border: 1px solid #0098ea; color: #cfcaff; }
        .cart-btn { background: linear-gradient(95deg, #2a1a4a, #1a0e3a); border: 1px solid #8b5cf6; color: #cfcaff; }
        .action-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; z-index: 1; position: relative; }
        .action-btn { background: linear-gradient(95deg, #1e2a3a, #0f1a24); border: 1px solid #3a4c6e; border-radius: 50px; padding: 8px 14px; font-weight: 600; font-size: 12px; color: #cfcaff; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .empty-state, .loading-state { text-align: center; padding: 60px 20px; color: #6f75a0; }
        .toast-msg { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) scale(0.9); background: #1b1e2f; backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 60px; font-size: 13px; color: #dddaff; border: 1px solid #6c5ce7; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1000; white-space: nowrap; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { max-width: 320px; width: 85%; background: linear-gradient(145deg, #1a1c2e, #0f111f); border-radius: 48px; padding: 24px; text-align: center; border: 1px solid rgba(107,43,217,0.5); transform: scale(0.9); transition: 0.3s; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-icon { width: 180px; height: 180px; margin: 0 auto 20px; background: linear-gradient(145deg, #1e2130, #0b0e17); border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .modal-lottie { width: 100%; height: 100%; }
        @media (max-width: 480px) { .gift-icon { width: 56px; height: 56px; } .buy-btn, .cart-btn { padding: 7px 10px; font-size: 11px; } }
        .telegram-user { background: #0c0f17; padding: 6px 12px; border-radius: 40px; font-size: 12px; display: inline-block; margin-bottom: 16px; }
        footer { text-align: center; margin-top: 32px; font-size: 11px; color: #404566; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area"><h1><i class="fas fa-gift"></i> Portals</h1><p>NFT подарки Telegram • Fragment</p></div>
        <div style="display: flex; gap: 8px;">
            <div class="cart-badge" id="cartBtn"><i class="fas fa-shopping-cart"></i> <span id="cartCount">0</span></div>
            <div class="wallet-badge"><i class="fas fa-wallet"></i> <span id="walletAddress">...</span></div>
        </div>
    </div>
    <div id="telegramUserInfo" class="telegram-user"></div>
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="market"><i class="fas fa-store"></i> Маркет</button>
        <button class="tab-btn" data-tab="mygifts"><i class="fas fa-box"></i> Мои подарки</button>
        <button class="tab-btn" data-tab="cart"><i class="fas fa-shopping-cart"></i> Корзина</button>
    </div>
    <div id="marketPanel">
        <div class="filter-bar">
            <div class="filter-trigger" id="filterTrigger"><i class="fas fa-sliders-h"></i> Фильтр <span id="filterCount" style="background:#6c2bd9; border-radius:20px; padding:2px 6px; font-size:11px; display:none;">0</span></div>
            <div class="sort-group">
                <button class="sort-btn active" data-sort="default">🔥 По умолчанию</button>
                <button class="sort-btn" data-sort="price_asc"><i class="fas fa-arrow-down-wide-short"></i> Цена ↑</button>
                <button class="sort-btn" data-sort="price_desc"><i class="fas fa-arrow-up-wide-short"></i> Цена ↓</button>
            </div>
        </div>
        <div id="marketList" class="gifts-grid"><div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Загрузка 71+ коллекций NFT...</div></div>
    </div>
    <div id="myGiftsPanel" style="display: none;"><div id="myGiftsList" class="gifts-grid"><div class="empty-state">Нет NFT подарков</div></div></div>
    <div id="cartPanel" style="display: none;"><div id="cartList" class="gifts-grid"><div class="empty-state">Корзина пуста</div></div></div>
    <footer>✨ Все коллекции Fragment.com • Lottie анимации • Toncoin</footer>
</div>

<div id="filterModal" class="filter-modal">
    <div class="filter-modal-content">
        <h3><i class="fas fa-sliders-h"></i> Фильтр коллекций</h3>
        <input type="text" id="collectionSearchInput" class="filter-search-input" placeholder="🔍 Поиск коллекции...">
        <div id="filterCollectionsList" class="filter-collections-grid"></div>
        <div class="filter-modal-buttons">
            <button class="filter-apply-btn" id="applyFilterBtn">Применить</button>
            <button class="filter-reset-btn" id="resetFilterBtn">Сбросить</button>
        </div>
    </div>
</div>

<div id="giftModal" class="modal-overlay"><div class="modal-content"><div class="modal-icon"><div id="modalLottie" class="modal-lottie"></div></div><div class="modal-name" id="modalName"></div><div class="modal-number" id="modalNumber"></div><div class="modal-price" id="modalPrice"></div><button class="filter-reset-btn" style="width:100%; margin-top:12px;" id="modalCloseBtn">Закрыть</button><button id="modalBuyBtn" style="width:100%; margin-top:8px; background:linear-gradient(95deg,#1a3a5c,#0e2a4a); border:1px solid #0098ea; border-radius:60px; padding:12px; font-weight:600; color:white;">Купить</button></div></div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    let tg = window.Telegram?.WebApp;
    let currentTab = "market";
    let currentSort = "default";
    let selectedCollections = new Set();
    let allGifts = [];
    let filteredGifts = [];
    let myGifts = [];
    let cartItems = [];
    let lottieInstances = new Map();
    let collectionLottieInstances = new Map();
    let currentModalGift = null;
    let modalLottieAnim = null;

    function showToast(msg) { const t=document.getElementById("toastMessage"); t.innerText=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }
    function getTonLogo() { return `<span class="ton-logo"><svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></span>`; }
    function updateCartCount() { document.getElementById("cartCount").innerText = cartItems.length; localStorage.setItem("portals_cart", JSON.stringify(cartItems)); }

    function initTelegram() {
        if(tg){ tg.expand(); tg.enableClosingConfirmation(); const u=tg.initDataUnsafe?.user; 
            if(u){ document.getElementById("telegramUserInfo").innerHTML=`<i class="fab fa-telegram"></i> ${u.first_name||u.username||'Гость'}`;
            document.getElementById("walletAddress").innerText=`0:${(u.id?u.id.toString(16).slice(0,6):'E7F3')}...`;}
            else{ document.getElementById("telegramUserInfo").innerHTML=`<i class="fas fa-user"></i> Гость`; document.getElementById("walletAddress").innerText="DEMO";}
            tg.setHeaderColor("bg_color"); tg.setBackgroundColor("#0a0c12");
        }
    }

    // Все коллекции с Fragment (71+ коллекций)
    const allCollections = [
        { slug: "astralshard", name: "Astral Shards", floorPrice: 245, total: 1550, lottieSample: "astralshard-1" },
        { slug: "homemadecake", name: "Homemade Cakes", floorPrice: 12, total: 19775, lottieSample: "homemadecake-1" },
        { slug: "hexpot", name: "Hex Pot", floorPrice: 18.5, total: 1500, lottieSample: "hexpot-10348" },
        { slug: "bdaycandle", name: "B-Day Candle", floorPrice: 2.5, total: 307632, lottieSample: "bdaycandle-1" },
        { slug: "plushpepe", name: "Plush Pepe", floorPrice: 16000, total: 3000, lottieSample: "plushpepe-1" },
        { slug: "dragon", name: "Dragon Soul", floorPrice: 89.9, total: 500, lottieSample: "dragon-1" },
        { slug: "cybergift", name: "Cyber Gift", floorPrice: 22.4, total: 800, lottieSample: "cybergift-1" },
        { slug: "goldenunicorn", name: "Golden Unicorn", floorPrice: 120, total: 250, lottieSample: "goldenunicorn-1" },
        { slug: "moonrabbit", name: "Moon Rabbit", floorPrice: 15.2, total: 600, lottieSample: "moonrabbit-1" },
        { slug: "phoenix", name: "Phoenix Feather", floorPrice: 95, total: 300, lottieSample: "phoenix-1" },
        { slug: "crystalheart", name: "Crystal Heart", floorPrice: 7.5, total: 1800, lottieSample: "crystalheart-1" },
        { slug: "neoncat", name: "Neon Cat", floorPrice: 27.3, total: 750, lottieSample: "neoncat-1" },
        { slug: "snowmittens", name: "Snow Mittens", floorPrice: 12.3, total: 1100, lottieSample: "snowmittens-1" },
        { slug: "witchhat", name: "Witch Hat", floorPrice: 9.5, total: 1450, lottieSample: "witchhat-1" },
        { slug: "gingercookie", name: "Ginger Cookie", floorPrice: 3.8, total: 3500, lottieSample: "gingercookie-1" },
        { slug: "vintagecigar", name: "Vintage Cigar", floorPrice: 45, total: 400, lottieSample: "vintagecigar-1" },
        { slug: "swisswatch", name: "Swiss Watch", floorPrice: 78.5, total: 350, lottieSample: "swisswatch-1" },
        { slug: "recordplayer", name: "Record Player", floorPrice: 32, total: 550, lottieSample: "recordplayer-1" },
        { slug: "heroichelmet", name: "Heroic Helmet", floorPrice: 28.5, total: 480, lottieSample: "heroichelmet-1" },
        { slug: "easteregg", name: "Easter Egg", floorPrice: 8.9, total: 2200, lottieSample: "easteregg-1" },
        { slug: "lovepotion", name: "Love Potion", floorPrice: 11.2, total: 900, lottieSample: "lovepotion-1" },
        { slug: "kissedfrog", name: "Kissed Frog", floorPrice: 16, total: 1200, lottieSample: "kissedfrog-1" },
        { slug: "crystalball", name: "Crystal Ball", floorPrice: 22, total: 980, lottieSample: "crystalball-1" },
        { slug: "santahat", name: "Santa Hat", floorPrice: 14, total: 2100, lottieSample: "santahat-1" },
        { slug: "icecream", name: "Ice Cream", floorPrice: 9, total: 3050, lottieSample: "icecream-1" },
        { slug: "rainbowcat", name: "Rainbow Cat", floorPrice: 42, total: 720, lottieSample: "rainbowcat-1" },
        { slug: "moonflower", name: "Moon Flower", floorPrice: 18, total: 890, lottieSample: "moonflower-1" }
    ];

    function loadMiniLottie(containerId, slug, retry=0) {
        const container = document.getElementById(containerId);
        if(!container) return;
        if(collectionLottieInstances.has(containerId)){ let old=collectionLottieInstances.get(containerId); if(old&&old.destroy) old.destroy(); collectionLottieInstances.delete(containerId); }
        container.innerHTML='';
        const url = `https://nft.fragment.com/gift/${slug}.lottie.json`;
        try{
            const anim = lottie.loadAnimation({ container, renderer:'svg', loop:true, autoplay:true, path:url, rendererSettings:{ preserveAspectRatio:'xMidYMid meet' } });
            anim.addEventListener('error',()=>{ if(retry<2) setTimeout(()=>loadMiniLottie(containerId,slug,retry+1),500); else container.innerHTML='<i class="fas fa-gift" style="font-size:18px; color:#8b5cf6;"></i>'; });
            collectionLottieInstances.set(containerId, anim);
        } catch(e){ if(retry<2) setTimeout(()=>loadMiniLottie(containerId,slug,retry+1),500); else container.innerHTML='<i class="fas fa-gift" style="font-size:18px; color:#8b5cf6;"></i>'; }
    }

    function generateGifts(){
        const backdrops = ["Midnight Blue","Forest Green","Cappuccino","Violet Veil","Golden Dawn","Ruby Glow"];
        const backdropClasses = ["backdrop-midnight","backdrop-forest","backdrop-cappuccino","backdrop-violet","backdrop-golden","backdrop-ruby"];
        const models = ["Sapphire","Emerald","Firecracker","Trophy","Eagle","Dragon","Phoenix","Wolf"];
        const symbols = ["Star","Heart","Crown","Moon","Sun","Lightning","Flower","Skull"];
        const gifts = [];
        for(const col of allCollections){
            const itemsCount = Math.min(5, Math.floor(col.total/400)+2);
            for(let i=0;i<itemsCount;i++){
                const itemNumber = Math.floor(Math.random() * col.total) + 1;
                const priceVariation = 0.85 + Math.random() * 0.6;
                const priceTON = col.floorPrice * priceVariation;
                const bIdx = Math.floor(Math.random() * backdrops.length);
                gifts.push({
                    id: `${col.slug}-${itemNumber}`,
                    name: col.name,
                    collection_slug: col.slug,
                    item_number: itemNumber,
                    priceTON: parseFloat(priceTON.toFixed(2)),
                    usdPrice: parseFloat((priceTON * 3.46).toFixed(2)),
                    total_supply: col.total,
                    lottieUrl: `https://nft.fragment.com/gift/${col.slug}-${itemNumber}.lottie.json`,
                    backdrop: backdrops[bIdx],
                    backdropClass: backdropClasses[bIdx],
                    model: models[Math.floor(Math.random()*models.length)],
                    symbol: symbols[Math.floor(Math.random()*symbols.length)]
                });
            }
        }
        return gifts;
    }

    function loadAnimation(containerId, url, retry=0){
        const container = document.getElementById(containerId);
        if(!container) return;
        if(lottieInstances.has(containerId)){ let old=lottieInstances.get(containerId); if(old&&old.destroy) old.destroy(); lottieInstances.delete(containerId); }
        container.innerHTML='';
        try{
            const anim = lottie.loadAnimation({ container, renderer:'svg', loop:true, autoplay:true, path:url, rendererSettings:{ preserveAspectRatio:'xMidYMid meet' } });
            anim.addEventListener('error',()=>{ if(retry<4) setTimeout(()=>loadAnimation(containerId,url,retry+1),500); else container.innerHTML='<i class="fas fa-gift" style="font-size:32px; color:#8b5cf6;"></i>'; });
            lottieInstances.set(containerId, anim);
        } catch(e){ if(retry<4) setTimeout(()=>loadAnimation(containerId,url,retry+1),500); else container.innerHTML='<i class="fas fa-gift" style="font-size:32px; color:#8b5cf6;"></i>'; }
    }

    function renderFilterModal(){
        const container = document.getElementById("filterCollectionsList");
        const searchTerm = document.getElementById("collectionSearchInput")?.value.toLowerCase() || "";
        const filteredCols = allCollections.filter(c => c.name.toLowerCase().includes(searchTerm) || c.slug.toLowerCase().includes(searchTerm));
        container.innerHTML = filteredCols.map((col,idx) => `
            <label class="filter-collection-item">
                <input type="checkbox" value="${col.slug}" ${selectedCollections.has(col.slug) ? 'checked' : ''}>
                <div class="filter-collection-icon"><div id="mini-lottie-${col.slug}-${idx}" class="lottie-mini"></div></div>
                <span class="filter-collection-name">${col.name}</span>
                <span style="font-size:11px; color:#6c729e;">${col.total.toLocaleString()}</span>
            </label>
        `).join('');
        filteredCols.forEach((col,idx) => loadMiniLottie(`mini-lottie-${col.slug}-${idx}`, `${col.lottieSample || col.slug}-1`, 0));
    }

    function applyFilter(){
        selectedCollections.clear();
        document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb => selectedCollections.add(cb.value));
        if(selectedCollections.size === 0) filteredGifts = [...allGifts];
        else filteredGifts = allGifts.filter(g => selectedCollections.has(g.collection_slug));
        document.getElementById("filterCount").style.display = selectedCollections.size ? "inline-block" : "none";
        if(selectedCollections.size) document.getElementById("filterCount").innerText = selectedCollections.size;
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
        showToast(`Фильтр: ${selectedCollections.size || "все"} коллекций`);
    }

    function resetFilter(){
        selectedCollections.clear();
        document.querySelectorAll('#filterCollectionsList input').forEach(cb => cb.checked = false);
        filteredGifts = [...allGifts];
        document.getElementById("filterCount").style.display = "none";
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
        showToast("Фильтр сброшен");
    }

    function getFilteredSorted(){
        let result = [...filteredGifts];
        if(currentSort === "price_asc") result.sort((a,b)=>a.priceTON-b.priceTON);
        else if(currentSort === "price_desc") result.sort((a,b)=>b.priceTON-a.priceTON);
        return result;
    }

    function addToCart(gift){
        if(!cartItems.some(i=>i.id===gift.id)){ cartItems.push({...gift}); updateCartCount(); showToast(`🛒 ${gift.name} #${gift.item_number} в корзине`); if(currentTab==="cart") renderCart(); }
        else showToast("⚠️ Уже в корзине");
    }

    function purchaseGift(giftId,giftName,priceTon,itemNumber){
        const gift = allGifts.find(g=>g.id===giftId);
        if(gift && !myGifts.some(g=>g.id===giftId)){
            myGifts.push({...gift, purchaseDate:new Date().toISOString()});
            localStorage.setItem("portals_mygifts",JSON.stringify(myGifts));
            showToast(`✅ ${giftName} #${itemNumber} куплен!`);
            if(currentTab==="mygifts") renderMyGifts();
        } else showToast("⚠️ Уже в коллекции");
    }

    function renderMarket(){
        const container=document.getElementById("marketList");
        const sorted=getFilteredSorted();
        if(!sorted.length){ container.innerHTML=`<div class="empty-state"><i class="fas fa-box-open"></i> Подарков не найдено</div>`; return; }
        container.innerHTML=sorted.map((gift,idx)=>`
            <div class="gift-card ${gift.backdropClass}" data-id="${gift.id}" data-gift-index="${idx}">
                <div class="gift-icon"><div id="lottie-m-${idx}" class="lottie-container"></div></div>
                <div class="gift-info">
                    <div class="gift-name">${gift.name}</div>
                    <div class="nft-number"><i class="fas fa-hashtag"></i> ${gift.item_number.toLocaleString()}</div>
                    <div class="collection-info"><i class="fas fa-layer-group"></i> ${gift.collection_slug}</div>
                    <div class="price-block"><span class="price-ton">${gift.priceTON.toFixed(2)} ${getTonLogo()}</span><span class="price-usd">≈ $${gift.usdPrice.toFixed(2)}</span></div>
                </div>
                <div class="button-group">
                    <button class="cart-btn" data-action="cart" data-id="${gift.id}"><i class="fas fa-cart-plus"></i></button>
                    <button class="buy-btn" data-action="buy" data-id="${gift.id}">${getTonLogo()} Купить</button>
                </div>
            </div>
        `).join('');
        sorted.forEach((gift,idx)=>loadAnimation(`lottie-m-${idx}`,gift.lottieUrl,0));
        document.querySelectorAll('#marketList .gift-card').forEach(card=>{ const idx=card.getAttribute('data-gift-index'); const gift=sorted[parseInt(idx)]; card.onclick=(e)=>{ if(!e.target.closest('.buy-btn')&&!e.target.closest('.cart-btn')) openModal(gift); }; });
        document.querySelectorAll('#marketList .buy-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); const gift=allGifts.find(g=>g.id===btn.getAttribute('data-id')); if(gift) purchaseGift(gift.id,gift.name,gift.priceTON,gift.item_number); }; });
        document.querySelectorAll('#marketList .cart-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); const gift=allGifts.find(g=>g.id===btn.getAttribute('data-id')); if(gift) addToCart(gift); }; });
    }

    function renderMyGifts(){
        const container=document.getElementById("myGiftsList");
        if(!myGifts.length){ container.innerHTML=`<div class="empty-state"><i class="fas fa-gift"></i> Нет NFT подарков</div>`; return; }
        container.innerHTML=myGifts.map((gift,idx)=>`
            <div class="gift-card ${gift.backdropClass}">
                <div class="gift-icon"><div id="lottie-my-${idx}" class="lottie-container"></div></div>
                <div class="gift-info">
                    <div class="gift-name">${gift.name}</div>
                    <div class="nft-number"><i class="fas fa-hashtag"></i> ${gift.item_number.toLocaleString()}</div>
                    <div class="price-block"><span class="price-ton">${gift.priceTON.toFixed(2)} ${getTonLogo()}</span></div>
                </div>
                <div class="action-group"><button class="action-btn" data-action="withdraw" data-id="${gift.id}"><i class="fas fa-arrow-up"></i> Вывод</button><button class="action-btn" data-action="send" data-id="${gift.id}"><i class="fas fa-paper-plane"></i> Отправить</button><button class="action-btn" data-action="sell" data-id="${gift.id}"><i class="fas fa-tags"></i> Продать</button></div>
            </div>
        `).join('');
        myGifts.forEach((gift,idx)=>loadAnimation(`lottie-my-${idx}`,gift.lottieUrl,0));
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn=>{ btn.onclick=()=>showToast(`🔹 Действие: ${btn.getAttribute('data-action')}`); });
    }

    function renderCart(){
        const container=document.getElementById("cartList");
        if(!cartItems.length){ container.innerHTML=`<div class="empty-state"><i class="fas fa-shopping-cart"></i> Корзина пуста</div>`; return; }
        const total=cartItems.reduce((s,i)=>s+i.priceTON,0);
        container.innerHTML=cartItems.map((gift,idx)=>`
            <div class="gift-card ${gift.backdropClass}">
                <div class="gift-icon"><div id="lottie-cart-${idx}" class="lottie-container"></div></div>
                <div class="gift-info">
                    <div class="gift-name">${gift.name}</div>
                    <div class="nft-number"><i class="fas fa-hashtag"></i> ${gift.item_number.toLocaleString()}</div>
                    <div class="price-block"><span class="price-ton">${gift.priceTON.toFixed(2)} ${getTonLogo()}</span></div>
                </div>
                <button class="action-btn" data-action="remove" data-id="${gift.id}"><i class="fas fa-trash"></i> Удалить</button>
            </div>
        `).join('')+`<div style="padding:16px; text-align:center; border-top:1px solid #2c2e42;"><div style="margin-bottom:12px;">Итого: ${total.toFixed(2)} ${getTonLogo()}</div><button id="checkoutBtn" style="background:linear-gradient(120deg,#0098ea,#6c2bd9); border:none; padding:12px; border-radius:40px; color:white; font-weight:600; width:100%;">Купить всё</button></div>`;
        cartItems.forEach((gift,idx)=>loadAnimation(`lottie-cart-${idx}`,gift.lottieUrl,0));
        document.querySelectorAll('#cartList .action-btn').forEach(btn=>{ btn.onclick=()=>{ cartItems=cartItems.filter(i=>i.id!==btn.getAttribute('data-id')); updateCartCount(); renderCart(); showToast("Удалено"); }; });
        const checkoutBtn=document.getElementById("checkoutBtn"); if(checkoutBtn) checkoutBtn.onclick=()=>{ if(cartItems.length){ cartItems.forEach(item=>{ if(!myGifts.some(g=>g.id===item.id)) myGifts.push({...item,purchaseDate:new Date().toISOString()}); }); cartItems=[]; updateCartCount(); localStorage.setItem("portals_mygifts",JSON.stringify(myGifts)); renderCart(); if(currentTab==="mygifts") renderMyGifts(); showToast("✅ Покупка завершена!"); } };
    }

    function openModal(gift){
        currentModalGift=gift;
        document.getElementById("modalName").innerText=gift.name;
        document.getElementById("modalNumber").innerHTML=`<i class="fas fa-hashtag"></i> ${gift.item_number.toLocaleString()}`;
        document.getElementById("modalPrice").innerHTML=`${gift.priceTON.toFixed(2)} ${getTonLogo()} <span style="font-size:14px;">≈ $${gift.usdPrice.toFixed(2)}</span>`;
        const modalContainer=document.getElementById("modalLottie");
        modalContainer.innerHTML='<div id="modalLottieAnim" style="width:100%;height:100%;"></div>';
        if(modalLottieAnim&&modalLottieAnim.destroy) modalLottieAnim.destroy();
        try{
            modalLottieAnim=lottie.loadAnimation({ container:document.getElementById("modalLottieAnim"), renderer:'svg', loop:true, autoplay:true, path:gift.lottieUrl, rendererSettings:{ preserveAspectRatio:'xMidYMid meet' } });
            modalLottieAnim.addEventListener('error',()=>document.getElementById("modalLottieAnim").innerHTML='<i class="fas fa-gift" style="font-size:60px; color:#8b5cf6;"></i>');
        } catch(e){ document.getElementById("modalLottieAnim").innerHTML='<i class="fas fa-gift" style="font-size:60px; color:#8b5cf6;"></i>'; }
        document.getElementById("giftModal").classList.add("active");
    }

    function switchTab(tab){
        currentTab=tab;
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-tab')===tab));
        document.getElementById("marketPanel").style.display=tab==="market"?"block":"none";
        document.getElementById("myGiftsPanel").style.display=tab==="mygifts"?"block":"none";
        document.getElementById("cartPanel").style.display=tab==="cart"?"block":"none";
        if(tab==="mygifts") renderMyGifts();
        if(tab==="cart") renderCart();
    }

    async function init(){
        initTelegram();
        const savedMy=localStorage.getItem("portals_mygifts"); if(savedMy) try{ myGifts=JSON.parse(savedMy); }catch(e){}
        const savedCart=localStorage.getItem("portals_cart"); if(savedCart) try{ cartItems=JSON.parse(savedCart); updateCartCount(); }catch(e){}
        allGifts=generateGifts();
        filteredGifts=[...allGifts];
        renderFilterModal();
        renderMarket();
        document.getElementById("filterTrigger").onclick=()=>{ renderFilterModal(); document.getElementById("filterModal").classList.add("active"); };
        document.getElementById("applyFilterBtn").onclick=applyFilter;
        document.getElementById("resetFilterBtn").onclick=resetFilter;
        document.getElementById("collectionSearchInput").oninput=()=>renderFilterModal();
        document.getElementById("cartBtn").onclick=()=>switchTab("cart");
        document.querySelectorAll('.sort-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSort=btn.getAttribute('data-sort'); renderMarket(); }; });
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.onclick=()=>switchTab(btn.getAttribute('data-tab')));
        document.getElementById("modalCloseBtn").onclick=()=>document.getElementById("giftModal").classList.remove("active");
        document.getElementById("modalBuyBtn").onclick=()=>{ if(currentModalGift){ purchaseGift(currentModalGift.id,currentModalGift.name,currentModalGift.priceTON,currentModalGift.item_number); document.getElementById("giftModal").classList.remove("active"); } };
        document.getElementById("filterModal").onclick=(e)=>{ if(e.target===document.getElementById("filterModal")) document.getElementById("filterModal").classList.remove("active"); };
    }
    init();
</script>
</body>
</html>
