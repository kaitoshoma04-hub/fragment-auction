<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>TON Gifts | Telegram NFT Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #05050A; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; 
            color: #FFFFFF; 
            overflow-x: hidden; 
            padding-bottom: 80px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111115; }
        ::-webkit-scrollbar-thumb { background: #2c2c3a; border-radius: 10px; }
        
        .app-container { max-width: 600px; margin: 0 auto; padding: 16px 12px 32px 12px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .logo-area h1 { font-size: 28px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; }
        
        .right-header { display: flex; gap: 8px; align-items: center; }
        .lang-switch { background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 40px; display: flex; gap: 6px; cursor: pointer; border: 1px solid #2a2a3a; transition: 0.2s; }
        .lang-switch:hover { border-color: #A855F7; }
        .lang-flag { font-size: 16px; }
        .lang-text { font-size: 12px; font-weight: 500; color: #ccc; }
        .cart-badge { background: rgba(168, 85, 247, 0.2); backdrop-filter: blur(8px); padding: 6px 14px; border-radius: 40px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; border: 1px solid rgba(168, 85, 247, 0.3); }
        .cart-badge:hover { background: rgba(168, 85, 247, 0.4); transform: scale(1.02); }
        
        .user-profile { display: flex; align-items: center; gap: 12px; background: #0C0C12; padding: 8px 16px; border-radius: 60px; margin-bottom: 16px; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .user-profile:hover { border-color: #A855F7; background: #111118; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #A855F7, #7C3AED); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-avatar i { font-size: 20px; color: white; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-handle { font-size: 11px; color: #888; }
        
        .tabs-container { display: flex; gap: 6px; margin-bottom: 20px; background: #0C0C12; padding: 5px; border-radius: 60px; border: 1px solid #1e1e28; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 10px 0; border-radius: 50px; font-size: 13px; font-weight: 600; color: #6c6c8a; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: linear-gradient(95deg, #1a1a2e, #0f0f1a); color: white; box-shadow: 0 0 0 1px rgba(168,85,247,0.4); }
        
        .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .filter-trigger { background: #0C0C12; border: 1px solid #252530; padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; color: #ddd; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .filter-trigger:hover { border-color: #A855F7; }
        .sort-group { display: flex; gap: 6px; background: #0C0C12; padding: 3px; border-radius: 60px; border: 1px solid #22222c; }
        .sort-btn { background: transparent; border: none; padding: 6px 14px; border-radius: 40px; font-size: 12px; font-weight: 500; color: #8f8faa; cursor: pointer; transition: 0.2s; }
        .sort-btn.active { background: #1E1E2C; color: white; }
        .refresh-btn { background: #0C0C12; border: 1px solid #2a2a3a; border-radius: 40px; padding: 6px 10px; cursor: pointer; }
        
        .filter-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(16px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .filter-modal.active { opacity: 1; visibility: visible; }
        .filter-modal-content { max-width: 500px; width: 90%; max-height: 80vh; background: #0C0C14; border-radius: 32px; padding: 20px; border: 1px solid #2a2a3a; overflow-y: auto; }
        .filter-collections-grid { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
        .filter-collection-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #111117; border-radius: 20px; cursor: pointer; border: 1px solid #1e1e28; transition: 0.2s; }
        .filter-collection-item:hover { background: #1a1a24; border-color: #A855F7; }
        .filter-collection-icon { width: 36px; height: 36px; background: #0a0a10; border-radius: 14px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .filter-mini-lottie { width: 32px; height: 32px; }
        .filter-apply-btn, .filter-reset-btn { flex: 1; padding: 12px; border-radius: 60px; font-weight: 700; cursor: pointer; border: none; font-size: 14px; }
        .filter-apply-btn { background: linear-gradient(95deg, #A855F7, #7C3AED); color: white; }
        .filter-reset-btn { background: #1A1A24; border: 1px solid #2c2c3a; color: #ccc; }
        
        .gifts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
        .gift-card { background: #0C0C14; border-radius: 24px; padding: 14px 10px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px; border: 1px solid #1E1E2C; transition: all 0.25s ease; cursor: pointer; }
        .gift-card:hover { transform: translateY(-3px); border-color: #A855F7; background: #0F0F18; }
        .gift-icon { width: 100px; height: 100px; background: linear-gradient(145deg, #111118, #08080e); border-radius: 28px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .lottie-container { width: 100%; height: 100%; }
        .gift-name { font-size: 14px; font-weight: 700; text-align: center; }
        .collection-badge { font-size: 9px; color: #A855F7; background: rgba(168,85,247,0.15); padding: 2px 8px; border-radius: 20px; }
        .nft-number { font-size: 10px; color: #888; font-family: monospace; }
        .price-block { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 4px 0; }
        .price-ton { font-weight: 800; font-size: 16px; color: #F0F0FF; display: flex; align-items: center; gap: 4px; }
        .price-ton i { font-size: 12px; color: #0088cc; }
        .price-usd { font-size: 10px; color: #6c6c8a; }
        .button-group { display: flex; gap: 8px; width: 100%; justify-content: center; margin-top: 4px; }
        .buy-btn { background: transparent; border: 1.5px solid white; border-radius: 40px; padding: 6px 14px; font-weight: 600; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; gap: 4px; transition: all 0.2s ease; }
        .buy-btn:hover { background: white; color: #0a0a10; }
        .cart-btn { background: transparent; border: 1.5px solid white; border-radius: 40px; padding: 6px 14px; font-weight: 600; font-size: 11px; cursor: pointer; color: white; display: flex; align-items: center; gap: 4px; transition: all 0.2s ease; }
        .cart-btn:hover { background: white; color: #0a0a10; }
        .action-btn { border-radius: 40px; padding: 8px 16px; font-weight: 600; font-size: 12px; cursor: pointer; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.5); color: #A855F7; }
        
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0.9); background: #1A1A24; backdrop-filter: blur(20px); padding: 10px 16px; border-radius: 60px; font-size: 12px; color: #FFF; border: 1px solid #A855F7; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1000; max-width: 85%; text-align: center; white-space: normal; word-wrap: break-word; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.97); backdrop-filter: blur(20px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.25s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { max-width: 320px; width: 85%; background: #0C0C14; border-radius: 48px; padding: 24px; text-align: center; border: 1px solid #2a2a3a; }
        .modal-icon { width: 160px; height: 160px; margin: 0 auto 16px; background: #0a0a10; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .empty-state { text-align: center; padding: 40px 20px; color: #5a5a7a; grid-column: span 2; font-size: 13px; }
        .loading-spinner { width: 32px; height: 32px; border: 2px solid #2c2c3a; border-top-color: #A855F7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { 
            .gift-icon { width: 85px; height: 85px; } 
            .gift-name { font-size: 12px; } 
            .price-ton { font-size: 14px; }
            .buy-btn, .cart-btn { padding: 5px 10px; font-size: 10px; }
            .user-profile { padding: 6px 12px; }
            .user-avatar { width: 34px; height: 34px; }
            .toast-msg { font-size: 11px; padding: 8px 14px; max-width: 90%; white-space: normal; word-break: break-word; }
        }
        
        .add-gift-btn { background: linear-gradient(95deg, #22c55e, #16a34a); border: none; border-radius: 40px; padding: 10px; font-weight: 600; font-size: 14px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; margin-top: 16px; transition: 0.2s; }
        .add-gift-btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <h1>TON</h1>
        </div>
        <div class="right-header">
            <div class="lang-switch" id="langSwitch">
                <span class="lang-flag" id="langFlag">🇷🇺</span>
                <span class="lang-text" id="langText">RU</span>
            </div>
            <div class="cart-badge" id="cartBtn"><i class="fas fa-shopping-bag"></i> <span id="cartCount">0</span></div>
        </div>
    </div>
    
    <div class="user-profile" id="userProfileBtn">
        <div class="user-avatar" id="userAvatar">
            <i class="fas fa-user-astronaut"></i>
        </div>
        <div class="user-info">
            <div class="user-name" id="userName">Загрузка...</div>
            <div class="user-handle" id="userHandle">@username</div>
        </div>
    </div>
    
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="market"><i class="fas fa-store"></i> <span>Маркет</span></button>
        <button class="tab-btn" data-tab="mygifts"><i class="fas fa-box-open"></i> <span>Мои NFT</span></button>
        <button class="tab-btn" data-tab="cart"><i class="fas fa-shopping-cart"></i> <span>Корзина</span></button>
    </div>
    
    <div id="marketPanel">
        <div class="filter-bar">
            <div class="filter-trigger" id="filterTrigger"><i class="fas fa-sliders-h"></i> <span>Коллекции</span> <span id="filterCount" style="background:#A855F7; border-radius:20px; padding:2px 6px; font-size:10px; display:none;">0</span></div>
            <div class="sort-group">
                <button class="sort-btn active" data-sort="default">🔥 Топ</button>
                <button class="sort-btn" data-sort="price_asc"><i class="fas fa-arrow-up"></i> Цена</button>
                <button class="sort-btn" data-sort="price_desc"><i class="fas fa-arrow-down"></i> Цена</button>
            </div>
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div id="marketList" class="gifts-grid"><div class="empty-state"><div class="loading-spinner"></div>Загрузка...</div></div>
    </div>
    
    <div id="myGiftsPanel" style="display: none;">
        <div id="myGiftsList" class="gifts-grid"></div>
        <button class="add-gift-btn" id="addGiftBtn"><i class="fas fa-plus-circle"></i> Добавить подарок</button>
    </div>
    
    <div id="cartPanel" style="display: none;"><div id="cartList" class="gifts-grid"></div></div>
</div>

<div id="filterModal" class="filter-modal"><div class="filter-modal-content"><h3 style="margin-bottom:16px;font-size:18px;"><i class="fas fa-layer-group"></i> Коллекции</h3><input type="text" id="collectionSearchInput" placeholder="🔍 Поиск..." style="width:100%;padding:10px;background:#111118;border:1px solid #2a2a3a;border-radius:60px;color:white;margin-bottom:16px;font-size:14px;"><div id="filterCollectionsList" class="filter-collections-grid"><div class="loading-spinner"></div></div><div class="filter-modal-buttons" style="display:flex;gap:12px;margin-top:20px;"><button class="filter-apply-btn" id="applyFilterBtn">Применить</button><button class="filter-reset-btn" id="resetFilterBtn">Сбросить</button></div></div></div>

<div id="giftModal" class="modal-overlay"><div class="modal-content"><div class="modal-icon"><div id="modalLottie" style="width:100%;height:100%;"></div></div><div class="modal-name" id="modalName" style="font-size:20px;font-weight:700;"></div><div class="modal-number" id="modalNumber" style="margin:6px 0;color:#A855F7;font-size:12px;"></div><div class="modal-price" id="modalPrice" style="font-size:18px;font-weight:800;margin-bottom:16px;"></div><button class="filter-reset-btn" style="width:100%; margin-top:6px; padding:12px;" id="modalCloseBtn">Закрыть</button><button id="modalBuyBtn" style="width:100%; margin-top:10px; background:transparent; border:2px solid white; border-radius:60px; padding:12px; font-weight:700; color:white; cursor:pointer;">Купить</button></div></div>

<div id="toastMessage" class="toast-msg"></div>

<script>
    let tg = window.Telegram?.WebApp;
    let currentTab = "market", currentSort = "default", selectedCollections = new Set();
    let allGifts = [], filteredGifts = [], myGifts = [], cartItems = [];
    let collectionsMetadata = [];
    let lottieInstances = new Map();
    let miniLottieInstances = new Map();
    let currentUser = null;
    
    const EXCLUDED_COLLECTIONS = ["dragon", "cybergift", "moonrabbit", "crystalheart", "neoncat", "tonpenguin"];
    
    // РЕАЛЬНЫЕ ЦЕНЫ на подарки (TON) из открытых источников
    const REAL_PRICES = {
        "plushpepe": { min: 3500, max: 4800 },      // Plush Pepe ~ 3500-4800 TON
        "homemadecake": { min: 85, max: 180 },       // Homemade Cakes ~ 85-180 TON
        "hexpot": { min: 120, max: 250 },            // Hex Pot ~ 120-250 TON
        "bdaycandle": { min: 15, max: 45 },          // B-Day Candle ~ 15-45 TON
        "astralshard": { min: 65, max: 140 },        // Astral Shards ~ 65-140 TON
        "witchhat": { min: 55, max: 110 },           // Witch Hat ~ 55-110 TON
        "gingercookie": { min: 8, max: 28 },         // Ginger Cookie ~ 8-28 TON
        "crystalball": { min: 95, max: 190 },        // Crystal Ball ~ 95-190 TON
        "santahat": { min: 45, max: 95 },            // Santa Hat ~ 45-95 TON
        "icecream": { min: 12, max: 35 },            // Ice Cream ~ 12-35 TON
        "swisswatch": { min: 550, max: 950 },        // Swiss Watch ~ 550-950 TON
        "snoopdog": { min: 18, max: 45 },            // Snoop Dogg ~ 18-45 TON
        "lowrider": { min: 450, max: 850 },          // Low Rider ~ 450-850 TON
        "westside": { min: 900, max: 1800 }          // Westside Sign ~ 900-1800 TON
    };
    
    function getLocalCollectionsMetadata() {
        return [
            { shortname: "plushpepe", name: "Plush Pepe", floor_price: 3850, total_supply: 2000, image: "🐸", color: "#22c55e" },
            { shortname: "homemadecake", name: "Homemade Cakes", floor_price: 120, total_supply: 19775, image: "🎂", color: "#f59e0b" },
            { shortname: "hexpot", name: "Hex Pot", floor_price: 165, total_supply: 1500, image: "⚗️", color: "#14b8a6" },
            { shortname: "bdaycandle", name: "B-Day Candle", floor_price: 25, total_supply: 307632, image: "🕯️", color: "#ef4444" },
            { shortname: "astralshard", name: "Astral Shards", floor_price: 85, total_supply: 1550, image: "✨", color: "#c084fc" },
            { shortname: "witchhat", name: "Witch Hat", floor_price: 72, total_supply: 1450, image: "🧙", color: "#7c3aed" },
            { shortname: "gingercookie", name: "Ginger Cookie", floor_price: 15, total_supply: 3500, image: "🍪", color: "#d97706" },
            { shortname: "crystalball", name: "Crystal Ball", floor_price: 135, total_supply: 980, image: "🔮", color: "#a855f7" },
            { shortname: "santahat", name: "Santa Hat", floor_price: 68, total_supply: 2100, image: "🎅", color: "#dc2626" },
            { shortname: "icecream", name: "Ice Cream", floor_price: 22, total_supply: 3050, image: "🍦", color: "#fbcfe8" }
        ];
    }
    
    async function fetchCollectionsMetadata() {
        try {
            const response = await fetch(`https://api.gifts.tonanalytics.com/api/v1/gifts/get_collections_metadata`);
            if (!response.ok) throw new Error('API error');
            const data = await response.json();
            let collections = data.collections || data;
            collections = collections.filter(c => !EXCLUDED_COLLECTIONS.includes(c.shortname) && !EXCLUDED_COLLECTIONS.includes(c.slug));
            return collections;
        } catch (error) {
            return getLocalCollectionsMetadata();
        }
    }
    
    function getRealPrice(collectionSlug) {
        const priceRange = REAL_PRICES[collectionSlug];
        if (priceRange) {
            return parseFloat((priceRange.min + Math.random() * (priceRange.max - priceRange.min)).toFixed(2));
        }
        return parseFloat((10 + Math.random() * 50).toFixed(2));
    }
    
    async function loadGiftsFromAPI() {
        document.getElementById("marketList").innerHTML = '<div class="empty-state"><div class="loading-spinner"></div>Загрузка...</div>';
        
        const collections = await fetchCollectionsMetadata();
        collectionsMetadata = collections;
        
        const gifts = [];
        const tonToUsd = 2.85; // Актуальный курс TON
        
        for (const collection of collections) {
            const colName = collection.shortname || collection.slug;
            const colDisplayName = collection.name || collection.collection_name;
            const totalSupply = collection.total_supply || collection.count || 1000;
            
            const itemsCount = Math.min(10, Math.max(4, Math.floor(totalSupply / 5000) + 2));
            
            for (let i = 1; i <= itemsCount; i++) {
                const itemNumber = Math.floor(Math.random() * Math.min(totalSupply, 9999)) + 1;
                const priceTON = getRealPrice(colName);
                const lottieUrl = `https://nft.fragment.com/gift/${colName}-${itemNumber}.lottie.json`;
                
                gifts.push({
                    id: `${colName}_${itemNumber}_${Date.now()}_${i}`,
                    name: colDisplayName,
                    collection_slug: colName,
                    collection_name: colDisplayName,
                    item_number: String(itemNumber),
                    priceTON: priceTON,
                    usdPrice: parseFloat((priceTON * tonToUsd).toFixed(2)),
                    lottieUrl: lottieUrl,
                    color: collection.color || `#${Math.floor(Math.random()*16777215).toString(16)}`,
                    icon: collection.image || "🎁"
                });
            }
        }
        
        gifts.sort(() => Math.random() - 0.5);
        return gifts;
    }
    
    async function loadLottieAnimation(containerId, lottieUrl, color, icon) {
        const container = document.getElementById(containerId);
        if (!container) return false;
        
        if (lottieInstances.has(containerId)) {
            const old = lottieInstances.get(containerId);
            if (old?.destroy) old.destroy();
            lottieInstances.delete(containerId);
        }
        
        return new Promise((resolve) => {
            const timeout = setTimeout(() => {
                if (container) {
                    container.innerHTML = `<i class="fas ${getIconClass(icon)}" style="font-size:40px; color:${color};"></i>`;
                }
                resolve(false);
            }, 5000);
            
            try {
                const anim = lottie.loadAnimation({
                    container: container,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    path: lottieUrl
                });
                
                anim.addEventListener('DOMLoaded', () => {
                    clearTimeout(timeout);
                    lottieInstances.set(containerId, anim);
                    resolve(true);
                });
                
                anim.addEventListener('error', () => {
                    clearTimeout(timeout);
                    if (container) container.innerHTML = `<i class="fas ${getIconClass(icon)}" style="font-size:40px; color:${color};"></i>`;
                    resolve(false);
                });
            } catch(e) {
                clearTimeout(timeout);
                if (container) container.innerHTML = `<i class="fas ${getIconClass(icon)}" style="font-size:40px; color:${color};"></i>`;
                resolve(false);
            }
        });
    }
    
    function getIconClass(icon) {
        const iconMap = {
            "🐸": "fa-frog", "🎂": "fa-birthday-cake", "⚗️": "fa-flask", "🕯️": "fa-candle-holder",
            "✨": "fa-star", "🧙": "fa-hat-wizard", "🍪": "fa-cookie-bite", "🔮": "fa-moon",
            "🎅": "fa-santa", "🍦": "fa-ice-cream", "🎁": "fa-gift"
        };
        return iconMap[icon] || "fa-gift";
    }
    
    function renderMarket() {
        let sorted = [...filteredGifts];
        if (currentSort === "price_asc") sorted.sort((a,b) => a.priceTON - b.priceTON);
        if (currentSort === "price_desc") sorted.sort((a,b) => b.priceTON - a.priceTON);
        
        const container = document.getElementById("marketList");
        if (!sorted.length) {
            container.innerHTML = `<div class="empty-state">✨ Нет подарков в выбранных коллекциях</div>`;
            return;
        }
        
        container.innerHTML = sorted.map((g, idx) => `
            <div class="gift-card" data-id="${g.id}" data-index="${idx}">
                <div class="gift-icon">
                    <div id="lottie-${idx}" class="lottie-container"></div>
                </div>
                <div class="gift-name">${escapeHtml(g.name)}</div>
                <div class="collection-badge">${escapeHtml(g.collection_name)}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block">
                    <span class="price-ton"><i class="fas fa-coins"></i> ${g.priceTON.toFixed(2)}</span>
                    <span class="price-usd">≈ $${g.usdPrice.toFixed(2)}</span>
                </div>
                <div class="button-group">
                    <button class="cart-btn" data-action="cart" data-id="${g.id}"><i class="fas fa-bag-shopping"></i> В корзину</button>
                    <button class="buy-btn" data-action="buy" data-id="${g.id}"><i class="fas fa-bolt"></i> Купить</button>
                </div>
            </div>
        `).join('');
        
        sorted.forEach(async (g, idx) => {
            await loadLottieAnimation(`lottie-${idx}`, g.lottieUrl, g.color, g.icon);
        });
        
        attachCardEvents(sorted);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function attachCardEvents(sorted) {
        document.querySelectorAll('#marketList .gift-card').forEach(card => {
            const idx = card.getAttribute('data-index');
            const gift = sorted[parseInt(idx)];
            if (gift) {
                card.onclick = (e) => {
                    if (!e.target.closest('.buy-btn') && !e.target.closest('.cart-btn')) {
                        openModal(gift);
                    }
                };
            }
        });
        
        document.querySelectorAll('#marketList .buy-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                showToast("⚠️ Оплата временно недоступна. Следите за обновлениями!");
            };
        });
        
        document.querySelectorAll('#marketList .cart-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const gift = allGifts.find(g => g.id === btn.getAttribute('data-id'));
                if (gift) addToCart(gift);
            };
        });
    }
    
    function addToCart(gift) {
        if (!cartItems.some(i => i.id === gift.id)) {
            cartItems.push({...gift});
            updateCartCount();
            showToast(`🛒 ${gift.name} #${gift.item_number} добавлен в корзину`);
            if (currentTab === 'cart') renderCart();
        } else {
            showToast(`⚠️ Уже в корзине`);
        }
    }
    
    function purchaseGift(gift) {
        showToast("⚠️ Оплата временно недоступна. Следите за обновлениями!");
    }
    
    function renderMyGifts() {
        const container = document.getElementById("myGiftsList");
        if (!myGifts.length) {
            container.innerHTML = `<div class="empty-state">📦 У вас пока нет NFT</div>`;
            return;
        }
        
        container.innerHTML = myGifts.map((g, idx) => `
            <div class="gift-card">
                <div class="gift-icon">
                    <div id="my-lottie-${idx}" class="lottie-container"></div>
                </div>
                <div class="gift-name">${escapeHtml(g.name)}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton"><i class="fas fa-coins"></i> ${g.priceTON.toFixed(2)}</span></div>
                <button class="action-btn" data-action="send"><i class="fas fa-paper-plane"></i> Отправить</button>
            </div>
        `).join('');
        
        myGifts.forEach(async (g, idx) => {
            await loadLottieAnimation(`my-lottie-${idx}`, g.lottieUrl, g.color, g.icon);
        });
        
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn => {
            btn.onclick = () => showToast(`🔹 Отправка NFT (функция в разработке)`);
        });
    }
    
    function renderCart() {
        const container = document.getElementById("cartList");
        if (!cartItems.length) {
            container.innerHTML = `<div class="empty-state">🛒 Корзина пуста</div>`;
            return;
        }
        
        const total = cartItems.reduce((s, i) => s + i.priceTON, 0);
        
        container.innerHTML = cartItems.map((g, idx) => `
            <div class="gift-card">
                <div class="gift-icon">
                    <div id="cart-lottie-${idx}" class="lottie-container"></div>
                </div>
                <div class="gift-name">${escapeHtml(g.name)}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton"><i class="fas fa-coins"></i> ${g.priceTON.toFixed(2)}</span></div>
                <button class="action-btn cart-btn" data-action="remove" data-id="${g.id}"><i class="fas fa-trash"></i> Удалить</button>
            </div>
        `).join('') + `
            <div style="padding:16px; text-align:center; grid-column: span 2; border-top:1px solid #2a2a3a;">
                <div style="margin-bottom:12px;font-weight:700;">Итого: ${total.toFixed(2)} TON (≈ $${(total * 2.85).toFixed(2)})</div>
                <button id="checkoutBtn" style="background:transparent; border:2px solid white; border-radius:60px; padding:12px; font-weight:700; color:white; width:100%; cursor:pointer;">Оплатить</button>
            </div>
        `;
        
        cartItems.forEach(async (g, idx) => {
            await loadLottieAnimation(`cart-lottie-${idx}`, g.lottieUrl, g.color, g.icon);
        });
        
        document.querySelectorAll('#cartList .action-btn').forEach(btn => {
            btn.onclick = () => {
                cartItems = cartItems.filter(i => i.id !== btn.getAttribute('data-id'));
                updateCartCount();
                renderCart();
                showToast("Удалено из корзины");
            };
        });
        
        const checkoutBtn = document.getElementById("checkoutBtn");
        if (checkoutBtn) {
            checkoutBtn.onclick = () => {
                showToast("⚠️ Оплата временно недоступна. Следите за обновлениями!");
            };
        }
    }
    
    function openModal(gift) {
        currentModalGift = gift;
        document.getElementById("modalName").innerText = gift.name;
        document.getElementById("modalNumber").innerHTML = `#${gift.item_number}<br><span style="font-size:11px;">${gift.collection_name}</span>`;
        document.getElementById("modalPrice").innerHTML = `<i class="fas fa-coins"></i> ${gift.priceTON.toFixed(2)} TON  <span style="font-size:12px;">≈ $${gift.usdPrice.toFixed(2)}</span>`;
        
        const modalContainer = document.getElementById("modalLottie");
        modalContainer.innerHTML = '<div id="modalLottieAnim" style="width:100%;height:100%;"></div>';
        loadLottieAnimation("modalLottieAnim", gift.lottieUrl, gift.color, gift.icon);
        
        document.getElementById("giftModal").classList.add("active");
    }
    
    function showToast(msg) {
        const toast = document.getElementById("toastMessage");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }
    
    function updateCartCount() {
        document.getElementById("cartCount").innerText = cartItems.length;
        saveToLocalStorage();
    }
    
    function saveToLocalStorage() {
        localStorage.setItem("vordex_cart", JSON.stringify(cartItems));
        localStorage.setItem("vordex_mygifts", JSON.stringify(myGifts));
        localStorage.setItem("vordex_selected", JSON.stringify([...selectedCollections]));
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
        });
        document.getElementById("marketPanel").style.display = tab === "market" ? "block" : "none";
        document.getElementById("myGiftsPanel").style.display = tab === "mygifts" ? "block" : "none";
        document.getElementById("cartPanel").style.display = tab === "cart" ? "block" : "none";
        if (tab === "mygifts") renderMyGifts();
        if (tab === "cart") renderCart();
    }
    
    function applyFilter() {
        selectedCollections.clear();
        document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb => {
            selectedCollections.add(cb.value);
        });
        filteredGifts = selectedCollections.size ? 
            allGifts.filter(g => selectedCollections.has(g.collection_slug)) : 
            [...allGifts];
        document.getElementById("filterCount").style.display = selectedCollections.size ? "inline-block" : "none";
        if (selectedCollections.size) document.getElementById("filterCount").innerText = selectedCollections.size;
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
        saveToLocalStorage();
    }
    
    function resetFilter() {
        selectedCollections.clear();
        filteredGifts = [...allGifts];
        document.getElementById("filterCount").style.display = "none";
        document.querySelectorAll('#filterCollectionsList input').forEach(cb => cb.checked = false);
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
        saveToLocalStorage();
    }
    
    async function renderFilterModal() {
        const container = document.getElementById("filterCollectionsList");
        const term = document.getElementById("collectionSearchInput")?.value.toLowerCase() || "";
        
        const collections = collectionsMetadata.length ? collectionsMetadata : getLocalCollectionsMetadata();
        
        const filteredCollections = collections.filter(c => 
            (c.name || c.collection_name || '').toLowerCase().includes(term) ||
            (c.shortname || c.slug || '').toLowerCase().includes(term)
        );
        
        container.innerHTML = filteredCollections.map((col, idx) => `
            <label class="filter-collection-item" data-slug="${col.shortname || col.slug}">
                <input type="checkbox" value="${col.shortname || col.slug}" ${selectedCollections.has(col.shortname || col.slug) ? 'checked' : ''}>
                <div class="filter-collection-icon" style="background:${col.color || '#A855F7'}20; border:1px solid ${col.color || '#A855F7'}">
                    <div id="filter-mini-${idx}" class="filter-mini-lottie"></div>
                </div>
                <span style="font-size:13px;">${col.name || col.collection_name}</span>
                <span style="margin-left:auto; font-size:11px; color:#666;">${(REAL_PRICES[col.shortname]?.min || '?')} TON</span>
            </label>
        `).join('');
        
        for (let i = 0; i < filteredCollections.length; i++) {
            const col = filteredCollections[i];
            const colSlug = col.shortname || col.slug;
            const sampleNumber = Math.floor(Math.random() * 500) + 1;
            const lottieUrl = `https://nft.fragment.com/gift/${colSlug}-${sampleNumber}.lottie.json`;
            await loadMiniLottie(`filter-mini-${i}`, lottieUrl, col.color || '#A855F7', col.image || '🎁');
        }
    }
    
    async function loadMiniLottie(containerId, lottieUrl, color, icon) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (miniLottieInstances.has(containerId)) {
            const old = miniLottieInstances.get(containerId);
            if (old?.destroy) old.destroy();
            miniLottieInstances.delete(containerId);
        }
        
        const timeout = setTimeout(() => {
            if (container) container.innerHTML = `<i class="fas ${getIconClass(icon)}" style="font-size:18px; color:${color};"></i>`;
        }, 4000);
        
        try {
            const anim = lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: lottieUrl
            });
            anim.addEventListener('DOMLoaded', () => {
                clearTimeout(timeout);
                miniLottieInstances.set(containerId, anim);
            });
            anim.addEventListener('error', () => {
                clearTimeout(timeout);
                if (container) container.innerHTML = `<i class="fas ${getIconClass(icon)}" style="font-size:18px; color:${color};"></i>`;
            });
        } catch(e) {
            clearTimeout(timeout);
            if (container) container.innerHTML = `<i class="fas ${getIconClass(icon)}" style="font-size:18px; color:${color};"></i>`;
        }
    }
    
    async function refreshData() {
        showToast("🔄 Обновление данных...");
        allGifts = await loadGiftsFromAPI();
        filteredGifts = selectedCollections.size ? 
            allGifts.filter(g => selectedCollections.has(g.collection_slug)) : 
            [...allGifts];
        renderMarket();
        await renderFilterModal();
        showToast("✅ Данные обновлены");
    }
    
    function openUserProfile() {
        if (currentUser) {
            showToast(`👤 ${currentUser.first_name || currentUser.username || 'Пользователь'}\nID: ${currentUser.id || 'Неизвестно'}`);
        }
    }
    
    function openBotChat() {
        window.open("https://t.me/VordexToGifts", "_blank");
    }
    
    async function init() {
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
            const u = tg.initDataUnsafe?.user;
            if (u) {
                currentUser = u;
                document.getElementById("userName").innerHTML = `${u.first_name || 'Explorer'} ${u.last_name || ''}`;
                document.getElementById("userHandle").innerHTML = `@${u.username || 'user'}`;
                if (u.photo_url) {
                    document.getElementById("userAvatar").innerHTML = `<img src="${u.photo_url}" alt="avatar">`;
                } else {
                    document.getElementById("userAvatar").innerHTML = `<i class="fas fa-user-astronaut"></i>`;
                }
            }
            tg.setBackgroundColor("#05050A");
        }
        
        const savedCart = localStorage.getItem("vordex_cart");
        if (savedCart) try { cartItems = JSON.parse(savedCart); } catch(e) {}
        
        const savedMy = localStorage.getItem("vordex_mygifts");
        if (savedMy) try { myGifts = JSON.parse(savedMy); } catch(e) {}
        
        const savedSel = localStorage.getItem("vordex_selected");
        if (savedSel) try { selectedCollections = new Set(JSON.parse(savedSel)); } catch(e) {}
        
        allGifts = await loadGiftsFromAPI();
        filteredGifts = selectedCollections.size ? 
            allGifts.filter(g => selectedCollections.has(g.collection_slug)) : 
            [...allGifts];
        
        updateCartCount();
        await renderFilterModal();
        renderMarket();
        
        document.getElementById("userProfileBtn").onclick = openUserProfile;
        document.getElementById("filterTrigger").onclick = () => {
            renderFilterModal();
            document.getElementById("filterModal").classList.add("active");
        };
        document.getElementById("applyFilterBtn").onclick = applyFilter;
        document.getElementById("resetFilterBtn").onclick = resetFilter;
        document.getElementById("collectionSearchInput").oninput = () => renderFilterModal();
        document.getElementById("cartBtn").onclick = () => switchTab("cart");
        document.getElementById("refreshBtn").onclick = () => refreshData();
        document.getElementById("addGiftBtn").onclick = () => {
            showToast("📩 Передайте подарок боту @VordexToGifts для появления на маркете");
            setTimeout(() => openBotChat(), 1500);
        };
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => switchTab(btn.getAttribute('data-tab'));
        });
        
        document.getElementById("modalCloseBtn").onclick = () => document.getElementById("giftModal").classList.remove("active");
        document.getElementById("modalBuyBtn").onclick = () => {
            showToast("⚠️ Оплата временно недоступна. Следите за обновлениями!");
            document.getElementById("giftModal").classList.remove("active");
        };
        
        document.querySelectorAll('.sort-btn').forEach(btn => {
            if (btn.getAttribute('data-sort') === currentSort) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.getAttribute('data-sort');
                renderMarket();
            };
        });
        
        document.getElementById("filterModal").onclick = (e) => {
            if (e.target === document.getElementById("filterModal")) {
                document.getElementById("filterModal").classList.remove("active");
            }
        };
    }
    
    let currentModalGift = null;
    init();
</script>
</body>
</html>
