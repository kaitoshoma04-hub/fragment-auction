    const tonToUsd = 3.45;
    
    function getLottieUrl(slug, number) {
        return `https://nft.fragment.com/gift/${slug}-${number}.lottie.json`;
    }
    
    function generateAllGifts() {
        const gifts = [];
        for (const collection of REAL_COLLECTIONS) {
            for (const itemNumber of collection.confirmedItems) {
                const priceVariation = 0.8 + Math.random() * 0.6;
                const priceTON = parseFloat((collection.floorPrice * priceVariation).toFixed(2));
                gifts.push({
                    id: `${collection.slug}_${itemNumber}_${Date.now()}_${Math.random()}`,
                    name: collection.name,
                    collection_slug: collection.slug,
                    collection_name: collection.name,
                    item_number: String(itemNumber),
                    priceTON: priceTON,
                    usdPrice: parseFloat((priceTON * tonToUsd).toFixed(2)),
                    lottieUrl: getLottieUrl(collection.slug, itemNumber),
                    color: collection.color
                });
            }
        }
        return shuffleArray(gifts);
    }
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    async function loadLottieAnimation(containerId, lottieUrl, color = "#A855F7") {
        const container = document.getElementById(containerId);
        if (!container) return false;
        
        if (lottieInstances.has(containerId)) {
            const old = lottieInstances.get(containerId);
            if (old?.destroy) old.destroy();
            lottieInstances.delete(containerId);
        }
        
        return new Promise((resolve) => {
            const timeout = setTimeout(() => {
                container.innerHTML = `<i class="fas fa-gift" style="font-size:50px; color:${color};"></i>`;
                resolve(false);
            }, 5000);
            
            try {
                const anim = lottie.loadAnimation({
                    container: container,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    path: lottieUrl
                });
                
                anim.addEventListener('DOMLoaded', () => {
                    clearTimeout(timeout);
                    lottieInstances.set(containerId, anim);
                    resolve(true);
                });
                
                anim.addEventListener('error', () => {
                    clearTimeout(timeout);
                    container.innerHTML = `<i class="fas fa-gift" style="font-size:50px; color:${color};"></i>`;
                    resolve(false);
                });
            } catch(e) {
                clearTimeout(timeout);
                container.innerHTML = `<i class="fas fa-gift" style="font-size:50px; color:${color};"></i>`;
                resolve(false);
            }
        });
    }
    
    let miniLottieInstances = new Map();
    
    async function loadMiniLottie(containerId, lottieUrl, color) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (miniLottieInstances.has(containerId)) {
            const old = miniLottieInstances.get(containerId);
            if (old?.destroy) old.destroy();
            miniLottieInstances.delete(containerId);
        }
        
        const timeout = setTimeout(() => {
            container.innerHTML = `<i class="fas fa-gift" style="font-size:20px; color:${color};"></i>`;
        }, 3000);
        
        try {
            const anim = lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: lottieUrl
            });
            anim.addEventListener('DOMLoaded', () => {
                clearTimeout(timeout);
                miniLottieInstances.set(containerId, anim);
            });
            anim.addEventListener('error', () => {
                clearTimeout(timeout);
                container.innerHTML = `<i class="fas fa-gift" style="font-size:20px; color:${color};"></i>`;
            });
        } catch(e) {
            clearTimeout(timeout);
            container.innerHTML = `<i class="fas fa-gift" style="font-size:20px; color:${color};"></i>`;
        }
    }
    
    function renderMarket() {
        let sorted = [...filteredGifts];
        if (currentSort === "price_asc") sorted.sort((a,b) => a.priceTON - b.priceTON);
        if (currentSort === "price_desc") sorted.sort((a,b) => b.priceTON - a.priceTON);
        
        const container = document.getElementById("marketList");
        if (!sorted.length) {
            container.innerHTML = `<div class="empty-state">✨ Нет подарков</div>`;
            return;
        }
        
        container.innerHTML = sorted.map((g, idx) => `
            <div class="gift-card" data-id="${g.id}" data-index="${idx}">
                <div class="gift-icon">
                    <div id="lottie-${idx}" class="lottie-container"></div>
                </div>
                <div class="gift-name">${g.name}</div>
                <div class="collection-badge">${g.collection_name}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block">
                    <span class="price-ton">${g.priceTON} TON</span>
                    <span class="price-usd">≈ $${g.usdPrice}</span>
                </div>
                <div class="button-group">
                    <button class="cart-btn" data-action="cart" data-id="${g.id}"><i class="fas fa-bag-shopping"></i> В корзину</button>
                    <button class="buy-btn" data-action="buy" data-id="${g.id}"><i class="fas fa-bolt"></i> Купить</button>
                </div>
            </div>
        `).join('');
        
        sorted.forEach(async (g, idx) => {
            await loadLottieAnimation(`lottie-${idx}`, g.lottieUrl, g.color);
        });
        
        attachCardEvents(sorted);
    }
    
    function attachCardEvents(sorted) {
        document.querySelectorAll('#marketList .gift-card').forEach(card => {
            const idx = card.getAttribute('data-index');
            const gift = sorted[parseInt(idx)];
            if (gift) {
                card.onclick = (e) => {
                    if (!e.target.closest('.buy-btn') && !e.target.closest('.cart-btn')) {
                        openModal(gift);
                    }
                };
            }
        });
        
        document.querySelectorAll('#marketList .buy-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const gift = allGifts.find(g => g.id === btn.getAttribute('data-id'));
                if (gift) purchaseGift(gift);
            };
        });
        
        document.querySelectorAll('#marketList .cart-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const gift = allGifts.find(g => g.id === btn.getAttribute('data-id'));
                if (gift) addToCart(gift);
            };
        });
    }
    
    function addToCart(gift) {
        if (!cartItems.some(i => i.id === gift.id)) {
            cartItems.push({...gift});
            updateCartCount();
            showToast(`🛒 ${gift.name} #${gift.item_number} добавлен в корзину`);
            if (currentTab === 'cart') renderCart();
        } else {
            showToast(`⚠️ Уже в корзине`);
        }
    }
    
    function purchaseGift(gift) {
        if (!myGifts.some(g => g.id === gift.id)) {
            myGifts.push({...gift, purchaseDate: new Date().toISOString()});
            updateCartCount();
            showToast(`✅ ${gift.name} #${gift.item_number} куплен!`);
            if (currentTab === 'mygifts') renderMyGifts();
        } else {
            showToast(`⚠️ Уже есть в коллекции`);
        }
    }
    
    function renderMyGifts() {
        const container = document.getElementById("myGiftsList");
        if (!myGifts.length) {
            container.innerHTML = `<div class="empty-state">📦 Нет приобретенных активов</div>`;
            return;
        }
        
        container.innerHTML = myGifts.map((g, idx) => `
            <div class="gift-card">
                <div class="gift-icon">
                    <div id="my-lottie-${idx}" class="lottie-container"></div>
                </div>
                <div class="gift-name">${g.name}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div>
                <button class="action-btn" data-action="send"><i class="fas fa-paper-plane"></i> Отправить</button>
            </div>
        `).join('');
        
        myGifts.forEach(async (g, idx) => {
            await loadLottieAnimation(`my-lottie-${idx}`, g.lottieUrl, g.color);
        });
        
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn => {
            btn.onclick = () => showToast(`🔹 Отправка NFT (функция в разработке)`);
        });
    }
    
    function renderCart() {
        const container = document.getElementById("cartList");
        if (!cartItems.length) {
            container.innerHTML = `<div class="empty-state">🛒 Корзина пуста</div>`;
            return;
        }
        
        const total = cartItems.reduce((s, i) => s + i.priceTON, 0);
        
        container.innerHTML = cartItems.map((g, idx) => `
            <div class="gift-card">
                <div class="gift-icon">
                    <div id="cart-lottie-${idx}" class="lottie-container"></div>
                </div>
                <div class="gift-name">${g.name}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div>
                <button class="action-btn" data-action="remove" data-id="${g.id}"><i class="fas fa-trash"></i> Удалить</button>
            </div>
        `).join('') + `
            <div style="padding:20px; text-align:center; grid-column: span 2; border-top:1px solid #2a2a3a;">
                <div style="margin-bottom:16px;font-weight:700;">Итого: ${total.toFixed(2)} TON</div>
                <button id="checkoutBtn" style="background:linear-gradient(95deg,#A855F7,#7C3AED);border:none;border-radius:60px;padding:14px;font-weight:700;color:white;width:100%;cursor:pointer;">Оплатить</button>
            </div>
        `;
        
        cartItems.forEach(async (g, idx) => {
            await loadLottieAnimation(`cart-lottie-${idx}`, g.lottieUrl, g.color);
        });
        
        document.querySelectorAll('#cartList .action-btn').forEach(btn => {
            btn.onclick = () => {
                cartItems = cartItems.filter(i => i.id !== btn.getAttribute('data-id'));
                updateCartCount();
                renderCart();
                showToast("Удалено из корзины");
            };
        });
        
        const checkoutBtn = document.getElementById("checkoutBtn");
        if (checkoutBtn) {
            checkoutBtn.onclick = () => {
                if (cartItems.length) {
                    cartItems.forEach(item => {
                        if (!myGifts.some(g => g.id === item.id)) {
                            myGifts.push({...item, purchaseDate: new Date().toISOString()});
                        }
                    });
                    cartItems = [];
                    updateCartCount();
                    renderCart();
                    if (currentTab === 'mygifts') renderMyGifts();
                    showToast("✅ Покупка завершена! Активы в Моих активах");
                }
            };
        }
    }
    
    function openModal(gift) {
        currentModalGift = gift;
        document.getElementById("modalName").innerText = gift.name;
        document.getElementById("modalNumber").innerHTML = `#${gift.item_number}<br><span style="font-size:12px;">${gift.collection_name}</span>`;
        document.getElementById("modalPrice").innerHTML = `${gift.priceTON} TON  <span style="font-size:14px;">≈ $${gift.usdPrice}</span>`;
        
        const modalContainer = document.getElementById("modalLottie");
        modalContainer.innerHTML = '<div id="modalLottieAnim" style="width:100%;height:100%;"></div>';
        loadLottieAnimation("modalLottieAnim", gift.lottieUrl, gift.color);
        
        document.getElementById("giftModal").classList.add("active");
    }
    
    function showToast(msg) {
        const toast = document.getElementById("toastMessage");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }
    
    function updateCartCount() {
        document.getElementById("cartCount").innerText = cartItems.length;
        localStorage.setItem("vordex_cart", JSON.stringify(cartItems));
        localStorage.setItem("vordex_mygifts", JSON.stringify(myGifts));
        localStorage.setItem("vordex_selected", JSON.stringify([...selectedCollections]));
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
        });
        document.getElementById("marketPanel").style.display = tab === "market" ? "block" : "none";
        document.getElementById("myGiftsPanel").style.display = tab === "mygifts" ? "block" : "none";
        document.getElementById("cartPanel").style.display = tab === "cart" ? "block" : "none";
        if (tab === "mygifts") renderMyGifts();
        if (tab === "cart") renderCart();
    }
    
    function applyFilter() {
        selectedCollections.clear();
        document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb => {
            selectedCollections.add(cb.value);
        });
        filteredGifts = selectedCollections.size ? 
            allGifts.filter(g => selectedCollections.has(g.collection_slug)) : 
            [...allGifts];
        document.getElementById("filterCount").style.display = selectedCollections.size ? "inline-block" : "none";
        if (selectedCollections.size) document.getElementById("filterCount").innerText = selectedCollections.size;
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
    }
    
    function resetFilter() {
        selectedCollections.clear();
        filteredGifts = [...allGifts];
        document.getElementById("filterCount").style.display = "none";
        document.querySelectorAll('#filterCollectionsList input').forEach(cb => cb.checked = false);
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
    }
    
    async function renderFilterModal() {
        const container = document.getElementById("filterCollectionsList");
        const term = document.getElementById("collectionSearchInput")?.value.toLowerCase() || "";
        
        const filteredCollections = REAL_COLLECTIONS.filter(c => 
            c.name.toLowerCase().includes(term)
        );
        
        container.innerHTML = filteredCollections.map((col, idx) => `
            <label class="filter-collection-item" data-slug="${col.slug}">
                <input type="checkbox" value="${col.slug}" ${selectedCollections.has(col.slug) ? 'checked' : ''}>
                <div class="filter-collection-icon" style="background:${col.color}20; border:1px solid ${col.color}">
                    <div id="filter-mini-${idx}" class="filter-mini-lottie"></div>
                </div>
                <span>${col.name}</span>
                <span style="margin-left:auto; font-size:11px; color:#666;">${col.floorPrice} TON</span>
            </label>
        `).join('');
        
        for (let i = 0; i < filteredCollections.length; i++) {
            const col = filteredCollections[i];
            const firstItemNumber = col.confirmedItems[0];
            const lottieUrl = getLottieUrl(col.slug, firstItemNumber);
            await loadMiniLottie(`filter-mini-${i}`, lottieUrl, col.color);
        }
    }
    
    async function init() {
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
            const u = tg.initDataUnsafe?.user;
            if (u) {
                document.getElementById("telegramUserInfo").innerHTML = `<i class="fab fa-telegram"></i> ${u.first_name || 'Explorer'} <span class="saved-badge"><i class="fas fa-gem"></i> Vordex</span>`;
            }
            document.getElementById("walletAddress").innerHTML = `${u?.id ? '0:' + u.id.toString(16).slice(0, 6) : '7F3E'}...`;
            tg.setBackgroundColor("#05050A");
        }
        
        const savedCart = localStorage.getItem("vordex_cart");
        if (savedCart) try { cartItems = JSON.parse(savedCart); } catch(e) {}
        
        const savedMy = localStorage.getItem("vordex_mygifts");
        if (savedMy) try { myGifts = JSON.parse(savedMy); } catch(e) {}
        
        const savedSel = localStorage.getItem("vordex_selected");
        if (savedSel) try { selectedCollections = new Set(JSON.parse(savedSel)); } catch(e) {}
        
        allGifts = generateAllGifts();
        filteredGifts = selectedCollections.size ? 
            allGifts.filter(g => selectedCollections.has(g.collection_slug)) : 
            [...allGifts];
        
        const totalGifts = allGifts.length;
        const totalCollections = REAL_COLLECTIONS.length;
        document.getElementById("apiStatus").innerHTML = `✅ Загружено ${totalGifts} подарков из ${totalCollections} коллекций. КАЖДЫЙ подарок имеет реальную Lottie-анимацию из Fragment!`;
        
        updateCartCount();
        await renderFilterModal();
        renderMarket();
        
        document.getElementById("filterTrigger").onclick = () => {
            renderFilterModal();
            document.getElementById("filterModal").classList.add("active");
        };
        document.getElementById("applyFilterBtn").onclick = applyFilter;
        document.getElementById("resetFilterBtn").onclick = resetFilter;
        document.getElementById("collectionSearchInput").oninput = () => renderFilterModal();
        document.getElementById("cartBtn").onclick = () => switchTab("cart");
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => switchTab(btn.getAttribute('data-tab'));
        });
        document.getElementById("modalCloseBtn").onclick = () => document.getElementById("giftModal").classList.remove("active");
        document.getElementById("modalBuyBtn").onclick = () => {
            if (currentModalGift) {
                purchaseGift(currentModalGift);
                document.getElementById("giftModal").classList.remove("active");
            }
        };
        
        document.querySelectorAll('.sort-btn').forEach(btn => {
            if (btn.getAttribute('data-sort') === currentSort) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.getAttribute('data-sort');
                renderMarket();
            };
        });
        
        document.getElementById("filterModal").onclick = (e) => {
            if (e.target === document.getElementById("filterModal")) {
                document.getElementById("filterModal").classList.remove("active");
            }
        };
    }
    
    let currentModalGift = null;
    init();
</script>
</body>
</html>
