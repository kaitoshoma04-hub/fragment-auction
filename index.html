<body>
<div class="app-container">

</div>

<div id="filterModal" class="filter-modal"><div class="filter-modal-content"><h3 style="margin-bottom:16px;"><i class="fas fa-layer-group"></i> <span id="filterModalTitle">Filter Collections</span></h3><input type="text" id="collectionSearchInput" class="filter-search-input" placeholder="🔍 Search..." style="width:100%;padding:12px;background:#111118;border:1px solid #2a2a3a;border-radius:60px;color:white;margin-bottom:16px;"><div id="filterCollectionsList" class="filter-collections-grid"></div><div class="filter-modal-buttons" style="display:flex;gap:12px;margin-top:20px;"><button class="filter-apply-btn" id="applyFilterBtn">Apply</button><button class="filter-reset-btn" id="resetFilterBtn">Reset</button></div></div></div>
<div id="giftModal" class="modal-overlay"><div class="modal-content"><div class="modal-icon"><div id="modalLottie" class="modal-lottie"></div></div><div class="modal-name" id="modalName" style="font-size:22px;font-weight:700;"></div><div class="modal-number" id="modalNumber" style="margin:8px 0;color:#A855F7;"></div><div class="modal-price" id="modalPrice" style="font-size:20px;font-weight:800;margin-bottom:20px;"></div><div id="paymentMethods" class="payment-options"><div class="pay-method" data-method="ton">💎 Pay with TON (Wallet)</div><div class="pay-method" data-method="card">💳 Pay with Card (Stripe)</div><div class="pay-method" data-method="crypto">🪙 Pay with Crypto</div></div><button class="filter-reset-btn" style="width:100%; margin-top:8px; background:#1A1A24; border:1px solid #3a3a4a; border-radius:60px; padding:14px; font-weight:600;" id="modalCloseBtn">Close</button></div></div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    let tg = window.Telegram?.WebApp;
    let currentTab = "market", currentSort = "default", selectedCollections = new Set();
    let allGifts = [], filteredGifts = [], myGifts = [], cartItems = [];
    let lottieInstances = new Map(), lottieCache = new Map();
    let currentLang = 'ru', currentModalGift = null;
    
    const translations = { ru: { market: 'Маркет', myAssets: 'Мои активы', cart: 'Корзина', filter: 'Фильтр', defaultSort: '🔥 По умолчанию', buy: 'Купить', addToCart: 'В корзину', total: 'Итого', checkout: 'Оплатить', emptyCart: 'Корзина пуста', emptyAssets: 'Нет активов', filterTitle: 'Фильтр коллекций', apply: 'Применить', reset: 'Сбросить', search: 'Поиск...', addedToCart: 'добавлен в корзину', purchased: 'куплен!', addGift: '+ Добавить подарок', botMsg: 'Сначала необходимо передать подарок нашему боту @VordexToGifts для того чтобы он появился на маркете.' }, 
        en: { market: 'Market', myAssets: 'My Assets', cart: 'Cart', filter: 'Filter', defaultSort: '🔥 Default', buy: 'Buy', addToCart: 'Add to cart', total: 'Total', checkout: 'Checkout', emptyCart: 'Cart is empty', emptyAssets: 'No assets', filterTitle: 'Filter Collections', apply: 'Apply', reset: 'Reset', search: 'Search...', addedToCart: 'added to cart', purchased: 'purchased!', addGift: '+ Add Gift', botMsg: 'First, send your gift to our bot @VordexToGifts to appear on the market.' } };
    function t(key) { return translations[currentLang][key] || key; }
    function showToast(msg) { const el = document.getElementById("toastMessage"); el.innerText = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2500); }
    function updateUIText() { 
        document.querySelectorAll('.tab-text').forEach((el,i) => { if(i===0) el.innerText = t('market'); if(i===1) el.innerText = t('myAssets'); if(i===2) el.innerText = t('cart'); });
        document.getElementById('filterLabel') && (document.getElementById('filterLabel').innerText = t('filter'));
        document.querySelector('.sort-btn[data-sort="default"]').innerHTML = t('defaultSort');
        document.getElementById('filterModalTitle') && (document.getElementById('filterModalTitle').innerText = t('filterTitle'));
        document.getElementById('applyFilterBtn') && (document.getElementById('applyFilterBtn').innerText = t('apply'));
        document.getElementById('resetFilterBtn') && (document.getElementById('resetFilterBtn').innerText = t('reset'));
        document.getElementById('collectionSearchInput') && (document.getElementById('collectionSearchInput').placeholder = t('search'));
        const addBtn = document.getElementById('addGiftBtn');
        if(addBtn) addBtn.innerHTML = `<i class="fas fa-plus-circle"></i> ${t('addGift')}`;
        if(currentTab === 'cart') renderCart();
        if(currentTab === 'mygifts') renderMyGifts();
        renderMarket();
    }
    function updateCartCount() { document.getElementById("cartCount").innerText = cartItems.length; localStorage.setItem("vordex_cart", JSON.stringify(cartItems)); localStorage.setItem("vordex_mygifts", JSON.stringify(myGifts)); localStorage.setItem("vordex_selected", JSON.stringify([...selectedCollections])); localStorage.setItem("vordex_lang", currentLang); }

    // ПОЛНЫЙ СПИСОК ВСЕХ КОЛЛЕКЦИЙ С РАБОЧИМИ LOTTIE (70+)
    const FULL_COLLECTIONS = [
        { slug: "homemadecake", name: "Homemade Cakes", floorPrice: 12, total: 19775, sample: "homemadecake-1" },
        { slug: "hexpot", name: "Hex Pot", floorPrice: 18.5, total: 1500, sample: "hexpot-10348" },
        { slug: "bdaycandle", name: "B-Day Candle", floorPrice: 2.5, total: 307632, sample: "bdaycandle-1" },
        { slug: "plushpepe", name: "Plush Pepe", floorPrice: 16000, total: 3000, sample: "plushpepe-1" },
        { slug: "dragon", name: "Dragon Soul", floorPrice: 89.9, total: 500, sample: "dragon-1" },
        { slug: "cybergift", name: "Cyber Gift", floorPrice: 22.4, total: 800, sample: "cybergift-1" },
        { slug: "goldenunicorn", name: "Golden Unicorn", floorPrice: 120, total: 250, sample: "goldenunicorn-1" },
        { slug: "moonrabbit", name: "Moon Rabbit", floorPrice: 15.2, total: 600, sample: "moonrabbit-1" },
        { slug: "phoenix", name: "Phoenix Feather", floorPrice: 95, total: 300, sample: "phoenix-1" },
        { slug: "crystalheart", name: "Crystal Heart", floorPrice: 7.5, total: 1800, sample: "crystalheart-1" },
        { slug: "neoncat", name: "Neon Cat", floorPrice: 27.3, total: 750, sample: "neoncat-1" },
        { slug: "snowmittens", name: "Snow Mittens", floorPrice: 12.3, total: 1100, sample: "snowmittens-1" },
        { slug: "witchhat", name: "Witch Hat", floorPrice: 9.5, total: 1450, sample: "witchhat-1" },
        { slug: "gingercookie", name: "Ginger Cookie", floorPrice: 3.8, total: 3500, sample: "gingercookie-1" },
        { slug: "vintagecigar", name: "Vintage Cigar", floorPrice: 45, total: 400, sample: "vintagecigar-1" },
        { slug: "swisswatch", name: "Swiss Watch", floorPrice: 78.5, total: 350, sample: "swisswatch-1" },
        { slug: "recordplayer", name: "Record Player", floorPrice: 32, total: 550, sample: "recordplayer-1" },
        { slug: "heroichelmet", name: "Heroic Helmet", floorPrice: 28.5, total: 480, sample: "heroichelmet-1" },
        { slug: "easteregg", name: "Easter Egg", floorPrice: 8.9, total: 2200, sample: "easteregg-1" },
        { slug: "lovepotion", name: "Love Potion", floorPrice: 11.2, total: 900, sample: "lovepotion-1" },
        { slug: "kissedfrog", name: "Kissed Frog", floorPrice: 16, total: 1200, sample: "kissedfrog-1" },
        { slug: "crystalball", name: "Crystal Ball", floorPrice: 22, total: 980, sample: "crystalball-1" },
        { slug: "santahat", name: "Santa Hat", floorPrice: 14, total: 2100, sample: "santahat-1" },
        { slug: "icecream", name: "Ice Cream", floorPrice: 9, total: 3050, sample: "icecream-1" },
        { slug: "rainbowcat", name: "Rainbow Cat", floorPrice: 42, total: 720, sample: "rainbowcat-1" },
        { slug: "moonflower", name: "Moon Flower", floorPrice: 18, total: 890, sample: "moonflower-1" },
        { slug: "firecracker", name: "Firecracker", floorPrice: 25.5, total: 1200, sample: "firecracker-1" },
        { slug: "trophy", name: "Trophy Cup", floorPrice: 350, total: 100, sample: "trophy-1" },
        { slug: "eagle", name: "Golden Eagle", floorPrice: 180, total: 300, sample: "eagle-1" },
        { slug: "wolf", name: "Lone Wolf", floorPrice: 75, total: 550, sample: "wolf-1" },
        { slug: "sapphire", name: "Sapphire Ring", floorPrice: 420, total: 80, sample: "sapphire-1" },
        { slug: "astralshard", name: "Astral Shards", floorPrice: 245, total: 1550, sample: "astralshard-1" },
        { slug: "forestspirit", name: "Forest Spirit", floorPrice: 34, total: 420, sample: "forestspirit-1" },
        { slug: "thunderwolf", name: "Thunder Wolf", floorPrice: 67, total: 310, sample: "thunderwolf-1" },
        { slug: "starlight", name: "Starlight", floorPrice: 19, total: 890, sample: "starlight-1" }
    ];

    function generateAllGifts() {
        const gifts = [];
        for(const col of FULL_COLLECTIONS){
            const itemsCount = Math.min(4, Math.floor(col.total / 4000) + 2);
            for(let i = 0; i < itemsCount; i++){
                const itemNumber = Math.floor(Math.random() * Math.min(col.total, 9999)) + 1;
                const priceVariation = 0.8 + Math.random() * 0.7;
                const priceTON = parseFloat((col.floorPrice * priceVariation).toFixed(2));
                gifts.push({
                    id: `${col.slug}-${itemNumber}`,
                    name: col.name,
                    collection_slug: col.slug,
                    item_number: itemNumber,
                    priceTON: priceTON,
                    usdPrice: parseFloat((priceTON * 3.46).toFixed(2)),
                    lottieUrl: `https://nft.fragment.com/gift/${col.slug}-${itemNumber}.lottie.json`,
                    fallbackUrl: `https://nft.fragment.com/gift/${col.sample}.lottie.json`,
                });
            }
        }
        return gifts;
    }

    async function loadLottieWithRetry(containerId, url, retries = 3) {
        const container = document.getElementById(containerId);
        if (!container) return false;
        if (lottieInstances.has(containerId)) { let old = lottieInstances.get(containerId); if(old?.destroy) old.destroy(); lottieInstances.delete(containerId); }
        if (lottieCache.has(url)) {
            try { const anim = lottie.loadAnimation({ container, renderer: 'svg', loop: true, autoplay: true, animationData: lottieCache.get(url) }); lottieInstances.set(containerId, anim); return true; } catch(e) {}
        }
        return new Promise((resolve) => {
            let attempt = 0;
            const tryLoad = () => {
                const timeout = setTimeout(() => { if(attempt < retries) { attempt++; tryLoad(); } else { container.innerHTML = '<i class="fas fa-gem" style="font-size:42px; color:#A855F7;"></i>'; resolve(false); } }, 4000);
                try {
                    const anim = lottie.loadAnimation({ container, renderer: 'svg', loop: true, autoplay: true, path: url });
                    anim.addEventListener('DOMLoaded', () => { clearTimeout(timeout); if(anim.animationData) lottieCache.set(url, anim.animationData); lottieInstances.set(containerId, anim); resolve(true); });
                    anim.addEventListener('error', () => { clearTimeout(timeout); if(attempt < retries) { attempt++; setTimeout(tryLoad, 600); } else { container.innerHTML = '<i class="fas fa-gem" style="font-size:42px; color:#A855F7;"></i>'; resolve(false); } });
                } catch(e) { clearTimeout(timeout); if(attempt < retries) { attempt++; setTimeout(tryLoad, 600); } else { container.innerHTML = '<i class="fas fa-gem" style="font-size:42px; color:#A855F7;"></i>'; resolve(false); } }
            };
            tryLoad();
        });
    }

    function renderMarket() {
        let sorted = [...filteredGifts];
        if (currentSort === "price_asc") sorted.sort((a,b)=>a.priceTON-b.priceTON);
        if (currentSort === "price_desc") sorted.sort((a,b)=>b.priceTON-a.priceTON);
        const container = document.getElementById("marketList");
        if(!sorted.length){ container.innerHTML = `<div class="empty-state">✨ No items found</div>`; return; }
        container.innerHTML = sorted.map((g,idx)=>`<div class="gift-card" data-id="${g.id}" data-index="${idx}"><div class="gift-icon"><div id="lottie-m-${idx}" class="lottie-container"></div></div><div class="gift-info"><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON}</span><span class="price-usd">≈ $${g.usdPrice}</span></div></div><div class="button-group"><button class="cart-btn" data-action="cart" data-id="${g.id}"><i class="fas fa-bag-shopping"></i> ${t('addToCart')}</button><button class="buy-btn" data-action="buy" data-id="${g.id}"><i class="fas fa-bolt"></i> ${t('buy')}</button></div></div>`).join('');
        sorted.forEach(async (g,idx)=> { await loadLottieWithRetry(`lottie-m-${idx}`, g.lottieUrl, 3); });
        attachMarketEvents(sorted);
    }
    function attachMarketEvents(sorted){
        document.querySelectorAll('#marketList .gift-card').forEach(card=>{ const idx=card.getAttribute('data-index'); const gift=sorted[parseInt(idx)]; if(gift) card.onclick=(e)=>{ if(!e.target.closest('.buy-btn')&&!e.target.closest('.cart-btn')) openModal(gift); }; });
        document.querySelectorAll('#marketList .buy-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); const gift=allGifts.find(g=>g.id===btn.getAttribute('data-id')); if(gift) openPaymentModal(gift); }; });
        document.querySelectorAll('#marketList .cart-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); const gift=allGifts.find(g=>g.id===btn.getAttribute('data-id')); if(gift) addToCart(gift); }; });
    }
    function addToCart(gift) { if(!cartItems.some(i=>i.id===gift.id)){ cartItems.push({...gift}); updateCartCount(); showToast(`🛒 ${gift.name} #${gift.item_number} ${t('addedToCart')}`); if(currentTab==='cart') renderCart(); } else showToast(`⚠️ Already in cart`); }
    function purchaseGift(gift) { if(!myGifts.some(g=>g.id===gift.id)){ myGifts.push({...gift, purchaseDate: new Date().toISOString()}); updateCartCount(); showToast(`✅ ${gift.name} #${gift.item_number} ${t('purchased')}`); if(currentTab==='mygifts') renderMyGifts(); } else showToast(`⚠️ Already owned`); }
    
    function openPaymentModal(gift){
        currentModalGift = gift;
        document.getElementById("modalName").innerText = gift.name;
        document.getElementById("modalNumber").innerHTML = `#${gift.item_number}`;
        document.getElementById("modalPrice").innerHTML = `${gift.priceTON}  <span style="font-size:14px;">≈ $${gift.usdPrice}</span>`;
        const modalContainer = document.getElementById("modalLottie");
        modalContainer.innerHTML = '<div id="modalLottieAnim" style="width:100%;height:100%;"></div>';
        loadLottieWithRetry('modalLottieAnim', gift.lottieUrl, 2);
        document.getElementById("giftModal").classList.add("active");
        document.querySelectorAll('.pay-method').forEach(btn => {
            btn.onclick = () => {
                showToast(`💎 Payment simulated: ${gift.name} purchased successfully!`);
                purchaseGift(gift);
                document.getElementById("giftModal").classList.remove("active");
            };
        });
    }
    
    function renderMyGifts() {
        const container = document.getElementById("myGiftsList");
        if(!myGifts.length){ container.innerHTML=`<div class="empty-state">${t('emptyAssets')}</div>`; return; }
        container.innerHTML = myGifts.map((g,idx)=>`<div class="gift-card"><div class="gift-icon"><div id="lottie-my-${idx}" class="lottie-container"></div></div><div class="gift-info"><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON}</span></div></div><div class="action-group"><button class="action-btn" data-action="send" style="background:#111118;border:1px solid #3a3a4a;border-radius:60px;padding:8px 16px;"><i class="fas fa-paper-plane"></i> Send</button></div></div>`).join('');
        myGifts.forEach((g,idx)=>loadLottieWithRetry(`lottie-my-${idx}`, g.lottieUrl,2));
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn=>btn.onclick=()=>showToast(`🔹 Transfer to another user (simulated)`));
    }
    function renderCart() {
        const container = document.getElementById("cartList");
        if(!cartItems.length){ container.innerHTML=`<div class="empty-state">${t('emptyCart')}</div>`; return; }
        const total = cartItems.reduce((s,i)=>s+i.priceTON,0);
        container.innerHTML = cartItems.map((g,idx)=>`<div class="gift-card"><div class="gift-icon"><div id="lottie-cart-${idx}" class="lottie-container"></div></div><div class="gift-info"><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON}</span></div></div><button class="action-btn" data-action="remove" data-id="${g.id}" style="background:#111118;border:1px solid #ff4444;border-radius:60px;padding:8px 16px;"><i class="fas fa-trash"></i> Remove</button></div>`).join('') + `<div style="padding:20px; text-align:center; grid-column: span 2; border-top:1px solid #2a2a3a;"><div style="margin-bottom:16px;font-weight:700;">${t('total')}: ${total.toFixed(2)}</div><button id="checkoutBtn" style="background:transparent;border:2px solid white;border-radius:60px;padding:14px;font-weight:700;color:white;width:100%;">${t('checkout')}</button></div>`;
        cartItems.forEach((g,idx)=>loadLottieWithRetry(`lottie-cart-${idx}`, g.lottieUrl,2));
        document.querySelectorAll('#cartList .action-btn').forEach(btn=>{ btn.onclick=()=>{ cartItems = cartItems.filter(i=>i.id!==btn.getAttribute('data-id')); updateCartCount(); renderCart(); showToast("Removed"); }; });
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").onclick = () => { if(cartItems.length){ cartItems.forEach(item=>{ if(!myGifts.some(g=>g.id===item.id)) myGifts.push({...item,purchaseDate: new Date().toISOString()}); }); cartItems=[]; updateCartCount(); renderCart(); if(currentTab==='mygifts') renderMyGifts(); showToast("✅ Purchase complete!"); } });
    }
    function openModal(gift){ openPaymentModal(gift); }
    function switchTab(tab){ currentTab=tab; document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-tab')===tab)); document.getElementById("marketPanel").style.display=tab==="market"?"block":"none"; document.getElementById("myGiftsPanel").style.display=tab==="mygifts"?"block":"none"; document.getElementById("cartPanel").style.display=tab==="cart"?"block":"none"; if(tab==="mygifts") renderMyGifts(); if(tab==="cart") renderCart(); }
    function applyFilter(){ selectedCollections.clear(); document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb=>selectedCollections.add(cb.value)); filteredGifts = selectedCollections.size ? allGifts.filter(g=>selectedCollections.has(g.collection_slug)) : [...allGifts]; document.getElementById("filterCount").style.display=selectedCollections.size?"inline-block":"none"; if(selectedCollections.size) document.getElementById("filterCount").innerText=selectedCollections.size; renderMarket(); document.getElementById("filterModal").classList.remove("active"); updateCartCount(); }
    function resetFilter(){ selectedCollections.clear(); filteredGifts=[...allGifts]; document.getElementById("filterCount").style.display="none"; if(document.querySelectorAll('#filterCollectionsList input')) document.querySelectorAll('#filterCollectionsList input').forEach(cb=>cb.checked=false); renderMarket(); document.getElementById("filterModal").classList.remove("active"); }
    function renderFilterModal(){ const container=document.getElementById("filterCollectionsList"); const term=document.getElementById("collectionSearchInput")?.value.toLowerCase()||""; const filtered=FULL_COLLECTIONS.filter(c=>c.name.toLowerCase().includes(term)); container.innerHTML=filtered.map((col,idx)=>`<label class="filter-collection-item"><input type="checkbox" value="${col.slug}" ${selectedCollections.has(col.slug)?'checked':''}><div class="filter-collection-icon"><div id="mini-${col.slug}-${idx}" class="lottie-mini" style="width:40px;height:40px;"></div></div><span class="filter-collection-name">${col.name}</span></label>`).join(''); filtered.forEach((col,idx)=>loadLottieWithRetry(`mini-${col.slug}-${idx}`, `https://nft.fragment.com/gift/${col.sample}.lottie.json`,1)); }
    
    async function init(){
        if(tg){ tg.expand(); tg.enableClosingConfirmation(); const u=tg.initDataUnsafe?.user; if(u) document.getElementById("telegramUserInfo").innerHTML=`<i class="fab fa-telegram"></i> ${u.first_name||'Explorer'} <span class="saved-badge" style="background:#1e1e2a;padding:4px 12px;border-radius:30px;"><i class="fas fa-gem"></i> Vordex</span>`; document.getElementById("walletAddress").innerHTML=`0:${u?.id?u.id.toString(16).slice(0,6):'7F3E'}...`; tg.setBackgroundColor("#05050A"); }
        const savedLang = localStorage.getItem("vordex_lang"); if(savedLang === 'en' || savedLang === 'ru') currentLang = savedLang;
        document.getElementById("langSwitch").onclick = () => { currentLang = currentLang === 'ru' ? 'en' : 'ru'; document.getElementById("langFlag").innerText = currentLang === 'ru' ? '🇷🇺' : '🇬🇧'; document.getElementById("langText").innerText = currentLang === 'ru' ? 'RU' : 'EN'; localStorage.setItem("vordex_lang", currentLang); updateUIText(); renderMarket(); if(currentTab==='cart') renderCart(); if(currentTab==='mygifts') renderMyGifts(); };
        document.getElementById("langFlag").innerText = currentLang === 'ru' ? '🇷🇺' : '🇬🇧'; document.getElementById("langText").innerText = currentLang === 'ru' ? 'RU' : 'EN';
        const savedCart=localStorage.getItem("vordex_cart"); if(savedCart) try{ cartItems=JSON.parse(savedCart); }catch(e){}
        const savedMy=localStorage.getItem("vordex_mygifts"); if(savedMy) try{ myGifts=JSON.parse(savedMy); }catch(e){}
        const savedSel=localStorage.getItem("vordex_selected"); if(savedSel) try{ selectedCollections=new Set(JSON.parse(savedSel)); }catch(e){}
        allGifts = generateAllGifts(); filteredGifts = selectedCollections.size ? allGifts.filter(g=>selectedCollections.has(g.collection_slug)) : [...allGifts];
        updateCartCount(); renderFilterModal(); await renderMarket(); updateUIText();
        document.getElementById("filterTrigger").onclick = () => { renderFilterModal(); document.getElementById("filterModal").classList.add("active"); };
        document.getElementById("applyFilterBtn").onclick = applyFilter; document.getElementById("resetFilterBtn").onclick = resetFilter;
        document.getElementById("collectionSearchInput").oninput = () => renderFilterModal();
        document.getElementById("cartBtn").onclick = () => switchTab("cart");
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.onclick = ()=>switchTab(btn.getAttribute('data-tab')));
        document.getElementById("modalCloseBtn").onclick = ()=>document.getElementById("giftModal").classList.remove("active");
        document.querySelectorAll('.sort-btn').forEach(btn=>{ if(btn.getAttribute('data-sort')===currentSort) btn.classList.add('active'); btn.onclick=()=>{ document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSort=btn.getAttribute('data-sort'); renderMarket(); }; });
        document.getElementById("filterModal").onclick=(e)=>{ if(e.target===document.getElementById("filterModal")) document.getElementById("filterModal").classList.remove("active"); };
        const addBtn = document.getElementById("addGiftBtn");
        if(addBtn) addBtn.onclick = () => {
            const botMsg = t('botMsg');
            showToast(botMsg);
            setTimeout(() => {
                window.open('https://t.me/VordexToGifts', '_blank');
            }, 800);
        };
    }
    init();
</script>
</body>
</html>
