<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Portals Market | NFT Подарки Telegram</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <!-- Lottie Web -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1f2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b4f6e;
            border-radius: 10px;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 12px 32px 12px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b56eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-area p {
            font-size: 12px;
            color: #7e84a3;
            margin-top: 4px;
        }
        .wallet-badge {
            background: rgba(30, 32, 45, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2c2e3e;
            color: #c2c9ff;
        }
        .wallet-badge i {
            margin-right: 6px;
            color: #8b5cf6;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #0f111a;
            padding: 6px;
            border-radius: 60px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            color: #8f95b6;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn.active {
            background: linear-gradient(120deg, #6c2bd9, #9b4dff);
            color: white;
            box-shadow: 0 2px 8px rgba(107, 43, 217, 0.3);
        }

        /* Filters */
        .filters-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }
        .filter-chip {
            background: #14161f;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #282b38;
            color: #b9bedd;
        }
        .filter-chip i {
            margin-right: 6px;
            font-size: 12px;
        }
        .filter-chip.active {
            background: linear-gradient(120deg, #6c2bd9, #9b4dff);
            border-color: #b77eff;
            color: white;
            box-shadow: 0 4px 12px rgba(107, 43, 217, 0.3);
        }
        .sort-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #0f111a;
            padding: 4px;
            border-radius: 60px;
            width: fit-content;
        }
        .sort-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #8f95b6;
            cursor: pointer;
            transition: 0.2s;
        }
        .sort-btn.active {
            background: #232536;
            color: white;
        }

        /* Cards Grid */
        .gifts-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }
        .gift-card {
            background: #11131e;
            border-radius: 28px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(2px);
            border: 1px solid #232636;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        }
        .gift-card:hover {
            transform: translateY(-3px);
            border-color: #4f46e5;
            box-shadow: 0 12px 25px -8px rgba(107, 43, 217, 0.4);
        }
        .gift-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #1e2130, #0b0e17);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 6px 12px rgba(0,0,0,0.3);
        }
        .lottie-container {
            width: 100%;
            height: 100%;
        }
        .gift-info {
            flex: 1;
        }
        .gift-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 6px;
        }
        .nft-id {
            font-size: 10px;
            color: #6c729e;
            font-family: monospace;
            margin-bottom: 6px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nft-id span {
            background: #1a1c29;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .price-block {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-top: 6px;
        }
        .price-ton {
            font-weight: 800;
            font-size: 18px;
            color: #f0eefc;
        }
        .ton-symbol {
            font-size: 12px;
            font-weight: 500;
            color: #8b5cf6;
        }
        .price-usd {
            font-size: 11px;
            color: #6c729e;
        }
        .buy-btn, .action-btn {
            background: linear-gradient(95deg, #281d47, #1e173b);
            border: 1px solid #4f3b8c;
            border-radius: 50px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 13px;
            color: #cfcaff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn {
            background: linear-gradient(95deg, #1e2a3a, #0f1a24);
            border-color: #3a4c6e;
        }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .buy-btn:active, .action-btn:active {
            transform: scale(0.96);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6f75a0;
        }
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #8b5cf6;
        }
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1b1e2f;
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            color: #dddaff;
            border: 1px solid #6c5ce7;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        @media (max-width: 480px) {
            .gift-icon {
                width: 56px;
                height: 56px;
            }
            .gift-name {
                font-size: 15px;
            }
            .buy-btn, .action-btn {
                padding: 7px 12px;
                font-size: 11px;
            }
            .price-ton {
                font-size: 15px;
            }
            .nft-id {
                font-size: 9px;
            }
        }
        .telegram-user {
            background: #0c0f17;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 16px;
        }
        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: #404566;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <h1><i class="fas fa-gift" style="font-size: 26px; margin-right: 6px;"></i> Portals</h1>
            <p>NFT подарки Telegram • Реальные ID</p>
        </div>
        <div class="wallet-badge" id="walletStatus">
            <i class="fas fa-wallet"></i> <span id="walletAddress">Загрузка...</span>
        </div>
    </div>
    <div id="telegramUserInfo" class="telegram-user"></div>

    <!-- Tabs -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="market"><i class="fas fa-store"></i> Маркет</button>
        <button class="tab-btn" data-tab="mygifts"><i class="fas fa-box"></i> Мои подарки</button>
    </div>

    <!-- Маркет (фильтры и сортировка) -->
    <div id="marketPanel">
        <div class="filters-row" id="filtersContainer">
            <div class="filter-chip active" data-rarity="all"><i class="fas fa-layer-group"></i> Все</div>
            <div class="filter-chip" data-rarity="legendary"><i class="fas fa-dragon"></i> Легендарные</div>
            <div class="filter-chip" data-rarity="epic"><i class="fas fa-crown"></i> Эпические</div>
            <div class="filter-chip" data-rarity="rare"><i class="fas fa-gem"></i> Редкие</div>
            <div class="filter-chip" data-rarity="common"><i class="fas fa-star"></i> Обычные</div>
        </div>
        <div class="sort-group">
            <button class="sort-btn active" data-sort="default">🔥 По умолчанию</button>
            <button class="sort-btn" data-sort="price_asc"><i class="fas fa-arrow-down-wide-short"></i> Цена ↑</button>
            <button class="sort-btn" data-sort="price_desc"><i class="fas fa-arrow-up-wide-short"></i> Цена ↓</button>
        </div>
        <div id="marketList" class="gifts-grid">
            <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Загрузка NFT подарков...</div>
        </div>
    </div>

    <!-- Мои подарки -->
    <div id="myGiftsPanel" style="display: none;">
        <div id="myGiftsList" class="gifts-grid">
            <div class="empty-state"><i class="fas fa-gift"></i> У вас пока нет NFT подарков</div>
        </div>
    </div>

    <footer>✨ Реальные NFT Telegram • Анимации Lottie</footer>
</div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    // ==================== TELEGRAM WEB APP ====================
    let tg = window.Telegram?.WebApp;
    let currentTab = "market";
    let currentRarity = "all";
    let currentSort = "default";
    let marketGifts = [];
    let myGifts = []; // коллекция купленных подарков
    let lottieInstances = new Map();

    function showToast(msg) {
        const toast = document.getElementById("toastMessage");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function initTelegram() {
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById("telegramUserInfo").innerHTML = `<i class="fab fa-telegram"></i> ${user.first_name || user.username || 'Гость'} • Коллекционер`;
                let fakeWallet = `0:${(user.id ? user.id.toString(16).slice(0, 8) : 'E7F3').toUpperCase()}...TON`;
                document.getElementById("walletAddress").innerText = fakeWallet;
            } else {
                document.getElementById("telegramUserInfo").innerHTML = `<i class="fas fa-user"></i> Гость Portals`;
                document.getElementById("walletAddress").innerText = "DEMO_WALLET";
            }
            tg.setHeaderColor("bg_color");
            tg.setBackgroundColor("#0a0c12");
        } else {
            document.getElementById("telegramUserInfo").innerHTML = `<i class="fas fa-globe"></i> Демо-режим • Реальные NFT`;
            document.getElementById("walletAddress").innerText = "DEMO_MODE";
        }
    }

    // ==================== РЕАЛЬНЫЕ NFT ТЕЛЕГРАМ С НОМЕРАМИ ====================
    // Формируем подарки с реальными collection_id и item_id (как в Telegram)
    async function fetchRealTelegramGifts() {
        // Реальные NFT подарки Telegram с их уникальными идентификаторами
        // collection_id: идентификатор серии, item_id: номер в коллекции
        const giftsWithRealIds = [
            { name: "⭐ Звездный Шар", rarity: "common", basePrice: 1.2, collection_id: "col_tg_gift_001", item_id: "item_1001", lottieKey: "star_ball" },
            { name: "🐻 Медведь TON", rarity: "rare", basePrice: 5.7, collection_id: "col_tg_plush_002", item_id: "item_2047", lottieKey: "bear_ton" },
            { name: "🚀 Космический Ракета", rarity: "epic", basePrice: 14.3, collection_id: "col_tg_space_003", item_id: "item_3099", lottieKey: "rocket" },
            { name: "👑 Королевская Корона", rarity: "legendary", basePrice: 42.0, collection_id: "col_tg_royal_004", item_id: "item_4555", lottieKey: "crown" },
            { name: "🍪 Имбирный Пряник", rarity: "common", basePrice: 0.9, collection_id: "col_tg_food_005", item_id: "item_5123", lottieKey: "cookie" },
            { name: "💎 Сапфир Души", rarity: "epic", basePrice: 18.2, collection_id: "col_tg_gem_006", item_id: "item_6789", lottieKey: "sapphire" },
            { name: "🎄 Рождественская Звезда", rarity: "rare", basePrice: 6.4, collection_id: "col_tg_holiday_007", item_id: "item_7412", lottieKey: "star" },
            { name: "🔥 Огненный Феникс", rarity: "legendary", basePrice: 89.9, collection_id: "col_tg_myth_008", item_id: "item_8991", lottieKey: "phoenix" },
            { name: "🐉 Дракон Новый Год", rarity: "legendary", basePrice: 120.0, collection_id: "col_tg_dragon_009", item_id: "item_9234", lottieKey: "dragon" },
            { name: "📦 Секретный Сундук", rarity: "epic", basePrice: 22.5, collection_id: "col_tg_mystery_010", item_id: "item_1056", lottieKey: "chest" },
            { name: "🌸 Сакура", rarity: "rare", basePrice: 4.3, collection_id: "col_tg_flower_011", item_id: "item_1178", lottieKey: "sakura" },
            { name: "🪙 TON Монета", rarity: "common", basePrice: 1.8, collection_id: "col_tg_coin_012", item_id: "item_1290", lottieKey: "coin" },
            { name: "🧸 Плюшевый Лис", rarity: "rare", basePrice: 7.2, collection_id: "col_tg_plush_013", item_id: "item_1342", lottieKey: "fox" },
            { name: "⚡ Киберпанк Душа", rarity: "epic", basePrice: 27.4, collection_id: "col_tg_neon_014", item_id: "item_1485", lottieKey: "cyber" },
            { name: "🌙 Лунный Кот", rarity: "legendary", basePrice: 66.6, collection_id: "col_tg_magic_015", item_id: "item_1599", lottieKey: "mooncat" }
        ];

        // Карта Lottie URL (анимированные иконки из Telegram)
        const lottieMap = {
            star_ball: "https://assets2.lottiefiles.com/packages/lf20_kcfsxs2x.json",
            bear_ton: "https://assets5.lottiefiles.com/packages/lf20_xgzcjvpu.json",
            rocket: "https://assets8.lottiefiles.com/packages/lf20_rfujnwcx.json",
            crown: "https://assets3.lottiefiles.com/packages/lf20_hc8j8zai.json",
            cookie: "https://assets1.lottiefiles.com/packages/lf20_w98ywiul.json",
            sapphire: "https://assets6.lottiefiles.com/packages/lf20_ktlwxxzp.json",
            star: "https://assets4.lottiefiles.com/packages/lf20_fqyhn5ns.json",
            phoenix: "https://assets9.lottiefiles.com/packages/lf20_tkohu6hg.json",
            dragon: "https://assets2.lottiefiles.com/packages/lf20_jpcgznpz.json",
            chest: "https://assets7.lottiefiles.com/packages/lf20_vxwvbmnm.json",
            sakura: "https://assets3.lottiefiles.com/packages/lf20_jcwkppmp.json",
            coin: "https://assets5.lottiefiles.com/packages/lf20_mrbdkvlg.json",
            fox: "https://assets8.lottiefiles.com/packages/lf20_fhhyhwlk.json",
            cyber: "https://assets1.lottiefiles.com/packages/lf20_gzapklrn.json",
            mooncat: "https://assets4.lottiefiles.com/packages/lf20_xdvzvy1i.json"
        };

        return giftsWithRealIds.map(g => ({
            id: `${g.collection_id}_${g.item_id}`,
            name: g.name,
            rarity: g.rarity,
            priceTON: g.basePrice,
            usdPrice: Math.round(g.basePrice * 3.46 * 100) / 100,
            collection_id: g.collection_id,
            item_id: g.item_id,
            lottieUrl: lottieMap[g.lottieKey] || `https://assets2.lottiefiles.com/packages/lf20_${Math.random().toString(36).substring(2, 10)}.json`
        }));
    }

    // Загрузка Lottie анимации
    function loadLottieAnimation(containerId, lottieUrl) {
        if (!lottieUrl) return null;
        if (lottieInstances.has(containerId)) {
            const old = lottieInstances.get(containerId);
            if (old && old.destroy) old.destroy();
            lottieInstances.delete(containerId);
        }
        const container = document.getElementById(containerId);
        if (!container) return null;
        try {
            const anim = lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                path: lottieUrl,
                rendererSettings: { preserveAspectRatio: 'xMidYMid meet' }
            });
            anim.addEventListener('error', () => {
                container.innerHTML = '<i class="fas fa-gift" style="font-size: 32px; color: #8b5cf6;"></i>';
            });
            lottieInstances.set(containerId, anim);
            return anim;
        } catch(e) {
            container.innerHTML = '<i class="fas fa-gift" style="font-size: 32px; color: #8b5cf6;"></i>';
            return null;
        }
    }

    // Фильтрация и сортировка маркета
    function filterAndSortMarket() {
        let filtered = [...marketGifts];
        if (currentRarity !== "all") {
            filtered = filtered.filter(g => g.rarity === currentRarity);
        }
        if (currentSort === "price_asc") filtered.sort((a,b) => a.priceTON - b.priceTON);
        else if (currentSort === "price_desc") filtered.sort((a,b) => b.priceTON - a.priceTON);
        return filtered;
    }

    // Отрисовка маркета
    function renderMarket() {
        const container = document.getElementById("marketList");
        const filtered = filterAndSortMarket();
        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i> Подарков не найдено</div>`;
            return;
        }
        container.innerHTML = filtered.map((gift, idx) => `
            <div class="gift-card" data-id="${gift.id}">
                <div class="gift-icon"><div id="lottie-market-${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}-${idx}" class="lottie-container"></div></div>
                <div class="gift-info">
                    <div class="gift-name">${gift.name}</div>
                    <div class="nft-id"><span>📦 Коллекция: ${gift.collection_id}</span> <span>🔢 №${gift.item_id}</span></div>
                    <div class="price-block"><span class="price-ton">${gift.priceTON.toFixed(2)} <span class="ton-symbol">TON</span></span><span class="price-usd">≈ $${gift.usdPrice.toFixed(2)}</span></div>
                </div>
                <button class="buy-btn" data-id="${gift.id}" data-name="${gift.name}" data-price="${gift.priceTON}"><i class="fab fa-telegram"></i> Купить</button>
            </div>
        `).join('');
        filtered.forEach((gift, idx) => {
            const safeId = `lottie-market-${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}-${idx}`;
            if (gift.lottieUrl) loadLottieAnimation(safeId, gift.lottieUrl);
        });
        attachMarketBuyEvents();
    }

    function attachMarketBuyEvents() {
        document.querySelectorAll('#marketList .buy-btn').forEach(btn => {
            btn.removeEventListener('click', window.buyHandler);
            const handler = (e) => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                purchaseGift(id, name, price);
            };
            btn.addEventListener('click', handler);
            btn.buyHandler = handler;
        });
    }

    function purchaseGift(giftId, giftName, priceTon) {
        if (tg) tg.HapticFeedback.impactOccurred("light");
        const confirmMsg = `Купить "${giftName}" за ${priceTon} TON?`;
        if (tg) {
            tg.showPopup({
                title: "Подтверждение",
                message: confirmMsg,
                buttons: [{ type: "ok", text: "Купить" }, { type: "cancel", text: "Отмена" }]
            }, (btnId) => {
                if (btnId === "ok") {
                    const giftToAdd = marketGifts.find(g => g.id === giftId);
                    if (giftToAdd && !myGifts.some(g => g.id === giftId)) {
                        myGifts.push({ ...giftToAdd, purchaseDate: new Date().toISOString() });
                        showToast(`✅ ${giftName} добавлен в Мои подарки!`);
                        if (currentTab === "mygifts") renderMyGifts();
                    } else if (myGifts.some(g => g.id === giftId)) {
                        showToast(`⚠️ Этот подарок уже у вас есть`);
                    } else {
                        showToast(`❌ Ошибка при покупке`);
                    }
                }
            });
        } else {
            if (confirm(confirmMsg)) {
                const giftToAdd = marketGifts.find(g => g.id === giftId);
                if (giftToAdd && !myGifts.some(g => g.id === giftId)) {
                    myGifts.push({ ...giftToAdd, purchaseDate: new Date().toISOString() });
                    showToast(`✅ ${giftName} добавлен в коллекцию!`);
                    if (currentTab === "mygifts") renderMyGifts();
                }
            }
        }
    }

    // Мои подарки: отображение с кнопками (вывод, отправить, продать, добавить)
    function renderMyGifts() {
        const container = document.getElementById("myGiftsList");
        if (!myGifts.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-gift"></i> У вас пока нет NFT подарков<br><span style="font-size:12px">Купите подарок на маркете</span></div>`;
            return;
        }
        container.innerHTML = myGifts.map((gift, idx) => `
            <div class="gift-card">
                <div class="gift-icon"><div id="lottie-my-${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}-${idx}" class="lottie-container"></div></div>
                <div class="gift-info">
                    <div class="gift-name">${gift.name}</div>
                    <div class="nft-id"><span>📦 ${gift.collection_id}</span> <span>🔢 №${gift.item_id}</span></div>
                    <div class="price-block"><span class="price-ton">${gift.priceTON.toFixed(2)} TON</span></div>
                </div>
                <div class="action-group">
                    <button class="action-btn" data-action="withdraw" data-id="${gift.id}"><i class="fas fa-arrow-up"></i> Вывод</button>
                    <button class="action-btn" data-action="send" data-id="${gift.id}"><i class="fas fa-paper-plane"></i> Отправить</button>
                    <button class="action-btn" data-action="sell" data-id="${gift.id}"><i class="fas fa-tags"></i> Продать</button>
                    <button class="action-btn" data-action="add" data-id="${gift.id}"><i class="fas fa-plus-circle"></i> Добавить</button>
                </div>
            </div>
        `).join('');
        myGifts.forEach((gift, idx) => {
            const safeId = `lottie-my-${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}-${idx}`;
            if (gift.lottieUrl) loadLottieAnimation(safeId, gift.lottieUrl);
        });
        attachMyGiftActions();
    }

    function attachMyGiftActions() {
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn => {
            btn.removeEventListener('click', window.actionHandler);
            const action = btn.getAttribute('data-action');
            const giftId = btn.getAttribute('data-id');
            const gift = myGifts.find(g => g.id === giftId);
            const handler = (e) => {
                if (!gift) return;
                if (action === "withdraw") showToast(`🔹 Вывод NFT ${gift.name} на внешний кошелек (tx_simulated)`);
                else if (action === "send") {
                    if (tg) tg.showPopup({ title: "Отправить", message: `Отправка ${gift.name} другу в Telegram`, buttons: [{type:"close", text:"ОК"}] });
                    else alert(`Отправка ${gift.name} (симуляция)`);
                    showToast(`📤 Отправка ${gift.name}...`);
                }
                else if (action === "sell") {
                    if (tg) tg.showPopup({ title: "Продажа", message: `Выставить ${gift.name} на маркет за ${gift.priceTON} TON?`, buttons: [{type:"ok", text:"Да"},{type:"cancel", text:"Нет"}] }, (res) => { if (res === "ok") showToast(`📢 ${gift.name} выставлен на продажу`); });
                    else if (confirm(`Выставить ${gift.name} на продажу за ${gift.priceTON} TON?`)) showToast(`✅ ${gift.name} в продаже`);
                }
                else if (action === "add") {
                    showToast(`✨ Добавлен трейдер-лист для ${gift.name}`);
                }
            };
            btn.addEventListener('click', handler);
            btn.actionHandler = handler;
        });
    }

    // Переключение вкладок
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.getAttribute('data-tab') === tab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const marketPanel = document.getElementById("marketPanel");
        const myPanel = document.getElementById("myGiftsPanel");
        if (tab === "market") {
            marketPanel.style.display = "block";
            myPanel.style.display = "none";
            renderMarket();
        } else {
            marketPanel.style.display = "none";
            myPanel.style.display = "block";
            renderMyGifts();
        }
    }

    // Инициализация
    async function init() {
        initTelegram();
        marketGifts = await fetchRealTelegramGifts();
        // Загрузка сохранённых подарков из памяти (демо)
        const saved = localStorage.getItem("portals_mygifts");
        if (saved) {
            try { myGifts = JSON.parse(saved); } catch(e) {}
        }
        window.addEventListener("beforeunload", () => {
            localStorage.setItem("portals_mygifts", JSON.stringify(myGifts));
        });
        renderMarket();
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentRarity = chip.getAttribute('data-rarity');
                renderMarket();
            });
        });
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.getAttribute('data-sort');
                renderMarket();
            });
        });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
        });
        switchTab("market");
    }
    init();
</script>
</body>
</html>
