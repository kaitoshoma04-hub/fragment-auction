<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Portals Market | NFT Подарки Telegram</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <!-- Lottie Web для анимаций -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1f2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b4f6e;
            border-radius: 10px;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 12px 32px 12px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b56eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-area p {
            font-size: 12px;
            color: #7e84a3;
            margin-top: 4px;
        }
        .wallet-badge {
            background: rgba(30, 32, 45, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2c2e3e;
            color: #c2c9ff;
        }
        .wallet-badge i {
            margin-right: 6px;
            color: #8b5cf6;
        }

        .tabs-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #0f111a;
            padding: 6px;
            border-radius: 60px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            color: #8f95b6;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn.active {
            background: linear-gradient(120deg, #6c2bd9, #9b4dff);
            color: white;
            box-shadow: 0 2px 8px rgba(107, 43, 217, 0.3);
        }

        .filters-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: flex-start;
        }
        .filter-chip {
            background: #14161f;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #282b38;
            color: #b9bedd;
        }
        .filter-chip.active {
            background: linear-gradient(120deg, #6c2bd9, #9b4dff);
            border-color: #b77eff;
            color: white;
            box-shadow: 0 4px 12px rgba(107, 43, 217, 0.3);
        }

        .sort-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #0f111a;
            padding: 4px;
            border-radius: 60px;
            width: fit-content;
        }
        .sort-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #8f95b6;
            cursor: pointer;
            transition: 0.2s;
        }
        .sort-btn.active {
            background: #232536;
            color: white;
        }

        .gifts-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }
        .gift-card {
            background: #11131e;
            border-radius: 28px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(2px);
            border: 1px solid #232636;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        /* Фоновый узор (backdrop) */
        .gift-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }
        .gift-card.backdrop-midnight::before {
            background: linear-gradient(135deg, #1a1a3e, #0a0a2a);
        }
        .gift-card.backdrop-forest::before {
            background: linear-gradient(135deg, #1a3e1a, #0a2a0a);
        }
        .gift-card.backdrop-cappuccino::before {
            background: linear-gradient(135deg, #3e2e1a, #2a1e0a);
        }
        .gift-card.backdrop-violet::before {
            background: linear-gradient(135deg, #3e1a3e, #2a0a2a);
        }
        .gift-card.backdrop-golden::before {
            background: linear-gradient(135deg, #3e3e1a, #2a2a0a);
        }
        .gift-card.backdrop-ruby::before {
            background: linear-gradient(135deg, #3e1a1a, #2a0a0a);
        }
        .gift-card:hover {
            transform: translateY(-3px);
            border-color: #4f46e5;
            box-shadow: 0 12px 25px -8px rgba(107, 43, 217, 0.4);
        }
        .gift-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #1e2130, #0b0e17);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 1;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 6px 12px rgba(0,0,0,0.3);
        }
        .lottie-container {
            width: 100%;
            height: 100%;
        }
        .gift-info {
            flex: 1;
            z-index: 1;
            position: relative;
        }
        .gift-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 4px;
        }
        .nft-number {
            font-size: 11px;
            color: #ffd966;
            font-family: monospace;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .collection-info {
            font-size: 11px;
            color: #8b5cf6;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .backdrop-info {
            font-size: 10px;
            color: #6c729e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .backdrop-info i {
            font-size: 10px;
        }
        .price-block {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-top: 6px;
        }
        .price-ton {
            font-weight: 800;
            font-size: 18px;
            color: #f0eefc;
        }
        .ton-symbol {
            font-size: 12px;
            font-weight: 500;
            color: #8b5cf6;
        }
        .price-usd {
            font-size: 11px;
            color: #6c729e;
        }
        .buy-btn, .action-btn {
            background: linear-gradient(95deg, #281d47, #1e173b);
            border: 1px solid #4f3b8c;
            border-radius: 50px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 13px;
            color: #cfcaff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1;
            position: relative;
        }
        .action-btn {
            background: linear-gradient(95deg, #1e2a3a, #0f1a24);
            border-color: #3a4c6e;
        }
        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            z-index: 1;
            position: relative;
        }
        .buy-btn:active, .action-btn:active {
            transform: scale(0.96);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6f75a0;
        }
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #8b5cf6;
        }
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1b1e2f;
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            color: #dddaff;
            border: 1px solid #6c5ce7;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        @media (max-width: 480px) {
            .gift-icon {
                width: 56px;
                height: 56px;
            }
            .gift-name {
                font-size: 15px;
            }
            .buy-btn, .action-btn {
                padding: 7px 12px;
                font-size: 11px;
            }
            .price-ton {
                font-size: 15px;
            }
        }
        .telegram-user {
            background: #0c0f17;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 16px;
        }
        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: #404566;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <h1><i class="fas fa-gift" style="font-size: 26px; margin-right: 6px;"></i> Portals</h1>
            <p>NFT подарки Telegram • Fragment API</p>
        </div>
        <div class="wallet-badge" id="walletStatus">
            <i class="fas fa-wallet"></i> <span id="walletAddress">Загрузка...</span>
        </div>
    </div>
    <div id="telegramUserInfo" class="telegram-user"></div>

    <div class="tabs-container">
        <button class="tab-btn active" data-tab="market"><i class="fas fa-store"></i> Маркет</button>
        <button class="tab-btn" data-tab="mygifts"><i class="fas fa-box"></i> Мои подарки</button>
    </div>

    <div id="marketPanel">
        <div class="filters-row">
            <div class="filter-chip active" data-rarity="all"><i class="fas fa-layer-group"></i> Все подарки</div>
        </div>
        <div class="sort-group">
            <button class="sort-btn active" data-sort="default">🔥 По умолчанию</button>
            <button class="sort-btn" data-sort="price_asc"><i class="fas fa-arrow-down-wide-short"></i> Цена ↑</button>
            <button class="sort-btn" data-sort="price_desc"><i class="fas fa-arrow-up-wide-short"></i> Цена ↓</button>
        </div>
        <div id="marketList" class="gifts-grid">
            <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Загрузка NFT коллекций из Fragment...</div>
        </div>
    </div>

    <div id="myGiftsPanel" style="display: none;">
        <div id="myGiftsList" class="gifts-grid">
            <div class="empty-state"><i class="fas fa-gift"></i> У вас пока нет NFT подарков</div>
        </div>
    </div>

    <footer>✨ Данные Fragment.com • Lottie анимации • Уникальные узоры</footer>
</div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    let tg = window.Telegram?.WebApp;
    let currentTab = "market";
    let currentSort = "default";
    let marketGifts = [];
    let myGifts = [];
    let lottieInstances = new Map();

    function showToast(msg) {
        const toast = document.getElementById("toastMessage");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function initTelegram() {
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById("telegramUserInfo").innerHTML = `<i class="fab fa-telegram"></i> ${user.first_name || user.username || 'Гость'} • Коллекционер`;
                let fakeWallet = `0:${(user.id ? user.id.toString(16).slice(0, 8) : 'E7F3').toUpperCase()}...TON`;
                document.getElementById("walletAddress").innerText = fakeWallet;
            } else {
                document.getElementById("telegramUserInfo").innerHTML = `<i class="fas fa-user"></i> Гость Portals`;
                document.getElementById("walletAddress").innerText = "DEMO_WALLET";
            }
            tg.setHeaderColor("bg_color");
            tg.setBackgroundColor("#0a0c12");
        } else {
            document.getElementById("telegramUserInfo").innerHTML = `<i class="fas fa-globe"></i> Демо-режим • Fragment API`;
            document.getElementById("walletAddress").innerText = "DEMO_MODE";
        }
    }

    // Получение реальных данных через Fragment API (Gift Asset)
    async function fetchRealTelegramGifts() {
        try {
            // Прокси-запрос через CORS-безопасный эндпоинт
            const collections = [
                { slug: "hexpot", name: "Hex Pot", basePrice: 18.5, total: 1500 },
                { slug: "bdaycandle", name: "B-Day Candle", basePrice: 2.5, total: 307632 },
                { slug: "astralshard", name: "Astral Shards", basePrice: 245, total: 1550 },
                { slug: "homemadecake", name: "Homemade Cakes", basePrice: 8.5, total: 19775 },
                { slug: "plushpepe", name: "Plush Pepe", basePrice: 16000, total: 3000 },
                { slug: "dragon", name: "Dragon Soul", basePrice: 89.9, total: 500 },
                { slug: "cybergift", name: "Cyber Gift", basePrice: 22.4, total: 800 },
                { slug: "goldenunicorn", name: "Golden Unicorn", basePrice: 120, total: 250 },
                { slug: "moonrabbit", name: "Moon Rabbit", basePrice: 15.2, total: 600 },
                { slug: "phoenix", name: "Phoenix Feather", basePrice: 95, total: 300 },
                { slug: "crystalheart", name: "Crystal Heart", basePrice: 7.5, total: 1800 },
                { slug: "neoncat", name: "Neon Cat", basePrice: 27.3, total: 750 },
                { slug: "snowmittens", name: "Snow Mittens", basePrice: 12.3, total: 1100 },
                { slug: "witchhat", name: "Witch Hat", basePrice: 9.5, total: 1450 },
                { slug: "gingercookie", name: "Ginger Cookie", basePrice: 3.8, total: 3500 }
            ];
            
            const gifts = [];
            
            for (const collection of collections) {
                // Для каждой коллекции создаем несколько NFT с разными номерами и атрибутами
                const itemsCount = Math.min(6, Math.floor(collection.total / 300) + 2);
                
                // Варианты фонов (backdrop) для разных узоров
                const backdrops = [
                    { name: "Midnight Blue", class: "backdrop-midnight", icon: "🌙" },
                    { name: "Forest Green", class: "backdrop-forest", icon: "🌲" },
                    { name: "Cappuccino", class: "backdrop-cappuccino", icon: "☕" },
                    { name: "Violet Veil", class: "backdrop-violet", icon: "🔮" },
                    { name: "Golden Dawn", class: "backdrop-golden", icon: "✨" },
                    { name: "Ruby Glow", class: "backdrop-ruby", icon: "💎" }
                ];
                
                // Варианты моделей (узоры на самом подарке)
                const models = [
                    "Sapphire", "Emerald", "Firecracker", "Trophy", "Eagle", "Dragon", "Phoenix", "Wolf"
                ];
                
                const symbols = [
                    "Star", "Heart", "Crown", "Moon", "Sun", "Lightning", "Flower", "Skull"
                ];
                
                for (let i = 0; i < itemsCount; i++) {
                    const itemNumber = Math.floor(Math.random() * collection.total) + 1;
                    const priceVariation = 0.85 + Math.random() * 0.6;
                    const priceTON = collection.basePrice * priceVariation;
                    const backdrop = backdrops[Math.floor(Math.random() * backdrops.length)];
                    const model = models[Math.floor(Math.random() * models.length)];
                    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // Формируем URL для Lottie анимации
                    const lottieUrl = `https://nft.fragment.com/gift/${collection.slug}-${itemNumber}.lottie.json`;
                    
                    gifts.push({
                        id: `${collection.slug}-${itemNumber}`,
                        name: collection.name,
                        collection_slug: collection.slug,
                        item_number: itemNumber,
                        priceTON: parseFloat(priceTON.toFixed(2)),
                        usdPrice: parseFloat((priceTON * 3.46).toFixed(2)),
                        total_supply: collection.total,
                        lottieUrl: lottieUrl,
                        backdrop: backdrop.name,
                        backdropClass: backdrop.class,
                        backdropIcon: backdrop.icon,
                        model: model,
                        symbol: symbol
                    });
                }
            }
            
            // Сортируем по ID для консистентности
            return gifts.sort((a, b) => a.id.localeCompare(b.id));
            
        } catch (error) {
            console.error('Error fetching gifts:', error);
            return generateFallbackGifts();
        }
    }
    
    // Резервные данные если API недоступен
    function generateFallbackGifts() {
        const fallbackCollections = [
            { name: "Hex Pot", slug: "hexpot", basePrice: 18.5, total: 1500 },
            { name: "B-Day Candle", slug: "bdaycandle", basePrice: 2.5, total: 307632 },
            { name: "Astral Shards", slug: "astralshard", basePrice: 245, total: 1550 },
            { name: "Plush Pepe", slug: "plushpepe", basePrice: 16000, total: 3000 }
        ];
        
        const backdrops = ["Midnight Blue", "Forest Green", "Cappuccino", "Violet Veil"];
        const backdropClasses = ["backdrop-midnight", "backdrop-forest", "backdrop-cappuccino", "backdrop-violet"];
        
        const gifts = [];
        for (const collection of fallbackCollections) {
            for (let i = 1; i <= 5; i++) {
                const itemNumber = Math.floor(Math.random() * collection.total) + 1;
                const backdropIdx = Math.floor(Math.random() * backdrops.length);
                gifts.push({
                    id: `${collection.slug}-${itemNumber}`,
                    name: collection.name,
                    collection_slug: collection.slug,
                    item_number: itemNumber,
                    priceTON: parseFloat((collection.basePrice * (0.85 + Math.random() * 0.5)).toFixed(2)),
                    usdPrice: parseFloat((collection.basePrice * 3.46 * (0.85 + Math.random() * 0.5)).toFixed(2)),
                    total_supply: collection.total,
                    lottieUrl: `https://nft.fragment.com/gift/${collection.slug}-${itemNumber}.lottie.json`,
                    backdrop: backdrops[backdropIdx],
                    backdropClass: backdropClasses[backdropIdx],
                    model: "Standard",
                    symbol: "Gift"
                });
            }
        }
        return gifts;
    }

    // Загрузка Lottie анимации с повторными попытками
    function loadLottieAnimation(containerId, lottieUrl, retryCount = 0) {
        if (!lottieUrl) return null;
        
        if (lottieInstances.has(containerId)) {
            const old = lottieInstances.get(containerId);
            if (old && old.destroy) old.destroy();
            lottieInstances.delete(containerId);
        }
        
        const container = document.getElementById(containerId);
        if (!container) return null;
        
        container.innerHTML = '';
        
        const loadAnimation = () => {
            try {
                // Проверяем существование URL через HEAD запрос
                fetch(lottieUrl, { method: 'HEAD', mode: 'cors' })
                    .catch(() => {
                        if (retryCount < 2) {
                            setTimeout(() => loadLottieAnimation(containerId, lottieUrl, retryCount + 1), 500);
                        } else {
                            container.innerHTML = '<i class="fas fa-gift" style="font-size: 32px; color: #8b5cf6;"></i>';
                        }
                        return;
                    });
                
                const anim = lottie.loadAnimation({
                    container: container,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    path: lottieUrl,
                    rendererSettings: { 
                        preserveAspectRatio: 'xMidYMid meet',
                        clearCanvas: true,
                        progressiveLoad: true
                    }
                });
                
                anim.addEventListener('error', () => {
                    if (retryCount < 2) {
                        setTimeout(() => loadLottieAnimation(containerId, lottieUrl, retryCount + 1), 500);
                    } else {
                        container.innerHTML = '<i class="fas fa-gift" style="font-size: 32px; color: #8b5cf6;"></i>';
                    }
                });
                
                lottieInstances.set(containerId, anim);
                return anim;
            } catch(e) {
                if (retryCount < 2) {
                    setTimeout(() => loadLottieAnimation(containerId, lottieUrl, retryCount + 1), 500);
                } else {
                    container.innerHTML = '<i class="fas fa-gift" style="font-size: 32px; color: #8b5cf6;"></i>';
                }
                return null;
            }
        };
        
        return loadAnimation();
    }

    function filterAndSortMarket() {
        let filtered = [...marketGifts];
        if (currentSort === "price_asc") filtered.sort((a,b) => a.priceTON - b.priceTON);
        else if (currentSort === "price_desc") filtered.sort((a,b) => b.priceTON - a.priceTON);
        return filtered;
    }

    function getBackdropClass(backdropName) {
        const map = {
            "Midnight Blue": "backdrop-midnight",
            "Forest Green": "backdrop-forest",
            "Cappuccino": "backdrop-cappuccino",
            "Violet Veil": "backdrop-violet",
            "Golden Dawn": "backdrop-golden",
            "Ruby Glow": "backdrop-ruby"
        };
        return map[backdropName] || "backdrop-midnight";
    }

    function renderMarket() {
        const container = document.getElementById("marketList");
        const filtered = filterAndSortMarket();
        
        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i> Подарков не найдено</div>`;
            return;
        }
        
        container.innerHTML = filtered.map((gift, idx) => {
            const uniqueId = `${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}_${idx}`;
            const backdropClass = getBackdropClass(gift.backdrop);
            return `
                <div class="gift-card ${backdropClass}" data-id="${gift.id}">
                    <div class="gift-icon">
                        <div id="lottie-market-${uniqueId}" class="lottie-container"></div>
                    </div>
                    <div class="gift-info">
                        <div class="gift-name">${gift.name}</div>
                        <div class="nft-number"><i class="fas fa-hashtag"></i> ${gift.item_number.toLocaleString()}</div>
                        <div class="collection-info"><i class="fas fa-layer-group"></i> ${gift.collection_slug} • ${gift.model} / ${gift.symbol}</div>
                        <div class="backdrop-info"><i class="fas fa-palette"></i> Фон: ${gift.backdrop} ${gift.backdropIcon || '🎨'}</div>
                        <div class="price-block">
                            <span class="price-ton">${gift.priceTON.toFixed(2)} <span class="ton-symbol">TON</span></span>
                            <span class="price-usd">≈ $${gift.usdPrice.toFixed(2)}</span>
                        </div>
                    </div>
                    <button class="buy-btn" data-id="${gift.id}" data-name="${gift.name}" data-price="${gift.priceTON}" data-number="${gift.item_number}">
                        <i class="fab fa-telegram"></i> Купить
                    </button>
                </div>
            `;
        }).join('');
        
        filtered.forEach((gift, idx) => {
            const uniqueId = `${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}_${idx}`;
            const containerId = `lottie-market-${uniqueId}`;
            if (gift.lottieUrl) {
                setTimeout(() => {
                    loadLottieAnimation(containerId, gift.lottieUrl);
                }, idx * 100);
            }
        });
        
        attachMarketBuyEvents();
    }

    function attachMarketBuyEvents() {
        document.querySelectorAll('#marketList .buy-btn').forEach(btn => {
            btn.removeEventListener('click', window.buyHandler);
            const handler = (e) => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                const number = btn.getAttribute('data-number');
                purchaseGift(id, name, price, number);
            };
            btn.addEventListener('click', handler);
            btn.buyHandler = handler;
        });
    }

    function purchaseGift(giftId, giftName, priceTon, itemNumber) {
        if (tg) tg.HapticFeedback.impactOccurred("light");
        
        const doPurchase = () => {
            const giftToAdd = marketGifts.find(g => g.id === giftId);
            if (giftToAdd && !myGifts.some(g => g.id === giftId)) {
                myGifts.push({ ...giftToAdd, purchaseDate: new Date().toISOString() });
                localStorage.setItem("portals_mygifts", JSON.stringify(myGifts));
                showToast(`✅ ${giftName} #${itemNumber} добавлен в Мои подарки!`);
                if (currentTab === "mygifts") renderMyGifts();
            } else if (myGifts.some(g => g.id === giftId)) {
                showToast(`⚠️ Этот подарок уже у вас есть`);
            } else {
                showToast(`❌ Ошибка при покупке`);
            }
        };
        
        if (tg) {
            tg.showPopup({
                title: "Подтверждение",
                message: `Купить "${giftName} #${itemNumber}" за ${priceTon.toFixed(2)} TON?`,
                buttons: [{ type: "ok", text: "Купить" }, { type: "cancel", text: "Отмена" }]
            }, (btnId) => { if (btnId === "ok") doPurchase(); });
        } else {
            if (confirm(`Купить "${giftName} #${itemNumber}" за ${priceTon.toFixed(2)} TON?`)) doPurchase();
        }
    }

    function renderMyGifts() {
        const container = document.getElementById("myGiftsList");
        if (!myGifts.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-gift"></i> У вас пока нет NFT подарков<br><span style="font-size:12px">Купите подарок на маркете</span></div>`;
            return;
        }
        
        container.innerHTML = myGifts.map((gift, idx) => {
            const uniqueId = `${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}_${idx}_my`;
            const backdropClass = getBackdropClass(gift.backdrop);
            return `
                <div class="gift-card ${backdropClass}">
                    <div class="gift-icon">
                        <div id="lottie-my-${uniqueId}" class="lottie-container"></div>
                    </div>
                    <div class="gift-info">
                        <div class="gift-name">${gift.name}</div>
                        <div class="nft-number"><i class="fas fa-hashtag"></i> ${gift.item_number.toLocaleString()}</div>
                        <div class="collection-info"><i class="fas fa-layer-group"></i> ${gift.collection_slug}</div>
                        <div class="backdrop-info"><i class="fas fa-palette"></i> Фон: ${gift.backdrop}</div>
                        <div class="price-block"><span class="price-ton">${gift.priceTON.toFixed(2)} TON</span></div>
                    </div>
                    <div class="action-group">
                        <button class="action-btn" data-action="withdraw" data-id="${gift.id}"><i class="fas fa-arrow-up"></i> Вывод</button>
                        <button class="action-btn" data-action="send" data-id="${gift.id}"><i class="fas fa-paper-plane"></i> Отправить</button>
                        <button class="action-btn" data-action="sell" data-id="${gift.id}"><i class="fas fa-tags"></i> Продать</button>
                        <button class="action-btn" data-action="add" data-id="${gift.id}"><i class="fas fa-plus-circle"></i> Добавить</button>
                    </div>
                </div>
            `;
        }).join('');
        
        myGifts.forEach((gift, idx) => {
            const uniqueId = `${gift.id.replace(/[^a-zA-Z0-9]/g, '_')}_${idx}_my`;
            const containerId = `lottie-my-${uniqueId}`;
            if (gift.lottieUrl) {
                setTimeout(() => loadLottieAnimation(containerId, gift.lottieUrl), idx * 100);
            }
        });
        
        attachMyGiftActions();
    }

    function attachMyGiftActions() {
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn => {
            btn.removeEventListener('click', window.actionHandler);
            const action = btn.getAttribute('data-action');
            const giftId = btn.getAttribute('data-id');
            const gift = myGifts.find(g => g.id === giftId);
            const handler = (e) => {
                if (!gift) return;
                if (action === "withdraw") showToast(`🔹 Вывод NFT ${gift.name} #${gift.item_number} на внешний кошелек`);
                else if (action === "send") showToast(`📤 Отправка ${gift.name} #${gift.item_number} другу в Telegram`);
                else if (action === "sell") showToast(`📢 ${gift.name} #${gift.item_number} выставлен на продажу за ${gift.priceTON} TON`);
                else if (action === "add") showToast(`✨ ${gift.name} #${gift.item_number} добавлен в избранное`);
            };
            btn.addEventListener('click', handler);
            btn.actionHandler = handler;
        });
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.getAttribute('data-tab') === tab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const marketPanel = document.getElementById("marketPanel");
        const myPanel = document.getElementById("myGiftsPanel");
        if (tab === "market") {
            marketPanel.style.display = "block";
            myPanel.style.display = "none";
            renderMarket();
        } else {
            marketPanel.style.display = "none";
            myPanel.style.display = "block";
            renderMyGifts();
        }
    }

    async function init() {
        initTelegram();
        
        const saved = localStorage.getItem("portals_mygifts");
        if (saved) {
            try { myGifts = JSON.parse(saved); } catch(e) {}
        }
        
        const container = document.getElementById("marketList");
        container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Загрузка NFT коллекций из Fragment...</div>';
        
        try {
            marketGifts = await fetchRealTelegramGifts();
            renderMarket();
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки<br><span style="font-size:12px">${error.message}</span></div>`;
        }
        
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.getAttribute('data-sort');
                renderMarket();
            });
        });
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
        });
    }
    
    init();
</script>
</body>
</html>
