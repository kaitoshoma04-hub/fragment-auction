    // Надёжная загрузка Lottie с множественными fallback-ами — гарантия анимации для ВСЕХ карточек
    const FALLBACK_LOTTIE_URL = "https://assets10.lottiefiles.com/packages/lf20_ys6gkxqp.json"; // рабочий универсальный Lottie
    async function loadLottieSmart(containerId, originalUrl, retries = 2) {
        const container = document.getElementById(containerId);
        if (!container) return false;
        if (lottieInstances.has(containerId)) { let old = lottieInstances.get(containerId); if(old?.destroy) old.destroy(); lottieInstances.delete(containerId); }
        // Если в кеше есть
        if (lottieCache.has(originalUrl)) {
            try { const anim = lottie.loadAnimation({ container, renderer: 'svg', loop: true, autoplay: true, animationData: lottieCache.get(originalUrl) }); lottieInstances.set(containerId, anim); return true; } catch(e) {}
        }
        const tryLoad = (url, attempt) => {
            return new Promise((resolve) => {
                const timeout = setTimeout(() => { if (attempt < retries) resolve(tryLoad(FALLBACK_LOTTIE_URL, retries)); else { container.innerHTML = '<i class="fas fa-gift" style="font-size:45px; color:#A855F7;"></i>'; resolve(false); } }, 3000);

                    const anim = lottie.loadAnimation({ container, renderer: 'svg', loop: true, autoplay: true, path: url });

                        clearTimeout(timeout);
                        if (anim.animationData) lottieCache.set(url, anim.animationData);
                        lottieInstances.set(containerId, anim);
                        resolve(true);
                    });
                    anim.addEventListener('error', () => {
                        clearTimeout(timeout);
                        if (attempt < retries) resolve(tryLoad(FALLBACK_LOTTIE_URL, retries));
                        else { container.innerHTML = '<i class="fas fa-gem" style="font-size:40px; color:#A855F7;"></i>'; resolve(false); }

                    else { container.innerHTML = '<i class="fas fa-star" style="font-size:40px; color:#A855F7;"></i>'; resolve(false); }
                }
            });
        };
        return tryLoad(originalUrl, 0);
    }

        { slug: "santahat", name: "Santa Hat", floorPrice: 14, total: 300, sample: "https://nft.fragment.com/gift/santahat-1.lottie.json", backupLottie: FALLBACK_LOTTIE_URL },
        { slug: "icecream", name: "Ice Cream", floorPrice: 9, total: 450, sample: "https://nft.fragment.com/gift/icecream-1.lottie.json", backupLottie: FALLBACK_LOTTIE_URL },
        { slug: "firecracker", name: "Firecracker", floorPrice: 25.5, total: 190, sample: "https://nft.fragment.com/gift/firecracker-1.lottie.json", backupLottie: FALLBACK_LOTTIE_URL },
        { slug: "goldenunicorn", name: "Golden Unicorn", floorPrice: 120, total: 80, sample: "https://nft.fragment.com/gift/goldenunicorn-1.lottie.json", backupLottie: FALLBACK_LOTTIE_URL },
        { slug: "hexpot", name: "Hex Pot", floorPrice: 18.5, total: 280, sample: "https://nft.fragment.com/gift/hexpot-10348.lottie.json", backupLottie: FALLBACK_LOTTIE_URL },
        { slug: "homemadecake", name: "Homemade Cake", floorPrice: 12, total: 320, sample: "https://nft.fragment.com/gift/homemadecake-1.lottie.json", backupLottie: FALLBACK_LOTTIE_URL }
    ];
    
    function generateGifts() {
        const gifts = [];
        for(const col of WORKING_COLLECTIONS){
            const itemsCount = Math.min(4, Math.floor(col.total / 80) + 2);
            for(let i = 0; i < itemsCount; i++){
                const itemNumber = Math.floor(Math.random() * Math.min(col.total, 9999)) + 1;
                const priceTON = parseFloat((col.floorPrice * (0.85 + Math.random() * 0.5)).toFixed(2));
                const lottieMain = col.sample;
                gifts.push({
                    id: `${col.slug}-${itemNumber}-${Date.now()}-${i}`,
                    name: col.name,
                    collection_slug: col.slug,
                    item_number: itemNumber,
                    priceTON: priceTON,
                    usdPrice: parseFloat((priceTON * 3.46).toFixed(2)),
                    lottieUrl: lottieMain,
                    backupLottie: col.backupLottie,
                });
            }
        }
        return gifts;
    }
    
    function updateCartCount() { document.getElementById("cartCount").innerText = cartItems.length; localStorage.setItem("vordex_cart", JSON.stringify(cartItems)); localStorage.setItem("vordex_mygifts", JSON.stringify(myGifts)); localStorage.setItem("vordex_selected", JSON.stringify([...selectedCollections])); localStorage.setItem("vordex_lang", currentLang); }
    
    function renderMarket() {
        let sorted = [...filteredGifts];
        if (currentSort === "price_asc") sorted.sort((a,b)=>a.priceTON-b.priceTON);
        if (currentSort === "price_desc") sorted.sort((a,b)=>b.priceTON-a.priceTON);
        const container = document.getElementById("marketList");
        if(!sorted.length) { container.innerHTML = `<div class="empty-state">✨ No items found</div>`; return; }
        container.innerHTML = sorted.map((g,idx)=>`<div class="gift-card" data-id="${g.id}" data-index="${idx}"><div class="gift-icon"><div id="lottie-m-${idx}" class="lottie-container"></div></div><div class="gift-info"><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON} TON</span><span class="price-usd">≈ $${g.usdPrice}</span></div></div><div class="button-group"><button class="cart-btn" data-action="cart" data-id="${g.id}"><i class="fas fa-bag-shopping"></i> ${t('addToCart')}</button><button class="buy-btn" data-action="buy" data-id="${g.id}"><i class="fas fa-bolt"></i> ${t('buy')}</button></div></div>`).join('');
        sorted.forEach(async (g,idx)=> { await loadLottieSmart(`lottie-m-${idx}`, g.lottieUrl, 2); });
        document.querySelectorAll('#marketList .buy-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); const gift=allGifts.find(g=>g.id===btn.getAttribute('data-id')); if(gift) openPaymentForGift(gift); }; });
        document.querySelectorAll('#marketList .cart-btn').forEach(btn=>{ btn.onclick=(e)=>{ e.stopPropagation(); const gift=allGifts.find(g=>g.id===btn.getAttribute('data-id')); if(gift) addToCart(gift); }; });
        document.querySelectorAll('#marketList .gift-card').forEach(card=>{ const idx=card.getAttribute('data-index'); const gift=sorted[parseInt(idx)]; card.onclick=(e)=>{ if(!e.target.closest('.buy-btn')&&!e.target.closest('.cart-btn')) openModal(gift); }; });
    }
    
    function openPaymentForGift(gift) { pendingPurchaseGift = gift; document.getElementById("paymentAmount").innerText = gift.priceTON; document.getElementById("paymentWalletInput").value = ""; document.getElementById("paymentModal").classList.add("active"); }
    
    function addToCart(gift) { if(!cartItems.some(i=>i.id===gift.id)){ cartItems.push({...gift}); updateCartCount(); showToast(`🛒 ${gift.name} #${gift.item_number} ${t('addedToCart')}`); if(currentTab==='cart') renderCart(); } else showToast(`⚠️ Already in cart`); }
    
    function finalizePurchase(gift) {
        if(!myGifts.some(g=>g.id===gift.id)){ myGifts.push({...gift, purchaseDate: new Date().toISOString()}); updateCartCount(); showToast(`✅ ${gift.name} #${gift.item_number} ${t('purchased')}`); if(currentTab==='mygifts') renderMyGifts(); }
        else showToast(`⚠️ Already owned`);
    }
    
    function renderMyGifts() { 
        const container = document.getElementById("myGiftsList"); 
        if(!myGifts.length){ container.innerHTML=`<div class="empty-state">${t('emptyAssets')}</div>`; return; } 
        container.innerHTML = myGifts.map((g,idx)=>`<div class="gift-card"><div class="gift-icon"><div id="lottie-my-${idx}" class="lottie-container"></div></div><div class="gift-info"><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div></div><div class="action-group"><button class="action-btn" data-action="send"><i class="fas fa-paper-plane"></i> Send</button></div></div>`).join(''); 
        myGifts.forEach((g,idx)=>loadLottieSmart(`lottie-my-${idx}`, g.lottieUrl, 2)); 
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn=>btn.onclick=()=>showToast(`🔹 Transfer simulation`)); 
    }
    
    function renderCart() { 
        const container = document.getElementById("cartList"); 
        if(!cartItems.length){ container.innerHTML=`<div class="empty-state">${t('emptyCart')}</div>`; return; } 
        const total = cartItems.reduce((s,i)=>s+i.priceTON,0); 
        container.innerHTML = cartItems.map((g,idx)=>`<div class="gift-card"><div class="gift-icon"><div id="lottie-cart-${idx}" class="lottie-container"></div></div><div class="gift-info"><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div></div><button class="action-btn" data-action="remove" data-id="${g.id}"><i class="fas fa-trash"></i> Remove</button></div>`).join('') + `<div style="padding:20px; text-align:center; grid-column: span 2; border-top:1px solid #2a2a3a;"><div style="margin-bottom:16px;font-weight:700;">${t('total')}: ${total.toFixed(2)} TON</div><button id="checkoutBtn" style="background:transparent;border:2px solid white;border-radius:60px;padding:14px;font-weight:700;color:white;width:100%;">${t('checkout')}</button></div>`;
        cartItems.forEach((g,idx)=>loadLottieSmart(`lottie-cart-${idx}`, g.lottieUrl, 2));
        document.querySelectorAll('#cartList .action-btn').forEach(btn=>{ btn.onclick=()=>{ cartItems = cartItems.filter(i=>i.id!==btn.getAttribute('data-id')); updateCartCount(); renderCart(); showToast("Removed"); }; });
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").onclick = () => { if(cartItems.length){ cartItems.forEach(item=>{ if(!myGifts.some(g=>g.id===item.id)) myGifts.push({...item,purchaseDate: new Date().toISOString()}); }); cartItems=[]; updateCartCount(); renderCart(); if(currentTab==='mygifts') renderMyGifts(); showToast("✅ Purchase complete!"); } });
    }
    
    function openModal(gift){ currentModalGift=gift; document.getElementById("modalName").innerText=gift.name; document.getElementById("modalNumber").innerHTML=`#${gift.item_number}`; document.getElementById("modalPrice").innerHTML=`${gift.priceTON} TON <span style="font-size:14px;">≈ $${gift.usdPrice}</span>`; const modalContainer=document.getElementById("modalLottie"); modalContainer.innerHTML='<div id="modalLottieAnim" style="width:100%;height:100%;"></div>'; loadLottieSmart('modalLottieAnim',gift.lottieUrl,2); document.getElementById("giftModal").classList.add("active"); }
    
    function switchTab(tab){ currentTab=tab; document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-tab')===tab)); document.getElementById("marketPanel").style.display=tab==="market"?"block":"none"; document.getElementById("myGiftsPanel").style.display=tab==="mygifts"?"block":"none"; document.getElementById("cartPanel").style.display=tab==="cart"?"block":"none"; if(tab==="mygifts") renderMyGifts(); if(tab==="cart") renderCart(); }
    
    function applyFilter(){ selectedCollections.clear(); document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb=>selectedCollections.add(cb.value)); filteredGifts = selectedCollections.size ? allGifts.filter(g=>selectedCollections.has(g.collection_slug)) : [...allGifts]; renderMarket(); document.getElementById("filterModal").classList.remove("active"); updateCartCount(); }
    function resetFilter(){ selectedCollections.clear(); filteredGifts=[...allGifts]; if(document.querySelectorAll('#filterCollectionsList input')) document.querySelectorAll('#filterCollectionsList input').forEach(cb=>cb.checked=false); renderMarket(); document.getElementById("filterModal").classList.remove("active"); }
    function renderFilterModal(){ const container=document.getElementById("filterCollectionsList"); const term=document.getElementById("collectionSearchInput")?.value.toLowerCase()||""; const filtered=WORKING_COLLECTIONS.filter(c=>c.name.toLowerCase().includes(term)); container.innerHTML=filtered.map((col,idx)=>`<label class="filter-collection-item"><input type="checkbox" value="${col.slug}" ${selectedCollections.has(col.slug)?'checked':''}><div class="filter-collection-icon"><div id="mini-${col.slug}-${idx}" class="lottie-mini"></div></div><span class="filter-collection-name">${col.name}</span></label>`).join(''); filtered.forEach((col,idx)=>loadLottieSmart(`mini-${col.slug}-${idx}`, col.sample, 1)); }
    
    function updateUIText() { 
        document.querySelectorAll('.tab-text').forEach((el,idx) => { if(idx===0) el.innerText = t('market'); if(idx===1) el.innerText = t('myAssets'); if(idx===2) el.innerText = t('cart'); });
        document.getElementById('filterLabel') && (document.getElementById('filterLabel').innerText = t('filter'));
        document.querySelector('.sort-btn[data-sort="default"]').innerHTML = t('defaultSort');
        if(currentTab === 'cart') renderCart();
        if(currentTab === 'mygifts') renderMyGifts();
        renderMarket();
    }
    
    async function init(){
        if(tg){ tg.expand(); tg.enableClosingConfirmation(); const u=tg.initDataUnsafe?.user; if(u) document.getElementById("telegramUserInfo").innerHTML=`<i class="fab fa-telegram"></i> ${u.first_name||'Explorer'} <span class="saved-badge"><i class="fas fa-gem"></i> Vordex</span>`; document.getElementById("walletAddress").innerHTML=`0:${u?.id?u.id.toString(16).slice(0,6):'7F3E'}...`; tg.setBackgroundColor("#05050A"); }
        const savedLang = localStorage.getItem("vordex_lang"); if(savedLang === 'en' || savedLang === 'ru') currentLang = savedLang;
        document.getElementById("langSwitch").onclick = () => { currentLang = currentLang === 'ru' ? 'en' : 'ru'; document.getElementById("langFlag").innerText = currentLang === 'ru' ? '🇷🇺' : '🇬🇧'; document.getElementById("langText").innerText = currentLang === 'ru' ? 'RU' : 'EN'; localStorage.setItem("vordex_lang", currentLang); updateUIText(); };
        document.getElementById("langFlag").innerText = currentLang === 'ru' ? '🇷🇺' : '🇬🇧'; 
        const savedCart=localStorage.getItem("vordex_cart"); if(savedCart) try{ cartItems=JSON.parse(savedCart); }catch(e){}
        const savedMy=localStorage.getItem("vordex_mygifts"); if(savedMy) try{ myGifts=JSON.parse(savedMy); }catch(e){}
        const savedSel=localStorage.getItem("vordex_selected"); if(savedSel) try{ selectedCollections=new Set(JSON.parse(savedSel)); }catch(e){}
        allGifts = generateGifts(); filteredGifts = selectedCollections.size ? allGifts.filter(g=>selectedCollections.has(g.collection_slug)) : [...allGifts];
        updateCartCount(); renderFilterModal(); await renderMarket(); updateUIText();
        document.getElementById("filterTrigger").onclick = () => { renderFilterModal(); document.getElementById("filterModal").classList.add("active"); };
        document.getElementById("applyFilterBtn").onclick = applyFilter; document.getElementById("resetFilterBtn").onclick = resetFilter;
        document.getElementById("collectionSearchInput").oninput = () => renderFilterModal();
        document.getElementById("cartBtn").onclick = () => switchTab("cart");
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.onclick = ()=>switchTab(btn.getAttribute('data-tab')));
        document.getElementById("modalCloseBtn").onclick = ()=>document.getElementById("giftModal").classList.remove("active");
        document.getElementById("modalBuyBtn").onclick = () => { if(currentModalGift){ openPaymentForGift(currentModalGift); document.getElementById("giftModal").classList.remove("active"); } };
        document.querySelectorAll('.sort-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSort=btn.getAttribute('data-sort'); renderMarket(); }; });
        document.getElementById("filterModal").onclick=(e)=>{ if(e.target===document.getElementById("filterModal")) document.getElementById("filterModal").classList.remove("active"); };
        
        // Кнопка добавления подарка в "Мои активы" - редирект на бота
        document.getElementById("addGiftBtn").onclick = () => {
            const botUsername = "VordexToGifts";
            const msg = t('addGiftHint');
            showToast(msg);
            setTimeout(() => {
                window.open(`https://t.me/${botUsername}`, '_blank');
            }, 800);
        };
        
        // Платежная логика: проверка введенного кошелька (имитация)
        document.getElementById("confirmPaymentBtn").onclick = () => {
            const wallet = document.getElementById("paymentWalletInput").value.trim();
            if (!wallet) { showToast("Введите адрес TON кошелька"); return; }
            if (!wallet.startsWith("0:") && !wallet.startsWith("EQ") && wallet.length < 10) { showToast("Некорректный адрес кошелька"); return; }
            showToast("⏳ Обработка платежа... (демо-режим)");
            setTimeout(() => {
                if (pendingPurchaseGift) {
                    finalizePurchase(pendingPurchaseGift);
                    pendingPurchaseGift = null;
                }
                document.getElementById("paymentModal").classList.remove("active");
                showToast("✅ Оплата успешно проведена! Подарок добавлен в ваши активы.");
                if (currentTab === 'cart') renderCart();
                if (currentTab === 'mygifts') renderMyGifts();
            }, 1500);
        };
        document.getElementById("cancelPaymentBtn").onclick = () => { document.getElementById("paymentModal").classList.remove("active"); pendingPurchaseGift = null; };
    }
    let currentModalGift = null;
    init();
</script>
</body>
</html>
