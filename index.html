    </style>
</head>
<body>
    <div id="aj_content">
        <!-- Header -->
        <header class="tm-header">
            <div class="tm-header-logo">
                <a href="#" class="tm-logo">
                    <i class="tm-logo-icon"></i>
                    <i class="tm-logo-text"></i>
                </a>
            </div>
            <div class="tm-header-body"></div>
            <div class="tm-header-actions">
                <button class="tm-header-button">
                    <i class="icon-connect-telegram"></i>
                    <span class="tm-button-label">Connect Telegram</span>
                </button>
                <button class="tm-header-button" style="margin-left:14px;">
                    <i class="icon-connect-ton"></i>
                    <span class="tm-button-label">Connect TON</span>
                </button>
            </div>
        </header>

        <!-- Main -->
        <main class="tm-main tm-main-catalog">
            <div class="tm-main-catalog-wrap">
                <!-- Фильтры -->
                <div class="tm-main-catalog-filters">
                    <div class="tm-main-filters-wrap">
                        <div class="tm-main-filters-box closed">
                            <div class="tm-main-filters-header js-filters-toggle">
                                <span>Filter</span>
                                <span class="tm-main-filters-count" id="filter-count">All</span>
                            </div>
                            <div class="tm-main-filters-content">
                                <div class="tm-main-filters-search">
                                    <input type="text" class="tm-input tm-main-filter-search-field" placeholder="Search filters..." id="filter-search">
                                    <div class="tm-search-clear"></div>
                                </div>
                                <div class="tm-main-filters-list" id="filter-list">
                                    <div class="tm-main-filters-item" data-filter="all">
                                        <span class="tm-main-filters-name">All Items</span>
                                        <span class="tm-main-filters-count" id="count-all">0</span>
                                    </div>
                                    <div class="tm-main-filters-item" data-filter="username">
                                        <span class="tm-main-filters-name">Usernames</span>
                                        <span class="tm-main-filters-count" id="count-username">0</span>
                                    </div>
                                    <div class="tm-main-filters-item" data-filter="number">
                                        <span class="tm-main-filters-name">+888 Numbers</span>
                                        <span class="tm-main-filters-count" id="count-number">0</span>
                                    </div>
                                    <div class="tm-main-filters-item" data-filter="premium">
                                        <span class="tm-main-filters-name">Premium</span>
                                        <span class="tm-main-filters-count" id="count-premium">0</span>
                                    </div>
                                    <div class="tm-main-filters-item" data-filter="nft">
                                        <span class="tm-main-filters-name">NFT</span>
                                        <span class="tm-main-filters-count" id="count-nft">0</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Контент -->
                <div class="tm-main-catalog-content">
                    <!-- Поиск -->
                    <div class="tm-main-search-form">
                        <div class="tm-search-field icon-before icon-search">
                            <input type="search" class="tm-search-input" placeholder="Search usernames or numbers" id="search-input" autocomplete="off">
                            <div class="tm-search-clear"></div>
                        </div>
                    </div>

                    <!-- Заголовок -->
                    <div class="tm-section">
                        <div class="tm-section-header">
                            <h3 class="tm-section-header-text">Popular Usernames &amp; Numbers</h3>
                        </div>
                    </div>

                    <!-- Сетка -->
                    <div class="tm-catalog-grid-wrap">
                        <div class="tm-catalog-grid" id="catalog-grid">
                            <!-- Карточки будут добавлены через JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="tm-footer">
            <div class="tm-footer-links">
                <a href="#" class="tm-footer-link">Top Auctions</a>
                <a href="#" class="tm-footer-link">About</a>
                <a href="#" class="tm-footer-link">Terms</a>
                <a href="#" class="tm-footer-link">Privacy</a>
            </div>
        </footer>
    </div>

    <script>
        // Данные для каталога
        const items = [
            // Usernames
            { id: 1, type: 'username', name: 'middlemen', emoji: '🤝', price: 8888, status: 'avail', label: 'On auction' },
            { id: 2, type: 'username', name: 'heal', emoji: '💊', price: 4444, status: 'avail', label: 'On auction' },
            { id: 3, type: 'username', name: 'tier', emoji: '🏆', price: 3333, status: 'avail', label: 'On auction' },
            { id: 4, type: 'username', name: 'failed', emoji: '❌', price: 2222, status: 'taken', label: 'Taken' },
            { id: 5, type: 'username', name: 'cloud', emoji: '☁️', price: 5000, status: 'avail', label: 'On auction' },
            { id: 6, type: 'username', name: 'storm', emoji: '🌩️', price: 3200, status: 'avail', label: 'On auction' },
            { id: 7, type: 'username', name: 'shadow', emoji: '🌑', price: 2800, status: 'taken', label: 'Taken' },
            { id: 8, type: 'username', name: 'light', emoji: '💡', price: 1900, status: 'avail', label: 'On auction' },
            { id: 9, type: 'username', name: 'phantom', emoji: '👻', price: 4500, status: 'avail', label: 'On auction' },
            { id: 10, type: 'username', name: 'cyber', emoji: '💻', price: 3800, status: 'avail', label: 'On auction' },
            { id: 11, type: 'username', name: 'matrix', emoji: '🧊', price: 6100, status: 'avail', label: 'On auction' },
            { id: 12, type: 'username', name: 'neon', emoji: '🌈', price: 2700, status: 'avail', label: 'On auction' },
            { id: 13, type: 'username', name: 'vortex', emoji: '🌀', price: 3400, status: 'avail', label: 'On auction' },
            { id: 14, type: 'username', name: 'echo', emoji: '🔊', price: 1600, status: 'avail', label: 'On auction' },
            { id: 15, type: 'username', name: 'nova', emoji: '🌟', price: 5200, status: 'avail', label: 'On auction' },
            
            // +888 Numbers
            { id: 101, type: 'number', name: '+888 123 4567', emoji: '📱', price: 1200, status: 'avail', label: 'On auction' },
            { id: 102, type: 'number', name: '+888 777 8888', emoji: '📱', price: 2500, status: 'avail', label: 'On auction' },
            { id: 103, type: 'number', name: '+888 999 0000', emoji: '📱', price: 1800, status: 'taken', label: 'Taken' },
            { id: 104, type: 'number', name: '+888 555 1234', emoji: '📱', price: 900, status: 'avail', label: 'On auction' },
            { id: 105, type: 'number', name: '+888 666 9999', emoji: '📱', price: 3200, status: 'avail', label: 'On auction' },
            { id: 106, type: 'number', name: '+888 111 2222', emoji: '📱', price: 1500, status: 'avail', label: 'On auction' },
            { id: 107, type: 'number', name: '+888 444 7777', emoji: '📱', price: 2800, status: 'avail', label: 'On auction' },
            { id: 108, type: 'number', name: '+888 888 1111', emoji: '📱', price: 4000, status: 'avail', label: 'On auction' },
            { id: 109, type: 'number', name: '+888 222 3333', emoji: '📱', price: 1100, status: 'avail', label: 'On auction' },
            { id: 110, type: 'number', name: '+888 000 9999', emoji: '📱', price: 2100, status: 'avail', label: 'On auction' },
            
            // Premium/NFT
            { id: 201, type: 'premium', name: '@premium', emoji: '⭐', price: 15000, status: 'avail', label: 'Premium' },
            { id: 202, type: 'nft', name: 'NFT #1', emoji: '🎨', price: 8800, status: 'avail', label: 'NFT' },
            { id: 203, type: 'nft', name: 'NFT #2', emoji: '🖼️', price: 7200, status: 'avail', label: 'NFT' },
            { id: 204, type: 'premium', name: '@elite', emoji: '👑', price: 12000, status: 'taken', label: 'Taken' },
            { id: 205, type: 'nft', name: 'NFT #3', emoji: '💎', price: 9500, status: 'avail', label: 'NFT' },
            { id: 206, type: 'premium', name: '@legend', emoji: '🏅', price: 18000, status: 'avail', label: 'Premium' },
        ];

        // Функция рендеринга
        function renderItems(filterType = 'all', searchQuery = '') {
            const grid = document.getElementById('catalog-grid');
            const filtered = items.filter(item => {
                const matchType = filterType === 'all' || item.type === filterType;
                const matchSearch = searchQuery === '' || 
                    item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    item.name.includes(searchQuery);
                return matchType && matchSearch;
            });

            // Обновляем счетчики
            updateCounts();

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="width:100%;text-align:center;padding:40px 20px;color:var(--table-text-color);font-size:15px;">
                        No items found matching your criteria.
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(item => {
                const statusClass = item.status === 'avail' ? 'tm-status-avail' : 
                                   item.status === 'taken' ? 'tm-status-taken' : 'tm-status-unavail';
                const priceFormatted = item.price.toLocaleString();
                return `
                    <div class="tm-grid-item" data-type="${item.type}" data-name="${item.name}">
                        <a href="#">
                            <div class="tm-grid-item-thumb">
                                <div class="tm-grid-thumb">
                                    <span class="tm-grid-item-emoji">${item.emoji}</span>
                                </div>
                            </div>
                            <div class="tm-grid-item-content">
                                <div class="tm-grid-item-name">
                                    <span class="item-name">${item.name}</span>
                                </div>
                                <div class="tm-grid-item-desc">
                                    ${item.type === 'username' ? '@' + item.name : item.type === 'number' ? 'Virtual Number' : item.type === 'premium' ? 'Premium' : 'Collectible'}
                                </div>
                                <div class="tm-grid-item-values">
                                    <span class="tm-grid-item-value tm-value icon-before icon-ton">${priceFormatted}</span>
                                    <span class="tm-grid-item-status ${statusClass}">${item.label}</span>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
            }).join('');
        }

        // Подсчет количества
        function updateCounts() {
            const counts = {
                all: items.length,
                username: items.filter(i => i.type === 'username').length,
                number: items.filter(i => i.type === 'number').length,
                premium: items.filter(i => i.type === 'premium').length,
                nft: items.filter(i => i.type === 'nft').length,
            };
            document.getElementById('count-all').textContent = counts.all;
            document.getElementById('count-username').textContent = counts.username;
            document.getElementById('count-number').textContent = counts.number;
            document.getElementById('count-premium').textContent = counts.premium;
            document.getElementById('count-nft').textContent = counts.nft;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            let currentFilter = 'all';
            let currentSearch = '';

            renderItems(currentFilter, currentSearch);

            // Фильтры
            const filterItems = document.querySelectorAll('.tm-main-filters-item');
            filterItems.forEach(el => {
                el.addEventListener('click', function() {
                    const filter = this.dataset.filter;
                    currentFilter = filter;
                    document.querySelectorAll('.tm-main-filters-item').forEach(f => f.style.background = '');
                    this.style.background = '#248bda';
                    renderItems(currentFilter, currentSearch);
                });
            });
            // По умолчанию выбираем "All"
            document.querySelector('.tm-main-filters-item[data-filter="all"]').style.background = '#248bda';

            // Toggle фильтров
            const filtersToggle = document.querySelector('.js-filters-toggle');
            const filtersBox = document.querySelector('.tm-main-filters-box');
            filtersToggle.addEventListener('click', function() {
                filtersBox.classList.toggle('closed');
                filtersBox.classList.toggle('opened');
            });

            // Поиск
            const searchInput = document.getElementById('search-input');
            const searchClear = document.querySelector('.tm-main-search-form .tm-search-clear');
            searchInput.addEventListener('input', function() {
                currentSearch = this.value;
                renderItems(currentFilter, currentSearch);
            });
            searchClear.addEventListener('click', function() {
                searchInput.value = '';
                currentSearch = '';
                renderItems(currentFilter, currentSearch);
                searchInput.focus();
            });

            // Поиск в фильтрах
            const filterSearch = document.getElementById('filter-search');
            filterSearch.addEventListener('input', function() {
                const q = this.value.toLowerCase();
                document.querySelectorAll('.tm-main-filters-item').forEach(el => {
                    const name = el.querySelector('.tm-main-filters-name').textContent.toLowerCase();
                    el.style.display = name.includes(q) ? 'flex' : 'none';
                });
            });

            // Клик по карточке
            document.addEventListener('click', function(e) {
                const item = e.target.closest('.tm-grid-item');
                if (item) {
                    e.preventDefault();
                    const name = item.dataset.name;
                    alert('You clicked on: ' + name + '\nThis would navigate to the auction page.');
                }
            });
        });
    </script>
</body>
</html>
