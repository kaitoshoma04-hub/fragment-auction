    <style>

        @media (max-width: 768px) {

        /* ===== LOADER ===== */
        .loader {
            display: inline-block;
            width: 20px;

        /* ===== TON CONNECT MODAL OVERRIDE ===== */

        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

    // ================================================================
    //  TYPES (JSDoc for clarity)
    // ================================================================
    /**
     * @typedef {Object} NFT
     * @property {string} address
     * @property {string} name
     * @property {string} collection
     * @property {string} [collectionAddress]
     * @property {string|null} price
     * @property {string} [image]
     * @property {string} [emoji]
     * @property {string} [owner]
     */

    /**
     * @typedef {Object} Collection
     * @property {string} address
     * @property {string} name
     * @property {number} items
     * @property {string} [emoji]
     * @property {string} [image]
     */

    // ================================================================
    //  FAKE DATA (FALLBACK)
    // ================================================================
    const FALLBACK_NFTS = [
        { address: '0:1', name: 'CyberPunk #442', collection: 'CyberPunks', price: '1.2', emoji: '🤖' },
        { address: '0:2', name: 'TON Dragon #07', collection: 'Dragons', price: '3.8', emoji: '🐉' },
        { address: '0:3', name: 'Pixel Cat #1337', collection: 'PixelCats', price: '0.9', emoji: '🐱' },
        { address: '0:4', name: 'Abstract #21', collection: 'Abstract Art', price: '2.1', emoji: '🎨' },
        { address: '0:5', name: 'Space Rocket #9', collection: 'SpaceY', price: '4.2', emoji: '🚀' },
        { address: '0:6', name: 'Glitch Skull', collection: 'Glitch Gang', price: '1.7', emoji: '💀' },
        { address: '0:7', name: 'Neon Ape #3', collection: 'Neon Apes', price: '6.0', emoji: '🐒' },
        { address: '0:8', name: 'Magic Mushroom', collection: 'Enchanted', price: '0.5', emoji: '🍄' },
    ];

    const FALLBACK_COLLECTIONS = [
        { address: '0:A', name: 'CyberPunks', items: 2100, emoji: '👾' },
        { address: '0:B', name: 'TON Dragons', items: 850, emoji: '🐲' },
        { address: '0:C', name: 'Pixel Cats', items: 3400, emoji: '🐈' },
        { address: '0:D', name: 'Glitch Gang', items: 1200, emoji: '⚡' },
        { address: '0:E', name: 'Neon Apes', items: 560, emoji: '🦧' },
        { address: '0:F', name: 'Abstract Art', items: 940, emoji: '🖼️' },
    ];

    // ================================================================
    //  API
    // ================================================================
    const API_BASE = 'https://toncenter.com/api/v2';

    async function fetchNFTs(collectionAddress) {
        try {
            // Имитация реального запроса
            await new Promise(resolve => setTimeout(resolve, 500));
            return FALLBACK_NFTS;
        } catch (error) {
            console.error('Error fetching NFTs:', error);
            return FALLBACK_NFTS;
        }
    }

    async function fetchCollections() {
        try {
            await new Promise(resolve => setTimeout(resolve, 400));
            return FALLBACK_COLLECTIONS;
        } catch (error) {
            console.error('Error fetching collections:', error);
            return FALLBACK_COLLECTIONS;
        }
    }

    async function fetchWalletBalance(address) {
        try {
            const response = await axios.get(`${API_BASE}/getAddressBalance`, {
                params: { address }
            });
            if (response.data && response.data.result) {
                const balance = parseInt(response.data.result) / 1e9;
                return balance.toFixed(2);
            }
            return null;
        } catch (error) {
            console.error('Error fetching balance:', error);
            return null;
        }
    }

    // ================================================================
    //  TON CONNECT HOOK
    // ================================================================
    function useTonConnect() {
        const [tonConnectUI, setTonConnectUI] = useState(null);
        const [address, setAddress] = useState('');
        const [isConnected, setIsConnected] = useState(false);

        useEffect(() => {
            // Инициализируем TON Connect
            const manifestUrl = 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-wallet/main/public/tonconnect-manifest.json';
            const ui = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl,
                buttonRootId: 'ton-connect-button'
            });
            setTonConnectUI(ui);

            // Подписка на изменения
            const unsubscribe = ui.onStatusChange((wallet) => {
                if (wallet) {
                    setAddress(wallet.account.address);
                    setIsConnected(true);
                } else {
                    setAddress('');
                    setIsConnected(false);
                }
            });

            // Проверяем текущее состояние
            if (ui.wallet) {
                setAddress(ui.wallet.account.address);
                setIsConnected(true);
            }

            return () => {
                if (unsubscribe) unsubscribe();
            };
        }, []);

        const connect = useCallback(async () => {
            if (tonConnectUI) {
                try {
                    await tonConnectUI.openModal();
                } catch (error) {
                    console.error('Connection error:', error);
                }
            }
        }, [tonConnectUI]);

        const disconnect = useCallback(async () => {
            if (tonConnectUI) {
                try {
                    await tonConnectUI.disconnect();
                } catch (error) {
                    console.error('Disconnect error:', error);
                }
            }
        }, [tonConnectUI]);

        const sendTransaction = useCallback(async (transaction) => {
            if (tonConnectUI) {
                try {
                    const result = await tonConnectUI.sendTransaction(transaction);
                    return result;
                } catch (error) {
                    console.error('Transaction error:', error);
                    throw error;
                }
            }
        }, [tonConnectUI]);

        return {
            isConnected,
            address,
            connect,
            disconnect,
            sendTransaction,
            tonConnectUI
        };
    }

    // ================================================================
    //  CONTEXT
    // ================================================================
    const ToastContext = React.createContext(null);

    function useToast() {
        return useContext(ToastContext);
    }

    // ================================================================
    //  COMPONENTS
    // ================================================================

    // ---- Toast ----
    function Toast({ message, duration = 3000, onClose }) {
        const [visible, setVisible] = useState(true);

        useEffect(() => {
            const timer = setTimeout(() => {
                setVisible(false);
                if (onClose) onClose();
            }, duration);
            return () => clearTimeout(timer);
        }, [duration, onClose]);

        if (!visible || !message) return null;

        return (
            <div style={{
                position: 'fixed',
                bottom: '30px',
                left: '50%',
                transform: 'translateX(-50%)',
                zIndex: 2000,
                background: '#1a1a24',
                padding: '12px 28px',
                borderRadius: '40px',
                border: '1px solid #2e2e3a',
                color: '#e5e5ea',
                fontSize: '14px',
                boxShadow: '0 10px 30px rgba(0,0,0,0.6)'
            }}>
                {message}
            </div>
        );
    }

    // ---- Header ----
    function Header() {
        const { isConnected, address, connect, disconnect } = useTonConnect();
        const { showToast } = useToast();

        const handleConnect = () => {
            if (isConnected) {
                disconnect();
                showToast('🔴 Wallet disconnected');
            } else {
                connect();
            }
        };

        const formatAddress = (addr) => {
            if (!addr) return '';
            return `${addr.slice(0, 4)}...${addr.slice(-4)}`;
        };

        return (
            <header style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                padding: '16px 0',
                borderBottom: '1px solid #23232a',
                flexWrap: 'wrap'
            }}>
                <div style={{ fontSize: '24px', fontWeight: 700 }}>
                    <span style={{
                        background: 'linear-gradient(135deg, #8b5cf6, #3b82f6)',
                        WebkitBackgroundClip: 'text',
                        WebkitTextFillColor: 'transparent'
                    }}>Get</span>
                    <span style={{ color: '#fff' }}>Gems</span>
                </div>

                <div style={{ display: 'flex', gap: '28px', fontSize: '14px', fontWeight: 500 }}>
                    <a href="#/" style={{ color: '#fff' }}>Explore</a>
                    <a href="#/collections" style={{ color: '#8b8b9b' }}>Collections</a>
                    <a href="#/stats" style={{ color: '#8b8b9b' }}>Stats</a>
                    <a href="#/profile" style={{ color: '#8b8b9b' }}>Profile</a>
                </div>

                <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                    {isConnected && address && (
                        <span style={{
                            fontSize: '12px',
                            background: '#1a1a22',
                            padding: '4px 12px',
                            borderRadius: '30px',
                            color: '#aaa',
                            fontFamily: 'monospace'
                        }}>
                            🟢 {formatAddress(address)}
                        </span>
                    )}
                    <button
                        onClick={handleConnect}
                        style={{
                            background: isConnected ? '#1e3a2a' : '#2a2a32',
                            border: 'none',
                            padding: '8px 20px',
                            borderRadius: '40px',
                            color: isConnected ? '#6fcf97' : '#fff',
                            fontWeight: 500,
                            fontSize: '14px',
                            cursor: 'pointer',
                            transition: '0.2s'
                        }}
                    >
                        {isConnected ? 'Disconnect' : 'Connect Wallet'}
                    </button>
                    <div id="ton-connect-button" style={{ display: 'none' }}></div>
                </div>
            </header>
        );
    }

    // ---- Hero ----
    function Hero() {
        return (
            <section style={{
                background: 'linear-gradient(145deg, #1a1a24, #0f0f16)',
                borderRadius: '32px',
                padding: '48px 40px',
                margin: '32px 0',
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'center',
                flexWrap: 'wrap',
                border: '1px solid #2a2a34'
            }}>
                <div>
                    <h1 style={{ fontSize: '40px', fontWeight: 700, letterSpacing: '-1px' }}>
                        Discover & Trade <br />
                        <span style={{ color: '#8b5cf6' }}>TON NFTs</span>
                    </h1>
                    <p style={{ color: '#8b8b9b', maxWidth: '400px', margin: '12px 0 20px', fontSize: '16px' }}>
                        Buy, sell, and auction NFTs on the fastest blockchain. Zero gas fees for buyers.
                    </p>
                    <button
                        onClick={() => window.location.hash = '/'}
                        style={{
                            background: '#8b5cf6',
                            border: 'none',

                            color: '#fff',
                            fontWeight: 600,
                            fontSize: '16px',
                            cursor: 'pointer',
                            transition: '0.2s'
                        }}
                        onMouseEnter={(e) => e.currentTarget.style.background = '#a78bfa'}
                        onMouseLeave={(e) => e.currentTarget.style.background = '#8b5cf6'}
                    >
                        Explore Now
                    </button>
                </div>
                <div style={{
                    display: 'flex',
                    gap: '40px',
                    background: '#12121a',
                    padding: '20px 32px',
                    borderRadius: '24px',
                    border: '1px solid #282834'
                }}>
                    <div style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: '28px', fontWeight: 700, color: '#fff' }}>12.4K</div>
                        <div style={{ fontSize: '13px', color: '#6b6b7b' }}>NFTs</div>
                    </div>
                    <div style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: '28px', fontWeight: 700, color: '#fff' }}>2.8K</div>
                        <div style={{ fontSize: '13px', color: '#6b6b7b' }}>Creators</div>
                    </div>
                    <div style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: '28px', fontWeight: 700, color: '#fff' }}>8.1M</div>
                        <div style={{ fontSize: '13px', color: '#6b6b7b' }}>TON Volume</div>
                    </div>
                </div>
            </section>
        );
    }

    // ---- Categories ----
    function Categories({ onSelect }) {
        const categories = ['All', 'Art', 'Gaming', 'Collectibles', 'Music', 'Photography'];
        const [active, setActive] = useState('All');

        const handleClick = (cat) => {
            setActive(cat);
            if (onSelect) onSelect(cat);
        };

        return (
            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', margin: '20px 0 30px' }}>
                {categories.map(cat => (
                    <span
                        key={cat}
                        onClick={() => handleClick(cat)}
                        style={{
                            background: active === cat ? '#2a1a3a' : '#1a1a24',
                            padding: '8px 20px',
                            borderRadius: '40px',
                            fontSize: '14px',
                            border: active === cat ? '1px solid #8b5cf6' : '1px solid #2a2a34',
                            cursor: 'pointer',
                            transition: '0.2s',
                            color: active === cat ? '#c4b5fd' : '#e5e5ea'
                        }}
                    >
                        {cat}
                    </span>
                ))}
            </div>
        );
    }

    // ---- NFT Grid ----
    function NFTGrid({ nfts, onNFTClick }) {
        if (!nfts || nfts.length === 0) {
            return <div style={{ color: '#6b6b7b', padding: '40px 0', textAlign: 'center' }}>No NFTs found</div>;
        }

        return (
            <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))',
                gap: '20px'
            }}>
                {nfts.map(nft => (
                    <div
                        key={nft.address}
                        onClick={() => onNFTClick && onNFTClick(nft)}
                        style={{
                            background: '#14141c',
                            borderRadius: '20px',
                            overflow: 'hidden',
                            transition: '0.2s',
                            border: '1px solid #1e1e26',
                            cursor: 'pointer'
                        }}
                        onMouseEnter={(e) => {
                            e.currentTarget.style.borderColor = '#3a3a4a';
                            e.currentTarget.style.transform = 'translateY(-4px)';
                            e.currentTarget.style.boxShadow = '0 12px 30px rgba(0,0,0,0.5)';
                        }}
                        onMouseLeave={(e) => {
                            e.currentTarget.style.borderColor = '#1e1e26';
                            e.currentTarget.style.transform = 'translateY(0)';
                            e.currentTarget.style.boxShadow = 'none';
                        }}
                    >
                        <div style={{
                            width: '100%',
                            aspectRatio: '1/1',
                            background: 'linear-gradient(135deg, #2a2a34, #1a1a24)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            fontSize: '48px',
                            color: '#4a4a5a'
                        }}>
                            {nft.emoji || '🖼️'}
                        </div>
                        <div style={{ padding: '14px 16px 16px' }}>
                            <div style={{ fontWeight: 600, fontSize: '15px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                {nft.name}
                            </div>
                            <div style={{ fontSize: '12px', color: '#6b6b7b', marginTop: '2px' }}>
                                {nft.collection}
                            </div>
                            <div style={{ marginTop: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <span style={{ fontWeight: 600, fontSize: '15px' }}>
                                    {nft.price ? `${nft.price} TON` : 'Not for sale'}
                                </span>
                                <span style={{ color: '#6b6b7b', fontSize: '12px' }}>⏣</span>
                            </div>
                        </div>
                    </div>
                ))}
            </div>
        );
    }

    // ---- Collection Grid ----
    function CollectionGrid({ collections, onCollectionClick }) {
        if (!collections || collections.length === 0) {
            return <div style={{ color: '#6b6b7b', padding: '40px 0', textAlign: 'center' }}>No collections found</div>;
        }

        return (
            <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))',
                gap: '20px'
            }}>
                {collections.map(col => (
                    <div
                        key={col.address}
                        onClick={() => onCollectionClick && onCollectionClick(col)}
                        style={{
                            background: '#14141c',
                            borderRadius: '20px',
                            overflow: 'hidden',
                            border: '1px solid #1e1e26',
                            cursor: 'pointer',
                            transition: '0.2s'
                        }}
                        onMouseEnter={(e) => {
                            e.currentTarget.style.borderColor = '#3a3a4a';
                            e.currentTarget.style.transform = 'translateY(-4px)';
                            e.currentTarget.style.boxShadow = '0 12px 30px rgba(0,0,0,0.5)';
                        }}
                        onMouseLeave={(e) => {
                            e.currentTarget.style.borderColor = '#1e1e26';
                            e.currentTarget.style.transform = 'translateY(0)';
                            e.currentTarget.style.boxShadow = 'none';
                        }}
                    >
                        <div style={{
                            width: '100%',
                            aspectRatio: '1/1',
                            background: 'linear-gradient(135deg, #2a2a34, #1a1a24)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            fontSize: '36px'
                        }}>
                            {col.emoji || '🏛️'}
                        </div>
                        <div style={{ padding: '14px 16px 16px' }}>
                            <div style={{ fontWeight: 600, fontSize: '15px' }}>{col.name}</div>
                            <div style={{ fontSize: '12px', color: '#6b6b7b' }}>{col.items} items</div>
                        </div>
                    </div>
                ))}
            </div>
        );
    }

    // ---- Pages ----
    function ExplorePage() {
        const [nfts, setNfts] = useState([]);
        const [collections, setCollections] = useState([]);
        const [loading, setLoading] = useState(true);
        const { showToast } = useToast();

        useEffect(() => {
            const loadData = async () => {
                setLoading(true);
                try {
                    const [nftData, collectionData] = await Promise.all([
                        fetchNFTs(),
                        fetchCollections()
                    ]);
                    setNfts(nftData);
                    setCollections(collectionData);
                } catch (error) {
                    console.error('Load error:', error);
                    showToast('❌ Failed to load data');
                } finally {
                    setLoading(false);
                }
            };
            loadData();
        }, []);

        const handleNFTClick = (nft) => {
            showToast(`🔍 NFT: ${nft.name} — details coming soon (real data would be here)`);
        };

        const handleCollectionClick = (col) => {
            showToast(`🏛️ Collection: ${col.name} — loading NFTs... (simulated)`);
        };

        if (loading) {
            return (
                <div style={{ display: 'flex', justifyContent: 'center', padding: '60px 0' }}>
                    <div className="loader"></div>
                </div>
            );
        }

        return (
            <div>
                <Hero />
                <Categories />
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', margin: '40px 0 20px' }}>
                    <h2 style={{ fontSize: '22px', fontWeight: 600 }}>🔥 Trending Now</h2>
                    <a href="#/" style={{ color: '#8b5cf6', fontSize: '14px' }} onClick={(e) => {
                        e.preventDefault();
                        showToast('📦 View all NFTs — coming soon');
                    }}>View All →</a>
                </div>
                <NFTGrid nfts={nfts} onNFTClick={handleNFTClick} />

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', margin: '50px 0 20px' }}>
                    <h2 style={{ fontSize: '22px', fontWeight: 600 }}>🏛️ Top Collections</h2>
                    <a href="#/collections" style={{ color: '#8b5cf6', fontSize: '14px' }}>See all</a>
                </div>
                <CollectionGrid collections={collections} onCollectionClick={handleCollectionClick} />
            </div>
        );
    }

    function CollectionsPage() {
        const [collections, setCollections] = useState([]);
        const [loading, setLoading] = useState(true);
        const { showToast } = useToast();

        useEffect(() => {
            const load = async () => {
                setLoading(true);
                try {
                    const data = await fetchCollections();
                    setCollections(data);
                } catch (error) {
                    showToast('❌ Failed to load collections');
                } finally {
                    setLoading(false);
                }
            };
            load();
        }, []);

        if (loading) {
            return (
                <div style={{ display: 'flex', justifyContent: 'center', padding: '60px 0' }}>
                    <div className="loader"></div>
                </div>
            );
        }

        return (
            <div style={{ padding: '20px 0' }}>
                <h1 style={{ fontSize: '32px', fontWeight: 700, marginBottom: '8px' }}>Collections</h1>
                <p style={{ color: '#8b8b9b', marginBottom: '30px' }}>Browse all NFT collections on TON</p>
                <CollectionGrid
                    collections={collections}
                    onCollectionClick={(col) => showToast(`🏛️ ${col.name} — ${col.items} items (real data)`)}
                />
            </div>
        );
    }

    function StatsPage() {
        const { showToast } = useToast();
        const [stats, setStats] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            const load = async () => {
                setLoading(true);
                try {
                    // Имитация реальных статов
                    await new Promise(resolve => setTimeout(resolve, 600));
                    setStats({
                        totalNFTs: 12400,
                        totalCreators: 2800,
                        volume24h: 184000,
                        avgPrice: 12.5
                    });
                } catch (error) {
                    showToast('❌ Failed to load stats');
                } finally {
                    setLoading(false);
                }
            };
            load();
        }, []);

        if (loading) {
            return (
                <div style={{ display: 'flex', justifyContent: 'center', padding: '60px 0' }}>
                    <div className="loader"></div>
                </div>
            );
        }

        return (
            <div style={{ padding: '20px 0' }}>
                <h1 style={{ fontSize: '32px', fontWeight: 700, marginBottom: '8px' }}>Market Stats</h1>
                <p style={{ color: '#8b8b9b', marginBottom: '30px' }}>Real-time TON NFT market data</p>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))',
                    gap: '20px'
                }}>
                    <div style={{ background: '#14141c', padding: '24px', borderRadius: '20px', border: '1px solid #1e1e26' }}>
                        <div style={{ fontSize: '14px', color: '#6b6b7b' }}>Total NFTs</div>
                        <div style={{ fontSize: '32px', fontWeight: 700, marginTop: '4px' }}>{stats.totalNFTs.toLocaleString()}</div>
                    </div>
                    <div style={{ background: '#14141c', padding: '24px', borderRadius: '20px', border: '1px solid #1e1e26' }}>
                        <div style={{ fontSize: '14px', color: '#6b6b7b' }}>Creators</div>
                        <div style={{ fontSize: '32px', fontWeight: 700, marginTop: '4px' }}>{stats.totalCreators.toLocaleString()}</div>
                    </div>
                    <div style={{ background: '#14141c', padding: '24px', borderRadius: '20px', border: '1px solid #1e1e26' }}>
                        <div style={{ fontSize: '14px', color: '#6b6b7b' }}>24h Volume</div>
                        <div style={{ fontSize: '32px', fontWeight: 700, marginTop: '4px' }}>{stats.volume24h.toLocaleString()} TON</div>
                    </div>
                    <div style={{ background: '#14141c', padding: '24px', borderRadius: '20px', border: '1px solid #1e1e26' }}>
                        <div style={{ fontSize: '14px', color: '#6b6b7b' }}>Avg. Price</div>
                        <div style={{ fontSize: '32px', fontWeight: 700, marginTop: '4px' }}>{stats.avgPrice} TON</div>
                    </div>
                </div>
            </div>
        );
    }

    function ProfilePage() {
        const { isConnected, address, connect } = useTonConnect();
        const { showToast } = useToast();
        const [balance, setBalance] = useState(null);
        const [loading, setLoading] = useState(false);

        useEffect(() => {
            if (isConnected && address) {
                const loadBalance = async () => {
                    setLoading(true);
                    try {
                        const bal = await fetchWalletBalance(address);
                        setBalance(bal);
                    } catch (error) {
                        showToast('❌ Failed to load balance');
                    } finally {
                        setLoading(false);
                    }
                };
                loadBalance();
            } else {
                setBalance(null);
            }
        }, [isConnected, address]);

        if (!isConnected) {
            return (
                <div style={{ padding: '60px 0', textAlign: 'center' }}>
                    <h2 style={{ fontSize: '24px', marginBottom: '12px' }}>Connect Wallet</h2>
                    <p style={{ color: '#8b8b9b', marginBottom: '24px' }}>Please connect your TON wallet to view profile</p>
                    <button
                        onClick={connect}
                        style={{
                            background: '#8b5cf6',
                            border: 'none',
                            padding: '12px 32px',
                            borderRadius: '40px',
                            color: '#fff',
                            fontWeight: 600,
                            fontSize: '16px',
                            cursor: 'pointer'
                        }}
                    >
                        Connect Wallet
                    </button>
                </div>
            );
        }

        return (
            <div style={{ padding: '20px 0' }}>
                <h1 style={{ fontSize: '32px', fontWeight: 700, marginBottom: '8px' }}>Profile</h1>
                <div style={{
                    background: '#14141c',
                    padding: '24px',
                    borderRadius: '20px',
                    border: '1px solid #1e1e26',
                    marginBottom: '20px'
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: '16px' }}>
                        <div>
                            <div style={{ fontSize: '14px', color: '#6b6b7b' }}>Wallet Address</div>
                            <div style={{ fontSize: '18px', fontWeight: 600, fontFamily: 'monospace' }}>{address}</div>
                        </div>
                        <div>
                            <div style={{ fontSize: '14px', color: '#6b6b7b' }}>Balance</div>
                            <div style={{ fontSize: '18px', fontWeight: 600 }}>
                                {loading ? <span className="loader" style={{ width: '16px', height: '16px' }}></span> : `${balance || '0'} TON`}
                            </div>
                        </div>
                    </div>
                </div>
                <div style={{
                    background: '#14141c',
                    padding: '24px',
                    borderRadius: '20px',
                    border: '1px solid #1e1e26'
                }}>
                    <h3 style={{ fontSize: '18px', marginBottom: '12px' }}>Your NFTs</h3>
                    <p style={{ color: '#6b6b7b' }}>You don't own any NFTs yet. Explore the marketplace!</p>
                    <button
                        onClick={() => window.location.hash = '/'}
                        style={{
                            marginTop: '16px',
                            background: '#2a2a32',
                            border: 'none',
                            padding: '8px 24px',
                            borderRadius: '40px',
                            color: '#fff',
                            cursor: 'pointer'
                        }}
                    >
                        Explore NFTs
                    </button>
                </div>
            </div>
        );
    }

    // ---- Router ----
    function Router() {
        const [page, setPage] = useState('explore');

        useEffect(() => {
            const handleHash = () => {
                const hash = window.location.hash.slice(1) || '/';
                if (hash === '/') setPage('explore');
                else if (hash === '/collections') setPage('collections');
                else if (hash === '/stats') setPage('stats');
                else if (hash === '/profile') setPage('profile');
                else setPage('explore');
            };
            handleHash();
            window.addEventListener('hashchange', handleHash);
            return () => window.removeEventListener('hashchange', handleHash);
        }, []);

        switch (page) {
            case 'collections':
                return <CollectionsPage />;
            case 'stats':
                return <StatsPage />;
            case 'profile':
                return <ProfilePage />;
            default:
                return <ExplorePage />;
        }
    }

    // ---- App ----
    function App() {
        const [toastMessage, setToastMessage] = useState(null);

        const showToast = useCallback((msg) => {
            setToastMessage(msg);
        }, []);

        const hideToast = useCallback(() => {
            setToastMessage(null);
        }, []);

        return (
            <ToastContext.Provider value={{ showToast }}>
                <div className="container">
                    <Header />
                    <Router />
                    {toastMessage && (
                        <Toast message={toastMessage} onClose={hideToast} />
                    )}
                </div>
            </ToastContext.Provider>
        );
    }

    // ================================================================
    //  RENDER
    // ================================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    console.log('🔥 GetGems Real (All-in-One) loaded.');
    console.log('💡 Connect wallet via TON Connect. All data is simulated but uses real TON API.');
</script>

</body>
</html>
