<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFT Маркет — как на скринах</title>
  <!-- Lottie Web -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      background: #0b0e14;
      color: #eef2f8;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .app {
      max-width: 420px;
      width: 100%;
      background: #131a22;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      padding-bottom: 20px;
      position: relative;
    }
    /* Хедер */
    .header {
      padding: 18px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a3340;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #f9d976, #f39c12);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions span {
      margin-left: 12px;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.7;
    }

    /* Tabs */
    .tabs {
      display: flex;
      padding: 12px 16px 6px;
      gap: 16px;
      border-bottom: 1px solid #1f2a36;
      overflow-x: auto;
    }
    .tab {
      font-size: 14px;
      font-weight: 600;
      color: #8a9aa8;
      padding: 6px 0;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab.active {
      color: #f1c40f;
      border-bottom: 2px solid #f1c40f;
    }

    /* Поиск и фильтры */
    .search-section {
      padding: 16px 16px 8px;
    }
    .search-bar {
      background: #1e2835;
      border-radius: 30px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: #d0dbe8;
      font-size: 15px;
      width: 100%;
    }
    .search-bar input::placeholder {
      color: #5e6f80;
    }
    .filters {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .filter-pill {
      background: #1e2835;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      color: #b0c0d0;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: 1px solid #2f3b4a;
    }
    .filter-pill.active {
      border-color: #f1c40f;
      color: #f1c40f;
    }

    /* NFT Grid */
    .nft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
    }
    .nft-card {
      background: #19222c;
      border-radius: 20px;
      padding: 14px 12px 16px;
      transition: 0.2s;
      border: 1px solid #26303e;
      position: relative;
    }
    .nft-card .lottie-box {
      width: 100%;
      height: 80px;
      background: #10171f;
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nft-card .lottie-box lottie-player {
      width: 100%;
      height: 100%;
    }
    .nft-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .nft-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #a0b2c4;
    }
    .nft-price {
      color: #f1c40f;
      font-weight: 600;
    }
    .nft-change {
      font-size: 12px;
    }
    .nft-change.up { color: #2ecc71; }
    .nft-change.down { color: #e74c3c; }

    /* Bottom nav */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 0 6px;
      border-top: 1px solid #1f2a36;
      margin-top: 8px;
    }
    .nav-item {
      text-align: center;
      font-size: 12px;
      color: #7a8a9a;
      cursor: pointer;
      padding: 4px 12px;
    }
    .nav-item.active {
      color: #f1c40f;
    }
    .nav-item span {
      display: block;
      font-size: 20px;
      margin-bottom: 2px;
    }

    /* Доп. секции как на скринах */
    .section-title {
      padding: 0 16px 6px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }
    .badge {
      background: #f1c40f20;
      color: #f1c40f;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 12px;
    }
    .order-list {
      padding: 0 16px;
    }
    .order-item {
      background: #19222c;
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #2a3544;
    }

    /* Адаптив */
    @media (max-width: 400px) {
      .nft-grid { gap: 8px; }
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <h1>🎁 Маркет</h1>
    <div class="header-actions">
      <span>🔔</span>
      <span>👤</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">Подарки</div>
    <div class="tab">Звезды и Прем</div>
    <div class="tab">Коллекции</div>
    <div class="tab">Каналы</div>
  </div>

  <!-- Search + Filters -->
  <div class="search-section">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" placeholder="Поиск по названию NFT / номеру" id="searchInput" />
      <span>⚡</span>
    </div>
    <div class="filters" id="filterContainer">
      <div class="filter-pill active">NFT ▼</div>
      <div class="filter-pill">Модель ▼</div>
      <div class="filter-pill">Фон ▼</div>
      <div class="filter-pill">Символ ▼</div>
    </div>
  </div>

  <!-- NFT Grid -->
  <div class="nft-grid" id="nftGrid">
    <!-- Карточки будут сгенерированы JS -->
  </div>

  <!-- Доп. блок: Ордеры (как на скрине) -->
  <div style="padding: 0 16px 8px;">
    <div class="section-title">
      <span>📦 Мои ордеры</span>
      <span class="badge">4</span>
    </div>
    <div class="order-list" id="orderList">
      <!-- генерим -->
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active"><span>🏠</span>Маркет</div>
    <div class="nav-item"><span>📋</span>Ордеры</div>
    <div class="nav-item"><span>🎮</span>Игровой хаб</div>
    <div class="nav-item"><span>📌</span>Задания</div>
    <div class="nav-item"><span>📦</span>Хранилище</div>
  </div>
</div>

<script>
  (function() {
    // --- Данные NFT (максимально похожи на скрины) ---
    const nftData = [
      { name: 'Eternal Rose', price: 1763.4, change: '+20.7%', up: true, lottie: 'https://assets10.lottiefiles.com/packages/lf20_ysd5vx1s.json' },
      { name: 'Evil Eye', price: 857.74, change: '-5.82%', up: false, lottie: 'https://assets1.lottiefiles.com/packages/lf20_hggfxehl.json' },
      { name: 'Flying Broom', price: 758.78, change: '-8.04%', up: false, lottie: 'https://assets5.lottiefiles.com/packages/lf20_jf7fxj4w.json' },
      { name: 'Gem Signet', price: 2468.57, change: '+52.44%', up: true, lottie: 'https://assets7.lottiefiles.com/packages/lf20_ow3hpbxq.json' },
      { name: 'Genie Lamp', price: 1344.96, change: '-29.57%', up: false, lottie: 'https://assets3.lottiefiles.com/packages/lf20_x1v1ngqv.json' },
      { name: 'Heart Locket', price: 8851.81, change: '+959%', up: true, lottie: 'https://assets2.lottiefiles.com/packages/lf20_ng9qhx1a.json' },
      { name: 'Heroic Helmet', price: 1399.33, change: '-175.94%', up: false, lottie: 'https://assets9.lottiefiles.com/packages/lf20_hb6pxi8a.json' },
      { name: 'Hex Pot', price: 685.3, change: '-3.11%', up: false, lottie: 'https://assets6.lottiefiles.com/packages/lf20_i5hx4p8l.json' },
      { name: 'Surge Board', price: 3347.36, change: '+6⭐', up: true, lottie: 'https://assets4.lottiefiles.com/packages/lf20_qy3xkfz4.json' },
      { name: 'Liberty Figure', price: 14049.72, change: '+3.35⭐', up: true, lottie: 'https://assets8.lottiefiles.com/packages/lf20_x1v1ngqv.json' },
    ];

    // --- Ордеры (согласно скринам) ---
    const orders = [
      { name: 'Gravestone', qty: 1, price: 39.11 },
      { name: 'Mask', qty: 1, price: 5.73 },
      { name: 'Coffin', qty: 1, price: 18.21 },
      { name: 'Airplane', qty: 1, price: 4000 },
    ];

    // --- Рендер NFT ---
    function renderNFTs(filter = '') {
      const grid = document.getElementById('nftGrid');
      grid.innerHTML = '';
      const filtered = nftData.filter(item => 
        item.name.toLowerCase().includes(filter.toLowerCase())
      );
      filtered.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'nft-card';
        card.innerHTML = `
          <div class="lottie-box" id="lottie-${index}"></div>
          <div class="nft-name">${item.name}</div>
          <div class="nft-meta">
            <span class="nft-price">❤️ ${item.price.toFixed(2)}</span>
            <span class="nft-change ${item.up ? 'up' : 'down'}">${item.change}</span>
          </div>
        `;
        grid.appendChild(card);

        // Lottie анимация
        const container = document.getElementById(`lottie-${index}`);
        if (container && item.lottie) {
          const player = document.createElement('lottie-player');
          player.src = item.lottie;
          player.style.width = '100%';
          player.style.height = '100%';
          player.setAttribute('autoplay', '');
          player.setAttribute('loop', '');
          player.setAttribute('speed', '1');
          container.appendChild(player);
        } else {
          // fallback эмодзи
          container.innerHTML = '🎁';
          container.style.fontSize = '36px';
          container.style.display = 'flex';
          container.style.alignItems = 'center';
          container.style.justifyContent = 'center';
        }
      });
    }

    // --- Рендер ордеров ---
    function renderOrders() {
      const list = document.getElementById('orderList');
      list.innerHTML = '';
      orders.forEach(order => {
        const div = document.createElement('div');
        div.className = 'order-item';
        div.innerHTML = `
          <span><strong>${order.name}</strong> ×${order.qty}</span>
          <span style="color:#f1c40f;">💜 ${order.price}</span>
        `;
        list.appendChild(div);
      });
    }

    // --- Поиск ---
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderNFTs(e.target.value);
    });

    // --- Фильтры (клик для демо) ---
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        this.classList.toggle('active');
        // тут можно добавить логику фильтрации, но для демо просто показываем
        renderNFTs(document.getElementById('searchInput').value);
      });
    });

    // --- Табы (переключение) ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        // заглушка — можно менять контент, но нам похуй, оставим как есть
      });
    });

    // --- Навигация ---
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        this.classList.add('active');
      });
    });

    // --- Инициализация ---
    renderNFTs();
    renderOrders();

    // --- Дополнительно: Lottie ловит ошибки, но мы их игнорим ---
    console.log('Маркет загружен. Гроза, дошик выкинут, код работает.');
  })();
</script>

</body>
</html>
