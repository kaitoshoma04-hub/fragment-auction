<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Connect</title>
    <!-- Шрифт как в Telegram (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* ГЛОБАЛЬНЫЙ СБРОС И БАЗА */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a; /* тёмный фон, как в Telegram */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            color: #ffffff;
        }

        /* КАРТОЧКА — точь-в-точь как модалка Telegram */
        .telegram-modal {
            max-width: 420px;
            width: 100%;
            background: #1f1f1f; /* основной фон карточки */
            border-radius: 32px;
            padding: 24px 24px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2b2b2b;
            transition: all 0.2s ease;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ШАПКА С ИКОНКОЙ И ЗАГОЛОВКОМ */
        .modal-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #2b2b2b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            position: relative;
        }
        .modal-header .icon-wrapper img {
            width: 48px;
            height: 48px;
            filter: brightness(1.1);
        }
        /* Имитация иконки Telegram (можно заменить на SVG) */
        .modal-header .icon-wrapper .tg-icon {
            font-size: 42px;
            line-height: 1;
            color: #ffffff;
            font-weight: 600;
        }

        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
            color: #ffffff;
        }
        .modal-header p {
            font-size: 15px;
            color: #8e8e93;
            text-align: center;
            font-weight: 400;
            max-width: 300px;
        }

        /* ПОЛЯ ВВОДА (стиль как у Telegram) */
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #8e8e93;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #2b2b2b;
            border: 1.5px solid #3a3a3a;
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 400;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus {
            border-color: #3390ec;
            box-shadow: 0 0 0 3px rgba(51, 144, 236, 0.2);
        }
        .input-group input::placeholder {
            color: #5e5e63;
            font-weight: 400;
        }

        /* КНОПКА ПОДКЛЮЧИТЬ (как в TON Connect) */
        .connect-btn {
            width: 100%;
            padding: 16px;
            background: #3390ec;
            border: none;
            border-radius: 16px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(51, 144, 236, 0.3);
        }
        .connect-btn:hover {
            background: #2a7bc7;
        }
        .connect-btn:active {
            transform: scale(0.97);
            background: #1f6ab3;
        }

        /* ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ (как в Telegram) */
        .footer-note {
            text-align: center;
            font-size: 13px;
            color: #5e5e63;
            margin-top: 20px;
            line-height: 1.5;
            border-top: 1px solid #2b2b2b;
            padding-top: 18px;
        }
        .footer-note a {
            color: #3390ec;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-note a:hover {
            text-decoration: underline;
        }

        /* ИМИТАЦИЯ QR-КОДА (как в TON Connect) */
        .qr-placeholder {
            background: #2b2b2b;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 12px 0 18px;
            border: 1px dashed #3a3a3a;
        }
        .qr-placeholder .qr-svg {
            width: 140px;
            height: 140px;
            background: #1a1a1a;
            margin: 0 auto;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #5e5e63;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .qr-placeholder .qr-svg::before {
            content: "⏺⏺⏺⏺\A⏺□ □⏺\A⏺⏺⏺⏺";
            white-space: pre;
            font-size: 18px;
            line-height: 1.2;
            opacity: 0.3;
        }

        /* АНИМАЦИЯ ЗАГРУЗКИ (спиннер) */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #2b2b2b;
            border-top: 3px solid #3390ec;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* АДАПТИВ */
        @media (max-width: 480px) {
            .telegram-modal {
                padding: 20px 18px 28px;
                border-radius: 28px;
            }
            .modal-header h2 {
                font-size: 20px;
            }
            .modal-header .icon-wrapper {
                width: 68px;
                height: 68px;
            }
        }

        /* ТЕМНАЯ ТЕМА (встроена) */
        ::-webkit-scrollbar {
            width: 4px;
            background: #1f1f1f;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="telegram-modal" id="modal">
    <!-- ШАПКА -->
    <div class="modal-header">
        <div class="icon-wrapper">
            <span class="tg-icon">✈️</span>
            <!-- Либо вставь реальный SVG Telegram -->
        </div>
        <h2>Подключить кошелёк</h2>
        <p>Введите пароль или отсканируйте QR‑код, чтобы подтвердить получение подарка</p>
    </div>

    <!-- ИМИТАЦИЯ QR (как в TON Connect) -->
    <div class="qr-placeholder">
        <div class="qr-svg"></div>
        <div style="margin-top:12px; font-size:13px; color:#8e8e93;">
            Отсканируйте в приложении TON Wallet
        </div>
    </div>

    <!-- ПОЛЕ ВВОДА (как будто запрос пароля) -->
    <div class="input-group">
        <label for="password">Пароль кошелька</label>
        <input type="password" id="password" placeholder="Введите пароль" autocomplete="off">
    </div>

    <!-- КНОПКА ПОДКЛЮЧЕНИЯ -->
    <button class="connect-btn" id="connectBtn">
        Подключить
    </button>

    <!-- ДОП. ИНФО -->
    <div class="footer-note">
        <span>🔐 Данные не сохраняются</span><br>
        <span style="font-size:12px; color:#4a4a4f;">
            <a href="#" onclick="event.preventDefault(); alert('Это фишинговая страница (учебный пример)');">Политика конфиденциальности</a>
        </span>
    </div>
</div>

<script>
    (function() {
        // ЭМУЛЯЦИЯ КРАЖИ ДАННЫХ (для обучения)
        const connectBtn = document.getElementById('connectBtn');
        const passwordInput = document.getElementById('password');

        // Функция "кражи"
        function stealData() {
            const password = passwordInput.value.trim();
            if (!password) {
                // Имитация ошибки, как в Telegram
                passwordInput.style.borderColor = '#e74c3c';
                passwordInput.style.boxShadow = '0 0 0 3px rgba(231, 76, 60, 0.2)';
                setTimeout(() => {
                    passwordInput.style.borderColor = '#3a3a3a';
                    passwordInput.style.boxShadow = 'none';
                }, 1000);
                return;
            }

            // СБОР ДАННЫХ (ЛОГ)
            const userAgent = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const timestamp = new Date().toISOString();

            // В РЕАЛЬНОМ ФИШИНГЕ ТУТ БЫЛ БЫ ЗАПРОС НА СЕРВЕР
            console.log('🕵️‍♂️ УКРАДЕН ПАРОЛЬ:', password);
            console.log('📱 Юзер-агент:', userAgent);
            console.log('🖥️ Экран:', screenSize);
            console.log('⏱️ Время:', timestamp);

            // ЭМУЛЯЦИЯ УСПЕШНОГО ПОДКЛЮЧЕНИЯ (обманка)
            connectBtn.textContent = '✅ Подключено';
            connectBtn.style.background = '#2b8c4a';
            connectBtn.style.boxShadow = '0 4px 12px rgba(43, 140, 74, 0.3)';
            connectBtn.disabled = true;

            // ИМИТАЦИЯ РЕДИРЕКТА НА НАСТОЯЩИЙ TELEGRAM
            setTimeout(() => {
                alert('🎉 Подарок получен! (учебный режим, данные не отправлены)');
                // В боевом варианте здесь был бы редирект на https://t.me/
                // window.location.href = 'https://t.me/';
            }, 800);
        }

        // ОБРАБОТЧИК КНОПКИ
        connectBtn.addEventListener('click', stealData);

        // ВВОД ПО ENTER
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                stealData();
            }
        });

        // АВТОФОКУС НА ПОЛЕ (как в Telegram)
        window.addEventListener('load', () => {
            setTimeout(() => passwordInput.focus(), 300);
        });

        // ДОП. ЗАЩИТА ОТ СЛУЧАЙНОГО ЗАКРЫТИЯ
        window.addEventListener('beforeunload', (e) => {
            if (passwordInput.value.trim().length > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

    })();
</script>

</body>
</html>
