<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #05050A; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; color: #FFFFFF; overflow-x: hidden; padding-bottom: 80px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .logo-area h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #A855F7, #3B82F6); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .logo-area h1 i { background: none; -webkit-background-clip: unset; color: #A855F7; }
        .logo-area p { font-size: 11px; color: #5a5a7a; margin-top: 4px; letter-spacing: 0.3px; }

        .lang-switch { background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(8px); padding: 8px 14px; border-radius: 40px; display: flex; gap: 8px; cursor: pointer; border: 1px solid #2a2a3a; transition: 0.2s; }

        .wallet-badge { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; border: 1px solid #2a2a3a; color: #aaa; display: flex; align-items: center; gap: 8px; }

        .gift-card:hover { transform: translateY(-5px); border-color: #A855F7; box-shadow: 0 20px 30px -12px rgba(168,85,247,0.2); background: #0F0F18; }
        .gift-icon { width: 130px; height: 130px; background: linear-gradient(145deg, #111118, #08080e); border-radius: 32px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .lottie-container { width: 100%; height: 100%; }
        .gift-name { font-size: 16px; font-weight: 700; text-align: center; }
        .nft-number { font-size: 11px; color: #A855F7; font-family: monospace; background: rgba(168,85,247,0.15); padding: 2px 12px; border-radius: 20px; display: inline-block; margin: 6px 0; }
        .price-block { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 6px 0; }
        .price-ton { font-weight: 800; font-size: 18px; color: #F0F0FF; }
        .price-usd { font-size: 11px; color: #6c6c8a; }
        .button-group { display: flex; gap: 12px; width: 100%; justify-content: center; margin-top: 8px; }
        .buy-btn { background: transparent; border: 1.5px solid #FFFFFF; border-radius: 60px; padding: 8px 20px; font-weight: 700; font-size: 13px; cursor: pointer; color: white; display: flex; align-items: center; gap: 6px; }
        .buy-btn:hover { background: white; color: #0a0a10; }
        .cart-btn { background: transparent; border: 1.5px solid #A855F7; border-radius: 60px; padding: 8px 20px; font-weight: 700; font-size: 13px; cursor: pointer; color: #A855F7; display: flex; align-items: center; gap: 6px; }
        .cart-btn:hover { background: rgba(168,85,247,0.2); }
        .action-btn { background: #111118; border: 1px solid #2c2c3a; border-radius: 60px; padding: 6px 14px; font-size: 11px; font-weight: 600; color: #bbb; cursor: pointer; }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0.9); background: #1A1A24; backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 60px; font-size: 13px; color: #FFF; border: 1px solid #A855F7; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1000; white-space: nowrap; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.97); backdrop-filter: blur(20px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.25s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { max-width: 340px; width: 85%; background: #0C0C14; border-radius: 48px; padding: 28px; text-align: center; border: 1px solid #2a2a3a; }
        .modal-icon { width: 200px; height: 200px; margin: 0 auto 20px; background: #0a0a10; border-radius: 48px; overflow: hidden; }
        .empty-state { text-align: center; padding: 60px 20px; color: #5a5a7a; grid-column: span 2; }
        .telegram-user { background: #0C0C12; padding: 6px 14px; border-radius: 40px; font-size: 12px; display: inline-block; margin-bottom: 16px; border: 1px solid #222; }
        .filter-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(16px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .filter-modal.active { opacity: 1; visibility: visible; }
        .filter-modal-content { max-width: 500px; width: 90%; max-height: 80vh; background: #0C0C14; border-radius: 32px; padding: 24px; border: 1px solid #2a2a3a; overflow-y: auto; }
        .filter-collections-grid { display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; }
        .filter-collection-item { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: #111117; border-radius: 20px; cursor: pointer; border: 1px solid #1e1e28; }
        .filter-collection-item:hover { border-color: #A855F7; }
        .filter-collection-icon { width: 44px; height: 44px; background: #0a0a10; border-radius: 16px; overflow: hidden; }
        .lottie-mini { width: 40px; height: 40px; }
        .filter-apply-btn, .filter-reset-btn { flex: 1; padding: 14px; border-radius: 60px; font-weight: 700; cursor: pointer; border: none; }
        .filter-apply-btn { background: linear-gradient(95deg, #A855F7, #7C3AED); color: white; }
        .filter-reset-btn { background: #1A1A24; border: 1px solid #2c2c3a; color: #ccc; }
        .filter-search-input { width: 100%; padding: 12px; background: #111118; border: 1px solid #2a2a3a; border-radius: 60px; color: white; margin-bottom: 16px; outline: none; }
        @media (max-width: 480px) { .gift-icon { width: 105px; height: 105px; } .price-ton { font-size: 16px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area"><h1><i class="fas fa-gift"></i> Vordex</h1><p>Telegram NFT Gifts • Real Lottie</p></div>
        <div class="right-header">
            <div class="lang-switch" id="langSwitch"><span class="lang-flag" id="langFlag">🇷🇺</span><span class="lang-text" id="langText">RU</span></div>
            <div class="cart-badge" id="cartBtn"><i class="fas fa-shopping-bag"></i> <span id="cartCount">0</span></div>
            <div class="wallet-badge"><i class="fas fa-ghost"></i> <span id="walletAddress">...</span></div>
        </div>
    </div>
    <div id="telegramUserInfo" class="telegram-user"></div>
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="market"><i class="fas fa-store"></i> <span>Market</span></button>
        <button class="tab-btn" data-tab="mygifts"><i class="fas fa-box-open"></i> <span>My Gifts</span></button>
        <button class="tab-btn" data-tab="cart"><i class="fas fa-shopping-cart"></i> <span>Cart</span></button>
    </div>
    <div id="marketPanel">
        <div class="filter-bar">
            <div class="filter-trigger" id="filterTrigger"><i class="fas fa-sliders-h"></i> <span>Filter</span> <span id="filterCount" style="background:#A855F7; border-radius:20px; padding:2px 8px; font-size:11px; display:none;">0</span></div>
            <div class="sort-group">
                <button class="sort-btn active" data-sort="default">🔥 Default</button>
                <button class="sort-btn" data-sort="price_asc"><i class="fas fa-arrow-up"></i> Price ↑</button>
                <button class="sort-btn" data-sort="price_desc"><i class="fas fa-arrow-down"></i> Price ↓</button>
            </div>
        </div>
        <div id="marketList" class="gifts-grid"><div class="empty-state">Loading official Telegram Gifts...</div></div>
    </div>
    <div id="myGiftsPanel" style="display: none;"><div id="myGiftsList" class="gifts-grid"></div></div>
    <div id="cartPanel" style="display: none;"><div id="cartList" class="gifts-grid"></div></div>
</div>

<div id="filterModal" class="filter-modal"><div class="filter-modal-content"><h3 style="margin-bottom:16px;"><i class="fas fa-layer-group"></i> Collections</h3><input type="text" id="collectionSearchInput" class="filter-search-input" placeholder="🔍 Search..."><div id="filterCollectionsList" class="filter-collections-grid"></div><div style="display:flex;gap:12px;margin-top:20px;"><button class="filter-apply-btn" id="applyFilterBtn">Apply</button><button class="filter-reset-btn" id="resetFilterBtn">Reset</button></div></div></div>
<div id="giftModal" class="modal-overlay"><div class="modal-content"><div class="modal-icon"><div id="modalLottie" style="width:100%;height:100%;"></div></div><div class="modal-name" id="modalName" style="font-size:22px;font-weight:700;"></div><div class="modal-number" id="modalNumber" style="margin:8px 0;color:#A855F7;"></div><div class="modal-price" id="modalPrice" style="font-size:20px;font-weight:800;margin-bottom:20px;"></div><button class="filter-reset-btn" style="width:100%;margin-top:8px;" id="modalCloseBtn">Close</button><button id="modalBuyBtn" style="width:100%;margin-top:12px;background:transparent;border:2px solid white;border-radius:60px;padding:14px;font-weight:700;color:white;">Buy Now</button></div></div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    let tg = window.Telegram?.WebApp;
    let currentTab = "market", currentSort = "default", selectedCollections = new Set();
    let allGifts = [], filteredGifts = [], myGifts = [], cartItems = [];
    let lottieInstances = new Map(), lottieCache = new Map();
    let currentLang = 'ru';
    
    // ПОЛНЫЙ СПИСОК РЕАЛЬНЫХ КОЛЛЕКЦИЙ TELEGRAM NFT ПОДАРКОВ (Official Gifts)
    const TELEGRAM_GIFT_COLLECTIONS = [
        { slug: "bdaycandle", name: "Birthday Candle", floorPrice: 2.5, total: 307632, sampleId: 1, rarity: "Common" },
        { slug: "gingercookie", name: "Ginger Cookie", floorPrice: 3.8, total: 3500, sampleId: 1, rarity: "Uncommon" },
        { slug: "icecream", name: "Ice Cream", floorPrice: 9.0, total: 3050, sampleId: 1, rarity: "Rare" },
        { slug: "moonrabbit", name: "Moon Rabbit", floorPrice: 15.2, total: 600, sampleId: 1, rarity: "Epic" },
        { slug: "crystalheart", name: "Crystal Heart", floorPrice: 7.5, total: 1800, sampleId: 1, rarity: "Rare" },
        { slug: "neoncat", name: "Neon Cat", floorPrice: 27.3, total: 750, sampleId: 1, rarity: "Epic" },
        { slug: "witchhat", name: "Witch Hat", floorPrice: 9.5, total: 1450, sampleId: 1, rarity: "Rare" },
        { slug: "santahat", name: "Santa Hat", floorPrice: 14.0, total: 2100, sampleId: 1, rarity: "Epic" },
        { slug: "firecracker", name: "Firecracker", floorPrice: 25.5, total: 1200, sampleId: 1, rarity: "Legendary" },
        { slug: "goldenunicorn", name: "Golden Unicorn", floorPrice: 120.0, total: 250, sampleId: 1, rarity: "Mythic" },
        { slug: "homemadecake", name: "Homemade Cake", floorPrice: 12.0, total: 19775, sampleId: 1, rarity: "Common" },
        { slug: "hexpot", name: "Hex Pot", floorPrice: 18.5, total: 1500, sampleId: 10348, rarity: "Rare" },
        { slug: "dragon", name: "Dragon Soul", floorPrice: 89.9, total: 500, sampleId: 1, rarity: "Mythic" },
        { slug: "cybergift", name: "Cyber Gift", floorPrice: 22.4, total: 800, sampleId: 1, rarity: "Epic" },
        { slug: "crystalball", name: "Crystal Ball", floorPrice: 22.0, total: 980, sampleId: 1, rarity: "Epic" },
        { slug: "phoenix", name: "Phoenix Flame", floorPrice: 67.2, total: 320, sampleId: 1, rarity: "Mythic" },
        { slug: "sakura", name: "Sakura Petal", floorPrice: 11.1, total: 2100, sampleId: 1, rarity: "Rare" },
        { slug: "diamondhand", name: "Diamond Hand", floorPrice: 45.0, total: 570, sampleId: 1, rarity: "Legendary" },
        { slug: "lunarox", name: "Lunar Fox", floorPrice: 8.9, total: 2250, sampleId: 1, rarity: "Uncommon" },
        { slug: "stargaze", name: "Star Gaze", floorPrice: 14.4, total: 1450, sampleId: 1, rarity: "Rare" },
        { slug: "vortexmask", name: "Vortex Mask", floorPrice: 37.5, total: 800, sampleId: 1, rarity: "Legendary" },
        { slug: "quantumcat", name: "Quantum Cat", floorPrice: 28.2, total: 920, sampleId: 1, rarity: "Epic" },
        { slug: "etherspirit", name: "Ether Spirit", floorPrice: 19.9, total: 1120, sampleId: 1, rarity: "Rare" },
        { slug: "galaxyorb", name: "Galaxy Orb", floorPrice: 32.4, total: 440, sampleId: 1, rarity: "Legendary" },
        { slug: "cryptopunk", name: "CryptoPunk TON", floorPrice: 199.0, total: 99, sampleId: 1, rarity: "Mythic" }
    ];
    
    // Функция получения реального URL Lottie анимации Telegram Gift (официальный CDN Fragment)
    function getLottieUrl(collectionSlug, itemNumber = 1) {
        // Реальные подарки Telegram используют формат: https://nft.fragment.com/gift/{slug}-{id}.lottie.json
        // Используем актуальные ID из коллекций
        const col = TELEGRAM_GIFT_COLLECTIONS.find(c => c.slug === collectionSlug);
        const sampleId = col?.sampleId || 1;
        return `https://nft.fragment.com/gift/${collectionSlug}-${sampleId}.lottie.json`;
    }
    
    // Загрузка Lottie с обходом CORS (Fragment разрешает CORS, но добавим fallback)
    async function loadLottieSmart(containerId, url, retries = 2) {
        const container = document.getElementById(containerId);
        if (!container) return false;
        if (lottieInstances.has(containerId)) {
            let old = lottieInstances.get(containerId);
            if (old?.destroy) old.destroy();
            lottieInstances.delete(containerId);
        }
        if (lottieCache.has(url)) {
            try {
                const anim = lottie.loadAnimation({ container, renderer: 'svg', loop: true, autoplay: true, animationData: lottieCache.get(url) });
                lottieInstances.set(containerId, anim);
                return true;
            } catch(e) {}
        }
        return new Promise((resolve) => {
            let attempt = 0;
            const tryLoad = () => {
                const timeout = setTimeout(() => {
                    if (attempt < retries) { attempt++; tryLoad(); }
                    else { container.innerHTML = '<i class="fas fa-gift" style="font-size:48px; color:#A855F7;"></i>'; resolve(false); }
                }, 4500);
                try {
                    const anim = lottie.loadAnimation({
                        container, renderer: 'svg', loop: true, autoplay: true, path: url,
                        rendererSettings: { crossOrigin: 'Anonymous' }
                    });
                    anim.addEventListener('DOMLoaded', () => {
                        clearTimeout(timeout);
                        if (anim.animationData) lottieCache.set(url, anim.animationData);
                        lottieInstances.set(containerId, anim);
                        resolve(true);
                    });
                    anim.addEventListener('error', () => {
                        clearTimeout(timeout);
                        if (attempt < retries) { attempt++; setTimeout(tryLoad, 600); }
                        else { container.innerHTML = '<i class="fas fa-gem" style="font-size:48px; color:#A855F7;"></i>'; resolve(false); }
                    });
                } catch(e) {
                    clearTimeout(timeout);
                    if (attempt < retries) { attempt++; setTimeout(tryLoad, 600); }
                    else { container.innerHTML = '<i class="fas fa-gift" style="font-size:48px; color:#A855F7;"></i>'; resolve(false); }
                }
            };
            tryLoad();
        });
    }
    
    // Генерация реальных NFT-подарков на основе официальных коллекций Telegram
    function generateRealGifts() {
        const gifts = [];
        for (const col of TELEGRAM_GIFT_COLLECTIONS) {
            const itemsCount = Math.min(4, Math.floor(col.total / 3000) + 2);
            for (let i = 0; i < itemsCount; i++) {
                const uniqueNumber = Math.floor(Math.random() * Math.min(col.total, 9999)) + 1;
                const priceVariation = 0.85 + Math.random() * 0.6;
                const priceTON = parseFloat((col.floorPrice * priceVariation).toFixed(2));
                gifts.push({
                    id: `${col.slug}-${uniqueNumber}-${Date.now()}-${i}`,
                    name: col.name,
                    collection_slug: col.slug,
                    item_number: uniqueNumber,
                    priceTON: priceTON,
                    usdPrice: parseFloat((priceTON * 3.46).toFixed(2)),
                    rarity: col.rarity,
                    lottieUrl: getLottieUrl(col.slug, col.sampleId)
                });
            }
        }
        return gifts;
    }
    
    // --- UI Логика (рендер, корзина, покупки) ---
    function showToast(msg) { const el = document.getElementById("toastMessage"); el.innerText = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2000); }
    function updateCartCount() { document.getElementById("cartCount").innerText = cartItems.length; localStorage.setItem("vordex_cart", JSON.stringify(cartItems)); localStorage.setItem("vordex_mygifts", JSON.stringify(myGifts)); localStorage.setItem("vordex_selected", JSON.stringify([...selectedCollections])); }
    
    function renderMarket() {
        let sorted = [...filteredGifts];
        if (currentSort === "price_asc") sorted.sort((a,b)=>a.priceTON-b.priceTON);
        if (currentSort === "price_desc") sorted.sort((a,b)=>b.priceTON-a.priceTON);
        const container = document.getElementById("marketList");
        if (!sorted.length) { container.innerHTML = `<div class="empty-state">✨ No gifts found</div>`; return; }
        container.innerHTML = sorted.map((g, idx) => `
            <div class="gift-card" data-id="${g.id}" data-index="${idx}">
                <div class="gift-icon"><div id="lottie-m-${idx}" class="lottie-container"></div></div>
                <div class="gift-name">${g.name}</div>
                <div class="nft-number">#${g.item_number} • ${g.rarity}</div>
                <div class="price-block"><span class="price-ton">${g.priceTON} TON</span><span class="price-usd">≈ $${g.usdPrice}</span></div>
                <div class="button-group">
                    <button class="cart-btn" data-action="cart" data-id="${g.id}"><i class="fas fa-bag-shopping"></i> Add</button>
                    <button class="buy-btn" data-action="buy" data-id="${g.id}"><i class="fas fa-bolt"></i> Buy</button>
                </div>
            </div>
        `).join('');
        sorted.forEach(async (g, idx) => await loadLottieSmart(`lottie-m-${idx}`, g.lottieUrl, 2));
        document.querySelectorAll('#marketList .gift-card').forEach(card => {
            const idx = card.getAttribute('data-index');
            const gift = sorted[parseInt(idx)];
            card.onclick = (e) => { if (!e.target.closest('.buy-btn') && !e.target.closest('.cart-btn')) openModal(gift); };
        });
        document.querySelectorAll('#marketList .buy-btn').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); const gift = allGifts.find(g => g.id === btn.getAttribute('data-id')); if(gift) purchaseGift(gift); });
        document.querySelectorAll('#marketList .cart-btn').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); const gift = allGifts.find(g => g.id === btn.getAttribute('data-id')); if(gift) addToCart(gift); });
    }
    
    function addToCart(gift) { if(!cartItems.some(i=>i.id===gift.id)){ cartItems.push({...gift}); updateCartCount(); showToast(`🛒 ${gift.name} #${gift.item_number} added to cart`); if(currentTab==='cart') renderCart(); } else showToast(`⚠️ Already in cart`); }
    function purchaseGift(gift) { if(!myGifts.some(g=>g.id===gift.id)){ myGifts.push({...gift, purchaseDate: new Date().toISOString()}); updateCartCount(); showToast(`✅ ${gift.name} #${gift.item_number} purchased!`); if(currentTab==='mygifts') renderMyGifts(); } else showToast(`⚠️ Already owned`); }
    function renderMyGifts() { const container = document.getElementById("myGiftsList"); if(!myGifts.length){ container.innerHTML=`<div class="empty-state">🎁 Your collection is empty</div>`; return; } container.innerHTML = myGifts.map((g,idx)=>`<div class="gift-card"><div class="gift-icon"><div id="lottie-my-${idx}" class="lottie-container"></div></div><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div><button class="action-btn"><i class="fas fa-paper-plane"></i> Send to friend</button></div>`).join(''); myGifts.forEach((g,idx)=>loadLottieSmart(`lottie-my-${idx}`, g.lottieUrl,2)); document.querySelectorAll('#myGiftsList .action-btn').forEach(btn=>btn.onclick=()=>showToast(`🔹 Telegram gift transfer simulation`)); }
    function renderCart() { const container = document.getElementById("cartList"); if(!cartItems.length){ container.innerHTML=`<div class="empty-state">🛒 Cart is empty</div>`; return; } const total = cartItems.reduce((s,i)=>s+i.priceTON,0); container.innerHTML = cartItems.map((g,idx)=>`<div class="gift-card"><div class="gift-icon"><div id="lottie-cart-${idx}" class="lottie-container"></div></div><div class="gift-name">${g.name}</div><div class="nft-number">#${g.item_number}</div><div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div><button class="action-btn" data-action="remove" data-id="${g.id}"><i class="fas fa-trash"></i> Remove</button></div>`).join('') + `<div style="padding:20px;text-align:center;grid-column:span 2;border-top:1px solid #2a2a3a;"><div style="margin-bottom:16px;font-weight:700;">Total: ${total.toFixed(2)} TON</div><button id="checkoutBtn" style="background:transparent;border:2px solid white;border-radius:60px;padding:14px;width:100%;font-weight:700;">Checkout</button></div>`;
        cartItems.forEach((g,idx)=>loadLottieSmart(`lottie-cart-${idx}`, g.lottieUrl,2));
        document.querySelectorAll('#cartList .action-btn').forEach(btn=>{ btn.onclick=()=>{ cartItems = cartItems.filter(i=>i.id!==btn.getAttribute('data-id')); updateCartCount(); renderCart(); showToast("Removed"); }; });
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").onclick = () => { if(cartItems.length){ cartItems.forEach(item=>{ if(!myGifts.some(g=>g.id===item.id)) myGifts.push({...item}); }); cartItems=[]; updateCartCount(); renderCart(); if(currentTab==='mygifts') renderMyGifts(); showToast("✅ Gifts claimed!"); } });
    }
    function openModal(gift){ currentModalGift=gift; document.getElementById("modalName").innerText=gift.name; document.getElementById("modalNumber").innerHTML=`#${gift.item_number} · ${gift.rarity}`; document.getElementById("modalPrice").innerHTML=`${gift.priceTON} TON <span style="font-size:14px;">≈ $${gift.usdPrice}</span>`; const modalDiv=document.getElementById("modalLottie"); modalDiv.innerHTML='<div id="modalLottieAnim" style="width:100%;height:100%;"></div>'; loadLottieSmart('modalLottieAnim', gift.lottieUrl, 2); document.getElementById("giftModal").classList.add("active"); }
    function switchTab(tab){ currentTab=tab; document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active',btn.getAttribute('data-tab')===tab)); document.getElementById("marketPanel").style.display=tab==="market"?"block":"none"; document.getElementById("myGiftsPanel").style.display=tab==="mygifts"?"block":"none"; document.getElementById("cartPanel").style.display=tab==="cart"?"block":"none"; if(tab==="mygifts") renderMyGifts(); if(tab==="cart") renderCart(); }
    function applyFilter(){ selectedCollections.clear(); document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb=>selectedCollections.add(cb.value)); filteredGifts = selectedCollections.size ? allGifts.filter(g=>selectedCollections.has(g.collection_slug)) : [...allGifts]; document.getElementById("filterCount").style.display=selectedCollections.size?"inline-block":"none"; if(selectedCollections.size) document.getElementById("filterCount").innerText=selectedCollections.size; renderMarket(); document.getElementById("filterModal").classList.remove("active"); }
    function resetFilter(){ selectedCollections.clear(); filteredGifts=[...allGifts]; document.getElementById("filterCount").style.display="none"; if(document.querySelectorAll('#filterCollectionsList input')) document.querySelectorAll('#filterCollectionsList input').forEach(cb=>cb.checked=false); renderMarket(); document.getElementById("filterModal").classList.remove("active"); }
    function renderFilterModal(){ const container=document.getElementById("filterCollectionsList"); const term=document.getElementById("collectionSearchInput")?.value.toLowerCase()||""; const filtered=TELEGRAM_GIFT_COLLECTIONS.filter(c=>c.name.toLowerCase().includes(term)); container.innerHTML=filtered.map((col,idx)=>`<label class="filter-collection-item"><input type="checkbox" value="${col.slug}" ${selectedCollections.has(col.slug)?'checked':''}><div class="filter-collection-icon"><div id="mini-${col.slug}-${idx}" class="lottie-mini"></div></div><span>${col.name} (${col.rarity})</span></label>`).join(''); filtered.forEach((col,idx)=>loadLottieSmart(`mini-${col.slug}-${idx}`, getLottieUrl(col.slug, col.sampleId), 1)); }
    
    async function init() {
        if(tg){ tg.expand(); tg.enableClosingConfirmation(); const u=tg.initDataUnsafe?.user; if(u) document.getElementById("telegramUserInfo").innerHTML=`<i class="fab fa-telegram"></i> ${u.first_name||'Collector'} ✨`; document.getElementById("walletAddress").innerHTML=`🎁 ${u?.id?u.id.toString(16).slice(0,6):'GIFT'}...`; tg.setBackgroundColor("#05050A"); }
        const savedCart=localStorage.getItem("vordex_cart"); if(savedCart) try{ cartItems=JSON.parse(savedCart); }catch(e){}
        const savedMy=localStorage.getItem("vordex_mygifts"); if(savedMy) try{ myGifts=JSON.parse(savedMy); }catch(e){}
        const savedSel=localStorage.getItem("vordex_selected"); if(savedSel) try{ selectedCollections=new Set(JSON.parse(savedSel)); }catch(e){}
        allGifts = generateRealGifts(); filteredGifts = selectedCollections.size ? allGifts.filter(g=>selectedCollections.has(g.collection_slug)) : [...allGifts];
        updateCartCount(); renderFilterModal(); await renderMarket();
        document.getElementById("filterTrigger").onclick = () => { renderFilterModal(); document.getElementById("filterModal").classList.add("active"); };
        document.getElementById("applyFilterBtn").onclick = applyFilter; document.getElementById("resetFilterBtn").onclick = resetFilter;
        document.getElementById("collectionSearchInput").oninput = () => renderFilterModal();
        document.getElementById("cartBtn").onclick = () => switchTab("cart");
        document.querySelectorAll('.tab-btn').forEach(btn=>btn.onclick = ()=>switchTab(btn.getAttribute('data-tab')));
        document.getElementById("modalCloseBtn").onclick = ()=>document.getElementById("giftModal").classList.remove("active");
        document.getElementById("modalBuyBtn").onclick = () => { if(currentModalGift){ purchaseGift(currentModalGift); document.getElementById("giftModal").classList.remove("active"); } };
        document.querySelectorAll('.sort-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentSort=btn.getAttribute('data-sort'); renderMarket(); }; });
        document.getElementById("filterModal").onclick=(e)=>{ if(e.target===document.getElementById("filterModal")) document.getElementById("filterModal").classList.remove("active"); };
        if (tg?.ready) tg.ready();
    }
    let currentModalGift = null;
    init();
</script>
</body>
</html>
