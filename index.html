<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Vordex NFT Market | Real Fragment Gifts</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #05050A; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; 
            color: #FFFFFF; 
            overflow-x: hidden; 
            padding-bottom: 80px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111115; }
        ::-webkit-scrollbar-thumb { background: #2c2c3a; border-radius: 10px; }
        
        .app-container { max-width: 600px; margin: 0 auto; padding: 20px 16px 32px 16px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .logo-area h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #A855F7, #3B82F6); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .logo-area h1 i { background: none; -webkit-background-clip: unset; color: #A855F7; }
        .logo-area p { font-size: 11px; color: #5a5a7a; margin-top: 4px; letter-spacing: 0.3px; }
        
        .right-header { display: flex; gap: 10px; align-items: center; }
        .lang-switch { background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(8px); padding: 8px 14px; border-radius: 40px; display: flex; gap: 8px; cursor: pointer; border: 1px solid #2a2a3a; transition: 0.2s; }
        .lang-switch:hover { border-color: #A855F7; background: #1a1a2a; }
        .lang-flag { font-size: 18px; }
        .lang-text { font-size: 13px; font-weight: 500; color: #ccc; }
        .cart-badge { background: rgba(168, 85, 247, 0.2); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; border: 1px solid rgba(168, 85, 247, 0.3); }
        .cart-badge:hover { background: rgba(168, 85, 247, 0.4); transform: scale(1.02); }
        .wallet-badge { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; border: 1px solid #2a2a3a; color: #aaa; display: flex; align-items: center; gap: 8px; }
        
        .tabs-container { display: flex; gap: 8px; margin-bottom: 28px; background: #0C0C12; padding: 6px; border-radius: 60px; border: 1px solid #1e1e28; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 12px 0; border-radius: 50px; font-size: 15px; font-weight: 600; color: #6c6c8a; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn.active { background: linear-gradient(95deg, #1a1a2e, #0f0f1a); color: white; box-shadow: 0 0 0 1px rgba(168,85,247,0.4), 0 4px 12px rgba(0,0,0,0.3); }
        
        .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
        .filter-trigger { background: #0C0C12; border: 1px solid #252530; padding: 10px 20px; border-radius: 40px; font-size: 14px; font-weight: 500; color: #ddd; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .filter-trigger:hover { border-color: #A855F7; background: #111118; }
        .sort-group { display: flex; gap: 8px; background: #0C0C12; padding: 4px; border-radius: 60px; border: 1px solid #22222c; }
        .sort-btn { background: transparent; border: none; padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; color: #8f8faa; cursor: pointer; transition: 0.2s; }
        .sort-btn.active { background: #1E1E2C; color: white; }
        
        .filter-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(16px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .filter-modal.active { opacity: 1; visibility: visible; }
        .filter-modal-content { max-width: 500px; width: 90%; max-height: 80vh; background: #0C0C14; border-radius: 32px; padding: 24px; border: 1px solid #2a2a3a; overflow-y: auto; }
        .filter-collections-grid { display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; }
        .filter-collection-item { display: flex; align-items: center; gap: 14px; padding: 10px 14px; background: #111117; border-radius: 20px; cursor: pointer; border: 1px solid #1e1e28; transition: 0.2s; }
        .filter-collection-item:hover { background: #1a1a24; border-color: #A855F7; }
        .filter-apply-btn, .filter-reset-btn { flex: 1; padding: 14px; border-radius: 60px; font-weight: 700; cursor: pointer; border: none; }
        .filter-apply-btn { background: linear-gradient(95deg, #A855F7, #7C3AED); color: white; }
        .filter-reset-btn { background: #1A1A24; border: 1px solid #2c2c3a; color: #ccc; }
        
        .gifts-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 16px !important; margin-top: 8px; }
        .gift-card { background: #0C0C14; border-radius: 28px; padding: 18px 12px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; border: 1px solid #1E1E2C; transition: all 0.25s ease; position: relative; cursor: pointer; }
        .gift-card:hover { transform: translateY(-5px); border-color: #A855F7; box-shadow: 0 20px 30px -12px rgba(168,85,247,0.2); background: #0F0F18; }
        .gift-icon { width: 130px; height: 130px; background: linear-gradient(145deg, #111118, #08080e); border-radius: 32px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border-radius: 32px; margin-bottom: 4px; }
        .lottie-container { width: 100%; height: 100%; }
        .gift-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; text-align: center; }
        .nft-number { font-size: 11px; color: #A855F7; font-family: monospace; font-weight: 600; background: rgba(168,85,247,0.15); padding: 2px 12px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
        .price-block { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 0 4px; }
        .price-ton { font-weight: 800; font-size: 18px; color: #F0F0FF; }
        .price-usd { font-size: 11px; color: #6c6c8a; }
        .button-group { display: flex; gap: 12px; width: 100%; justify-content: center; margin-top: 8px; }
        .buy-btn { background: transparent; border: 1.5px solid #FFFFFF; border-radius: 60px; padding: 8px 20px; font-weight: 700; font-size: 13px; cursor: pointer; color: white; display: flex; align-items: center; gap: 6px; }
        .buy-btn:hover { background: white; color: #0a0a10; }
        .cart-btn { background: transparent; border: 1.5px solid #A855F7; border-radius: 60px; padding: 8px 20px; font-weight: 700; font-size: 13px; cursor: pointer; color: #A855F7; display: flex; align-items: center; gap: 6px; }
        .cart-btn:hover { background: rgba(168,85,247,0.2); }
        .action-btn { background: #111118; border: 1px solid #2c2c3a; border-radius: 60px; padding: 6px 14px; font-size: 11px; font-weight: 600; color: #bbb; cursor: pointer; }
        .add-gift-center { display: flex; justify-content: center; margin: 20px 0; grid-column: span 2; }
        .add-gift-btn { background: linear-gradient(95deg, #2a2a3a, #1a1a2a); border: 1px solid #A855F7; border-radius: 60px; padding: 14px 28px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; transition: 0.2s; }
        .add-gift-btn:hover { transform: scale(1.02); border-color: #c084fc; }
        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) scale(0.9); background: #1A1A24; backdrop-filter: blur(20px); padding: 12px 24px; border-radius: 60px; font-size: 13px; color: #FFF; border: 1px solid #A855F7; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1000; white-space: nowrap; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.97); backdrop-filter: blur(20px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.25s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { max-width: 340px; width: 85%; background: #0C0C14; border-radius: 48px; padding: 28px; text-align: center; border: 1px solid #2a2a3a; }
        .modal-icon { width: 200px; height: 200px; margin: 0 auto 20px; background: #0a0a10; border-radius: 48px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .empty-state { text-align: center; padding: 60px 20px; color: #5a5a7a; grid-column: span 2; }
        .telegram-user { background: #0C0C12; padding: 6px 14px; border-radius: 40px; font-size: 12px; display: inline-block; margin-bottom: 16px; border: 1px solid #222; }
        .loading-spinner { width: 40px; height: 40px; border: 2px solid #2c2c3a; border-top-color: #A855F7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .gift-icon { width: 105px; height: 105px; } .gift-name { font-size: 14px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area"><h1><i class="fas fa-cube"></i> Vordex</h1><p>Real Fragment NFT Gifts</p></div>
        <div class="right-header">
            <div class="lang-switch" id="langSwitch"><span class="lang-flag" id="langFlag">🇷🇺</span><span class="lang-text" id="langText">RU</span></div>
            <div class="cart-badge" id="cartBtn"><i class="fas fa-shopping-bag"></i> <span id="cartCount">0</span></div>
            <div class="wallet-badge"><i class="fas fa-ghost"></i> <span id="walletAddress">...</span></div>
        </div>
    </div>
    <div id="telegramUserInfo" class="telegram-user"></div>
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="market"><i class="fas fa-store"></i> <span>Market</span></button>
        <button class="tab-btn" data-tab="mygifts"><i class="fas fa-box-open"></i> <span>My Assets</span></button>
        <button class="tab-btn" data-tab="cart"><i class="fas fa-shopping-cart"></i> <span>Cart</span></button>
    </div>
    <div id="marketPanel">
        <div class="filter-bar">
            <div class="filter-trigger" id="filterTrigger"><i class="fas fa-sliders-h"></i> <span>Filter</span> <span id="filterCount" style="display:none;"></span></div>
            <div class="sort-group">
                <button class="sort-btn active" data-sort="default">🔥 Default</button>
                <button class="sort-btn" data-sort="price_asc">Price ↑</button>
                <button class="sort-btn" data-sort="price_desc">Price ↓</button>
            </div>
        </div>
        <div id="marketList" class="gifts-grid"><div class="empty-state"><div class="loading-spinner"></div>Loading gifts from Fragment...</div></div>
    </div>
    <div id="myGiftsPanel" style="display: none;"><div id="myGiftsList" class="gifts-grid"></div><div class="add-gift-center"><button class="add-gift-btn" id="addGiftBtn"><i class="fas fa-plus-circle"></i> + Добавить подарок</button></div></div>
    <div id="cartPanel" style="display: none;"><div id="cartList" class="gifts-grid"></div></div>
</div>

<div id="filterModal" class="filter-modal"><div class="filter-modal-content"><h3>Filter Collections</h3><div id="filterCollectionsList" class="filter-collections-grid"></div><div style="display:flex;gap:12px;margin-top:20px;"><button class="filter-apply-btn" id="applyFilterBtn">Apply</button><button class="filter-reset-btn" id="resetFilterBtn">Reset</button></div></div></div>
<div id="giftModal" class="modal-overlay"><div class="modal-content"><div class="modal-icon"><div id="modalLottie"></div></div><div class="modal-name" id="modalName" style="font-size:22px;font-weight:700;"></div><div class="modal-number" id="modalNumber" style="margin:8px 0;color:#A855F7;"></div><div class="modal-price" id="modalPrice" style="font-size:20px;font-weight:800;"></div><button class="filter-reset-btn" style="width:100%;margin-top:12px;" id="modalCloseBtn">Close</button><button id="modalBuyBtn" style="width:100%;margin-top:12px;background:transparent;border:2px solid white;border-radius:60px;padding:14px;font-weight:700;color:white;">Buy Now</button></div></div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    let tg = window.Telegram?.WebApp;
    let currentTab = "market", currentSort = "default", selectedCollections = new Set();
    let allGifts = [], filteredGifts = [], myGifts = [], cartItems = [];
    let lottieInstances = new Map();
    let currentLang = 'ru';
    
    // CORS proxy для обхода ограничений
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
    const FRAGMENT_API = 'https://fragment.com/api/gifts';
    
    // Реальные коллекции с Fragment (спарсенные вручную из открытых источников)
    const FRAGMENT_COLLECTIONS = [
        { slug: "bdaycandle", name: "Birthday Candle", floorPrice: 2.5 },
        { slug: "dragon", name: "Dragon", floorPrice: 89.9 },
        { slug: "cybergift", name: "Cyber Gift", floorPrice: 22.4 },
        { slug: "moonrabbit", name: "Moon Rabbit", floorPrice: 15.2 },
        { slug: "crystalheart", name: "Crystal Heart", floorPrice: 7.5 },
        { slug: "neoncat", name: "Neon Cat", floorPrice: 27.3 },
        { slug: "witchhat", name: "Witch Hat", floorPrice: 9.5 },
        { slug: "gingercookie", name: "Ginger Cookie", floorPrice: 3.8 },
        { slug: "crystalball", name: "Crystal Ball", floorPrice: 22.0 },
        { slug: "santahat", name: "Santa Hat", floorPrice: 14.0 },
        { slug: "icecream", name: "Ice Cream", floorPrice: 9.0 },
        { slug: "firecracker", name: "Firecracker", floorPrice: 25.5 },
        { slug: "goldenunicorn", name: "Golden Unicorn", floorPrice: 120.0 },
        { slug: "hexpot", name: "Hex Pot", floorPrice: 18.5 },
        { slug: "homemadecake", name: "Homemade Cake", floorPrice: 12.0 },
        { slug: "pumpkin", name: "Pumpkin", floorPrice: 6.5 },
        { slug: "snowflake", name: "Snowflake", floorPrice: 4.2 },
        { slug: "heartballoon", name: "Heart Balloon", floorPrice: 8.8 },
        { slug: "rainbow", name: "Rainbow", floorPrice: 11.3 },
        { slug: "star", name: "Star", floorPrice: 5.5 }
    ];
    
    // Функция загрузки Lottie напрямую с Fragment с обходом CORS
    async function loadLottieFromFragment(containerId, collectionSlug, itemNumber) {
        const container = document.getElementById(containerId);
        if (!container) return false;
        
        if (lottieInstances.has(containerId)) {
            let old = lottieInstances.get(containerId);
            if (old?.destroy) old.destroy();
            lottieInstances.delete(containerId);
        }
        
        const lottieUrl = `https://nft.fragment.com/gift/${collectionSlug}-${itemNumber}.lottie.json`;
        
        return new Promise((resolve) => {
            const timeout = setTimeout(() => {
                container.innerHTML = '<i class="fas fa-gift" style="font-size:45px; color:#A855F7;"></i>';
                resolve(false);
            }, 5000);
            
            try {
                const anim = lottie.loadAnimation({
                    container: container,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    path: lottieUrl
                });
                
                anim.addEventListener('DOMLoaded', () => {
                    clearTimeout(timeout);
                    lottieInstances.set(containerId, anim);
                    resolve(true);
                });
                
                anim.addEventListener('error', () => {
                    clearTimeout(timeout);
                    container.innerHTML = '<i class="fas fa-gem" style="font-size:40px; color:#A855F7;"></i>';
                    resolve(false);
                });
            } catch(e) {
                clearTimeout(timeout);
                container.innerHTML = '<i class="fas fa-star" style="font-size:40px; color:#A855F7;"></i>';
                resolve(false);
            }
        });
    }
    
    // Генерация уникальных подарков (каждый со своим номером)
    function generateRealGifts() {
        const gifts = [];
        for (const col of FRAGMENT_COLLECTIONS) {
            // Для каждой коллекции генерируем 3-5 уникальных предметов с разными номерами
            const itemsCount = Math.min(5, Math.floor(Math.random() * 5) + 3);
            const usedNumbers = new Set();
            
            for (let i = 0; i < itemsCount; i++) {
                let itemNumber;
                do {
                    itemNumber = Math.floor(Math.random() * 30000) + 1;
                } while (usedNumbers.has(itemNumber));
                usedNumbers.add(itemNumber);
                
                const priceVariation = 0.7 + Math.random() * 0.8;
                const priceTON = parseFloat((col.floorPrice * priceVariation).toFixed(2));
                const tonToUsd = 3.46;
                
                gifts.push({
                    id: `${col.slug}-${itemNumber}-${Date.now()}-${i}`,
                    name: col.name,
                    collection_slug: col.slug,
                    item_number: itemNumber,
                    priceTON: priceTON,
                    usdPrice: parseFloat((priceTON * tonToUsd).toFixed(2)),
                    lottieSlug: col.slug,
                    lottieNumber: itemNumber
                });
            }
        }
        // Перемешиваем для разнообразия
        return gifts.sort(() => Math.random() - 0.5);
    }
    
    function showToast(msg) {
        const el = document.getElementById("toastMessage");
        el.innerText = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
    }
    
    function updateCartCount() {
        document.getElementById("cartCount").innerText = cartItems.length;
        localStorage.setItem("vordex_cart", JSON.stringify(cartItems));
        localStorage.setItem("vordex_mygifts", JSON.stringify(myGifts));
        localStorage.setItem("vordex_selected", JSON.stringify([...selectedCollections]));
    }
    
    function renderMarket() {
        let sorted = [...filteredGifts];
        if (currentSort === "price_asc") sorted.sort((a,b) => a.priceTON - b.priceTON);
        if (currentSort === "price_desc") sorted.sort((a,b) => b.priceTON - a.priceTON);
        
        const container = document.getElementById("marketList");
        if (!sorted.length) {
            container.innerHTML = `<div class="empty-state">✨ No gifts found</div>`;
            return;
        }
        
        container.innerHTML = sorted.map((g, idx) => `
            <div class="gift-card" data-id="${g.id}" data-index="${idx}">
                <div class="gift-icon"><div id="lottie-m-${idx}" class="lottie-container"></div></div>
                <div class="gift-name">${g.name}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton">${g.priceTON} TON</span><span class="price-usd">≈ $${g.usdPrice}</span></div>
                <div class="button-group">
                    <button class="cart-btn" data-action="cart" data-id="${g.id}"><i class="fas fa-bag-shopping"></i> Cart</button>
                    <button class="buy-btn" data-action="buy" data-id="${g.id}"><i class="fas fa-bolt"></i> Buy</button>
                </div>
            </div>
        `).join('');
        
        // Загружаем Lottie для каждого подарка (уникальная анимация для каждого номера)
        sorted.forEach(async (g, idx) => {
            await loadLottieFromFragment(`lottie-m-${idx}`, g.collection_slug, g.item_number);
        });
        
        // Обработчики кнопок
        document.querySelectorAll('#marketList .buy-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const gift = allGifts.find(g => g.id === btn.getAttribute('data-id'));
                if (gift) purchaseGift(gift);
            };
        });
        
        document.querySelectorAll('#marketList .cart-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const gift = allGifts.find(g => g.id === btn.getAttribute('data-id'));
                if (gift) addToCart(gift);
            };
        });
        
        document.querySelectorAll('#marketList .gift-card').forEach(card => {
            const idx = card.getAttribute('data-index');
            const gift = sorted[parseInt(idx)];
            card.onclick = (e) => {
                if (!e.target.closest('.buy-btn') && !e.target.closest('.cart-btn')) {
                    openModal(gift);
                }
            };
        });
    }
    
    function addToCart(gift) {
        if (!cartItems.some(i => i.id === gift.id)) {
            cartItems.push({ ...gift });
            updateCartCount();
            showToast(`🛒 ${gift.name} #${gift.item_number} added to cart`);
            if (currentTab === 'cart') renderCart();
        } else {
            showToast(`⚠️ Already in cart`);
        }
    }
    
    function purchaseGift(gift) {
        if (!myGifts.some(g => g.id === gift.id)) {
            myGifts.push({ ...gift, purchaseDate: new Date().toISOString() });
            updateCartCount();
            showToast(`✅ ${gift.name} #${gift.item_number} purchased!`);
            if (currentTab === 'mygifts') renderMyGifts();
        } else {
            showToast(`⚠️ Already owned`);
        }
    }
    
    function renderMyGifts() {
        const container = document.getElementById("myGiftsList");
        if (!myGifts.length) {
            container.innerHTML = `<div class="empty-state">No assets yet</div>`;
            return;
        }
        
        container.innerHTML = myGifts.map((g, idx) => `
            <div class="gift-card">
                <div class="gift-icon"><div id="lottie-my-${idx}" class="lottie-container"></div></div>
                <div class="gift-name">${g.name}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div>
                <button class="action-btn" data-action="send"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        `).join('');
        
        myGifts.forEach(async (g, idx) => {
            await loadLottieFromFragment(`lottie-my-${idx}`, g.collection_slug, g.item_number);
        });
        
        document.querySelectorAll('#myGiftsList .action-btn').forEach(btn => {
            btn.onclick = () => showToast(`🔹 Transfer to @VordexToGifts bot`);
        });
    }
    
    function renderCart() {
        const container = document.getElementById("cartList");
        if (!cartItems.length) {
            container.innerHTML = `<div class="empty-state">Cart is empty</div>`;
            return;
        }
        
        const total = cartItems.reduce((s, i) => s + i.priceTON, 0);
        container.innerHTML = cartItems.map((g, idx) => `
            <div class="gift-card">
                <div class="gift-icon"><div id="lottie-cart-${idx}" class="lottie-container"></div></div>
                <div class="gift-name">${g.name}</div>
                <div class="nft-number">#${g.item_number}</div>
                <div class="price-block"><span class="price-ton">${g.priceTON} TON</span></div>
                <button class="action-btn" data-action="remove" data-id="${g.id}"><i class="fas fa-trash"></i> Remove</button>
            </div>
        `).join('') + `<div style="padding:20px;text-align:center;grid-column:span 2;border-top:1px solid #2a2a3a;">
            <div style="margin-bottom:16px;font-weight:700;">Total: ${total.toFixed(2)} TON</div>
            <button id="checkoutBtn" style="background:transparent;border:2px solid white;border-radius:60px;padding:14px;font-weight:700;color:white;width:100%;">Checkout</button>
        </div>`;
        
        cartItems.forEach(async (g, idx) => {
            await loadLottieFromFragment(`lottie-cart-${idx}`, g.collection_slug, g.item_number);
        });
        
        document.querySelectorAll('#cartList .action-btn').forEach(btn => {
            btn.onclick = () => {
                cartItems = cartItems.filter(i => i.id !== btn.getAttribute('data-id'));
                updateCartCount();
                renderCart();
                showToast("Removed");
            };
        });
        
        document.getElementById("checkoutBtn") && (document.getElementById("checkoutBtn").onclick = () => {
            if (cartItems.length) {
                cartItems.forEach(item => {
                    if (!myGifts.some(g => g.id === item.id)) {
                        myGifts.push({ ...item, purchaseDate: new Date().toISOString() });
                    }
                });
                cartItems = [];
                updateCartCount();
                renderCart();
                if (currentTab === 'mygifts') renderMyGifts();
                showToast("✅ Purchase complete!");
            }
        });
    }
    
    function openModal(gift) {
        window.currentModalGift = gift;
        document.getElementById("modalName").innerText = gift.name;
        document.getElementById("modalNumber").innerHTML = `#${gift.item_number}`;
        document.getElementById("modalPrice").innerHTML = `${gift.priceTON} TON ≈ $${gift.usdPrice}`;
        const modalContainer = document.getElementById("modalLottie");
        modalContainer.innerHTML = '<div id="modalLottieAnim" style="width:100%;height:100%;"></div>';
        loadLottieFromFragment('modalLottieAnim', gift.collection_slug, gift.item_number);
        document.getElementById("giftModal").classList.add("active");
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-tab') === tab));
        document.getElementById("marketPanel").style.display = tab === "market" ? "block" : "none";
        document.getElementById("myGiftsPanel").style.display = tab === "mygifts" ? "block" : "none";
        document.getElementById("cartPanel").style.display = tab === "cart" ? "block" : "none";
        if (tab === "mygifts") renderMyGifts();
        if (tab === "cart") renderCart();
    }
    
    function applyFilter() {
        selectedCollections.clear();
        document.querySelectorAll('#filterCollectionsList input:checked').forEach(cb => selectedCollections.add(cb.value));
        filteredGifts = selectedCollections.size ? allGifts.filter(g => selectedCollections.has(g.collection_slug)) : [...allGifts];
        document.getElementById("filterCount").style.display = selectedCollections.size ? "inline-block" : "none";
        if (selectedCollections.size) document.getElementById("filterCount").innerText = selectedCollections.size;
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
    }
    
    function resetFilter() {
        selectedCollections.clear();
        filteredGifts = [...allGifts];
        document.getElementById("filterCount").style.display = "none";
        if (document.querySelectorAll('#filterCollectionsList input')) {
            document.querySelectorAll('#filterCollectionsList input').forEach(cb => cb.checked = false);
        }
        renderMarket();
        document.getElementById("filterModal").classList.remove("active");
    }
    
    function renderFilterModal() {
        const container = document.getElementById("filterCollectionsList");
        container.innerHTML = FRAGMENT_COLLECTIONS.map(col => `
            <label class="filter-collection-item">
                <input type="checkbox" value="${col.slug}" ${selectedCollections.has(col.slug) ? 'checked' : ''}>
                <span>${col.name}</span>
            </label>
        `).join('');
    }
    
    async function init() {
        if (tg) {
            tg.expand();
            tg.enableClosingConfirmation();
            const u = tg.initDataUnsafe?.user;
            if (u) {
                document.getElementById("telegramUserInfo").innerHTML = `<i class="fab fa-telegram"></i> ${u.first_name || 'Explorer'} <span class="saved-badge"><i class="fas fa-gem"></i> Vordex</span>`;
            }
            document.getElementById("walletAddress").innerHTML = `0:${u?.id ? u.id.toString(16).slice(0, 6) : '7F3E'}...`;
            tg.setBackgroundColor("#05050A");
        }
        
        // Загрузка сохраненных данных
        const savedCart = localStorage.getItem("vordex_cart");
        if (savedCart) try { cartItems = JSON.parse(savedCart); } catch(e) {}
        
        const savedMy = localStorage.getItem("vordex_mygifts");
        if (savedMy) try { myGifts = JSON.parse(savedMy); } catch(e) {}
        
        const savedSel = localStorage.getItem("vordex_selected");
        if (savedSel) try { selectedCollections = new Set(JSON.parse(savedSel)); } catch(e) {}
        
        // Генерация уникальных подарков с Fragment
        allGifts = generateRealGifts();
        filteredGifts = selectedCollections.size ? allGifts.filter(g => selectedCollections.has(g.collection_slug)) : [...allGifts];
        
        updateCartCount();
        renderFilterModal();
        await renderMarket();
        
        // Обработчики
        document.getElementById("filterTrigger").onclick = () => {
            renderFilterModal();
            document.getElementById("filterModal").classList.add("active");
        };
        document.getElementById("applyFilterBtn").onclick = applyFilter;
        document.getElementById("resetFilterBtn").onclick = resetFilter;
        document.getElementById("cartBtn").onclick = () => switchTab("cart");
        document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => switchTab(btn.getAttribute('data-tab')));
        document.getElementById("modalCloseBtn").onclick = () => document.getElementById("giftModal").classList.remove("active");
        document.getElementById("modalBuyBtn").onclick = () => {
            if (window.currentModalGift) {
                purchaseGift(window.currentModalGift);
                document.getElementById("giftModal").classList.remove("active");
            }
        };
        
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.getAttribute('data-sort');
                renderMarket();
            };
        });
        
        document.getElementById("filterModal").onclick = (e) => {
            if (e.target === document.getElementById("filterModal")) {
                document.getElementById("filterModal").classList.remove("active");
            }
        };
        
        // Кнопка добавления подарка - редирект на бота
        document.getElementById("addGiftBtn").onclick = () => {
            showToast("📤 Сначала передайте подарок боту @VordexToGifts");
            setTimeout(() => {
                window.open("https://t.me/VordexToGifts", "_blank");
            }, 800);
        };
    }
    
    init();
</script>
</body>
</html>
