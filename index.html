<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fragmint — Live Auctions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #6e4bff; border-radius: 10px; }
        
        .glow-border {
            box-shadow: 0 0 30px rgba(110, 75, 255, 0.15), inset 0 0 30px rgba(110, 75, 255, 0.05);
        }
        .gradient-text {
            background: linear-gradient(135deg, #6e4bff, #9b7cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gradient-radial {
            background: radial-gradient(circle at center, #2d1b69, #0a0a0f);
        }
        .auction-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .auction-card:hover {
            transform: translateY(-4px);
            border-color: #6e4bff !important;
            box-shadow: 0 8px 40px rgba(110, 75, 255, 0.2);
        }
        .page-enter {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .timer-warning {
            color: #ff6b6b;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .bid-input {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .bid-input:focus {
            outline: none;
            border-color: #6e4bff;
            box-shadow: 0 0 20px rgba(110, 75, 255, 0.1);
        }
        .bid-btn {
            background: linear-gradient(135deg, #6e4bff, #9b7cff);
            transition: all 0.3s;
        }
        .bid-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 30px rgba(110, 75, 255, 0.4);
        }
        .bid-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .nav-link {
            transition: color 0.2s;
            cursor: pointer;
        }
        .nav-link:hover {
            color: #9b7cff;
        }
        .nav-link.active {
            color: #6e4bff;
            font-weight: 600;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #181825;
            border: 1px solid #6e4bff;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            animation: slideUp 0.3s ease;
            max-width: 400px;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bid-history {
            max-height: 300px;
            overflow-y: auto;
        }
        .bid-history::-webkit-scrollbar {
            width: 4px;
        }
        .bid-history::-webkit-scrollbar-thumb {
            background: #6e4bff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="bg-[#181825]/90 backdrop-blur-sm border-b border-white/5 py-4 sticky top-0 z-50">
            <div class="container mx-auto px-4 flex justify-between items-center">
                <div class="flex items-center gap-3" onclick="navigate('home')" style="cursor:pointer">
                    <span class="text-2xl font-bold gradient-text">Fragmint</span>
                    <span class="text-xs bg-[#6e4bff]/20 px-2 py-1 rounded-full text-[#6e4bff] font-mono">live</span>
                </div>
                <nav class="flex gap-6 text-sm font-medium text-gray-400">
                    <span class="nav-link active" data-page="home" onclick="navigate('home')">Buy</span>
                    <span class="nav-link" data-page="home" onclick="navigate('home')">Sell</span>
                    <span class="nav-link" data-page="home" onclick="navigate('home')">Auction</span>
                    <span class="nav-link" data-page="wallet" onclick="navigate('wallet')">Wallet</span>
                    <span class="nav-link" data-page="create" onclick="navigate('create')">+ Create</span>
                </nav>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-400 hidden sm:inline">
                        <i class="fas fa-circle text-green-400 text-xs mr-1"></i> Live
                    </span>
                    <button onclick="navigate('wallet')" class="bg-[#6e4bff] hover:bg-[#9b7cff] text-white px-4 py-2 rounded-xl text-sm transition-all shadow-lg shadow-[#6e4bff]/20">
                        <i class="fas fa-wallet mr-2"></i> Connect
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="container mx-auto px-4 py-8" id="main-content">
            <!-- Pages будут рендериться здесь -->
        </div>

        <!-- Footer -->
        <footer class="border-t border-white/5 py-6 mt-10">
            <div class="container mx-auto px-4 text-center text-xs text-gray-600">
                <p>© 2026 Fragmint. Симуляция аукционов. Сделано с 💀 и холодным чаем.</p>
                <p class="mt-1 text-[#6e4bff]/50">by Amur Shik & Патрик</p>
            </div>
        </footer>
    </div>

    <script>
        // ============================================================
        //  ГЛОБАЛЬНОЕ СОСТОЯНИЕ
        // ============================================================
        const state = {
            auctions: [],
            users: [],
            currentPage: 'home',
            selectedAuctionId: null,
            walletAddress: null,
            bidHistory: {},
            toastTimeout: null,
            botInterval: null,
            timerInterval: null
        };

        // ============================================================
        //  ГЕНЕРАЦИЯ ДАННЫХ
        // ============================================================
        function generateUsers(count = 50) {
            const users = [];
            for (let i = 0; i < count; i++) {
                const address = 'EQCD' + Array.from({length: 30}, () => 
                    'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890'[Math.floor(Math.random() * 36)]
                ).join('');
                users.push({
                    address,
                    username: `user_${1000 + i}`,
                    balance: parseFloat((Math.random() * 5000 + 10).toFixed(2))
                });
            }
            return users;
        }

        function generatePhoneNumber() {
            if (Math.random() > 0.5) {
                return '+7' + Array.from({length: 10}, () => Math.floor(Math.random() * 10)).join('');
            }
            return Array.from({length: 11}, () => Math.floor(Math.random() * 10)).join('');
        }

        function generateAuction(id) {
            const startPrice = parseFloat((Math.random() * 50 + 0.5).toFixed(2));
            const currentBid = parseFloat((startPrice + Math.random() * 30).toFixed(2));
            const hours = Math.floor(Math.random() * 72) + 1;
            const endTime = new Date(Date.now() + hours * 3600000);
            
            return {
                id,
                number: generatePhoneNumber(),
                current_bid: currentBid,
                start_price: startPrice,
                end_time: endTime.toISOString(),
                status: 'active',
                winner_address: null,
                bids_count: 0,
                bids: []
            };
        }

        function initData() {
            state.users = generateUsers(50);
            state.auctions = [];
            for (let i = 1; i <= 30; i++) {
                state.auctions.push(generateAuction(i));
            }
            state.walletAddress = state.users[0].address;
            // Добавляем начальные ставки для реализма
            state.auctions.forEach(auction => {
                const bidCount = Math.floor(Math.random() * 15);
                for (let i = 0; i < bidCount; i++) {
                    const user = state.users[Math.floor(Math.random() * state.users.length)];
                    const amount = parseFloat((auction.current_bid + Math.random() * 10).toFixed(2));
                    auction.current_bid = Math.max(auction.current_bid, amount);
                    auction.bids.push({
                        id: Date.now() + i,
                        bidder_address: user.address,
                        bidder_name: user.username,
                        amount: amount,
                        created_at: new Date(Date.now() - Math.random() * 3600000).toISOString()
                    });
                }
                auction.bids_count = auction.bids.length;
                auction.bids.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            });
        }

        // ============================================================
        //  ЛОГИКА АУКЦИОНОВ
        // ============================================================
        function placeBid(auctionId, amount, bidderAddress = null) {
            const auction = state.auctions.find(a => a.id === auctionId);
            if (!auction) {
                showToast('Аукцион не найден, пидор', 'error');
                return false;
            }
            
            if (auction.status !== 'active') {
                showToast('Аукцион уже закончился, лох', 'error');
                return false;
            }
            
            if (new Date(auction.end_time) <= new Date()) {
                auction.status = 'ended';
                showToast('Аукцион истек, ты опоздал', 'error');
                return false;
            }
            
            if (amount <= auction.current_bid) {
                showToast(`Ставка должна быть выше ${auction.current_bid.toFixed(2)} TON, еблан`, 'error');
                return false;
            }
            
            // Находим пользователя
            let user = state.users.find(u => u.address === bidderAddress);
            if (!user) {
                user = state.users[Math.floor(Math.random() * state.users.length)];
            }
            
            if (user.balance < amount) {
                showToast('Недостаточно средств, нищеброд', 'error');
                return false;
            }
            
            // Обновляем баланс
            user.balance = parseFloat((user.balance - amount).toFixed(2));
            
            // Обновляем ставку
            auction.current_bid = amount;
            auction.bids.push({
                id: Date.now(),
                bidder_address: user.address,
                bidder_name: user.username,
                amount: amount,
                created_at: new Date().toISOString()
            });
            auction.bids_count = auction.bids.length;
            
            showToast(`${user.username} поставил ${amount.toFixed(2)} TON на ${auction.number}`, 'success');
            renderCurrentPage();
            return true;
        }

        function closeExpiredAuctions() {
            const now = new Date();
            state.auctions.forEach(auction => {
                if (auction.status === 'active' && new Date(auction.end_time) <= now) {
                    auction.status = 'ended';
                    if (auction.bids.length > 0) {
                        const winner = auction.bids[0];
                        auction.winner_address = winner.bidder_address;
                        showToast(`Аукцион ${auction.number} завершен! Победитель: ${winner.bidder_name}`, 'info');
                    }
                }
            });
        }

        function createAuction(number, startPrice, hours) {
            const id = state.auctions.length + 1;
            const endTime = new Date(Date.now() + hours * 3600000);
            const newAuction = {
                id,
                number,
                current_bid: parseFloat(startPrice),
                start_price: parseFloat(startPrice),
                end_time: endTime.toISOString(),
                status: 'active',
                winner_address: null,
                bids_count: 0,
                bids: []
            };
            state.auctions.push(newAuction);
            showToast(`Аукцион #${id} создан!`, 'success');
            navigate('home');
            return id;
        }

        // ============================================================
        //  БОТЫ
        // ============================================================
        function botMakeBid() {
            const activeAuctions = state.auctions.filter(a => a.status === 'active' && new Date(a.end_time) > new Date());
            if (activeAuctions.length === 0) return;
            
            const auction = activeAuctions[Math.floor(Math.random() * activeAuctions.length)];
            const users = state.users.filter(u => u.balance > 5);
            if (users.length === 0) return;
            
            const user = users[Math.floor(Math.random() * users.length)];
            const increase = parseFloat((Math.random() * 0.3 * auction.current_bid + 0.1).toFixed(2));
            const newBid = parseFloat((auction.current_bid + increase).toFixed(2));
            
            if (user.balance >= newBid && newBid > auction.current_bid) {
                placeBid(auction.id, newBid, user.address);
            }
        }

        function startBots() {
            if (state.botInterval) clearInterval(state.botInterval);
            state.botInterval = setInterval(() => {
                const activeCount = state.auctions.filter(a => a.status === 'active').length;
                if (activeCount > 0 && Math.random() > 0.3) {
                    botMakeBid();
                }
            }, 3000);
        }

        // ============================================================
        //  ТАЙМЕРЫ
        // ============================================================
        function startTimers() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                closeExpiredAuctions();
                // Обновляем страницу, если есть активные таймеры
                if (state.currentPage === 'home' || state.currentPage === 'detail') {
                    renderCurrentPage();
                }
            }, 5000);
        }

        // ============================================================
        //  РЕНДЕРИНГ
        // ============================================================
        function renderHome() {
            const activeAuctions = state.auctions.filter(a => a.status === 'active');
            const endedAuctions = state.auctions.filter(a => a.status === 'ended');
            
            let html = `
                <div class="page-enter">
                    <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
                        <h1 class="text-3xl font-bold gradient-text">Live Auctions</h1>
                        <div class="flex items-center gap-4">
                            <span class="text-sm text-gray-500">${activeAuctions.length} active · ${endedAuctions.length} ended</span>
                            <button onclick="navigate('create')" class="bg-[#6e4bff]/20 hover:bg-[#6e4bff]/30 text-[#6e4bff] px-4 py-2 rounded-xl text-sm transition-colors border border-[#6e4bff]/20">
                                <i class="fas fa-plus mr-2"></i>Create
                            </button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            `;
            
            if (activeAuctions.length === 0) {
                html += `
                    <div class="col-span-full text-center py-20 text-gray-500">
                        <i class="fas fa-gavel text-4xl mb-4 opacity-50"></i>
                        <p>Нет активных аукционов. Создай новый!</p>
                    </div>
                `;
            } else {
                activeAuctions.forEach(auction => {
                    html += renderAuctionCard(auction);
                });
            }
            
            html += `
                    </div>
                    
                    ${endedAuctions.length > 0 ? `
                    <div class="mt-12">
                        <h2 class="text-xl font-bold text-gray-400 mb-4">Завершенные аукционы</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 opacity-60">
                            ${endedAuctions.slice(0, 8).map(a => renderAuctionCard(a, true)).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
            
            return html;
        }

        function renderAuctionCard(auction, ended = false) {
            const timeLeft = getTimeLeft(auction.end_time);
            const isEnded = ended || auction.status === 'ended';
            
            return `
                <div class="auction-card bg-[#181825] rounded-2xl p-6 border ${isEnded ? 'border-white/5' : 'border-white/5 glow-border hover:border-[#6e4bff]/30'}" onclick="navigate('detail', ${auction.id})">
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-2xl font-mono font-bold text-white ${!isEnded ? 'hover:text-[#6e4bff]' : ''} transition-colors">
                            ${auction.number}
                        </div>
                        <span class="text-xs ${isEnded ? 'bg-gray-700/30 text-gray-400' : 'bg-[#6e4bff]/10 text-[#6e4bff]'} px-3 py-1 rounded-full border ${isEnded ? 'border-gray-700/30' : 'border-[#6e4bff]/20'}">
                            #${auction.id}
                        </span>
                    </div>
                    
                    <div class="flex justify-between items-center text-sm">
                        <div>
                            <div class="text-gray-500 text-xs">Current bid</div>
                            <div class="text-xl font-bold ${isEnded ? 'text-gray-400' : 'text-white'}">${auction.current_bid.toFixed(2)} TON</div>
                        </div>
                        <div class="text-right">
                            <div class="text-gray-500 text-xs">${isEnded ? 'Ended' : 'Ends in'}</div>
                            <div class="text-sm font-mono ${isEnded ? 'text-gray-500' : timeLeft.includes('m') && parseInt(timeLeft) < 10 ? 'timer-warning' : 'text-gray-300'}">
                                ${isEnded ? '✅' : timeLeft}
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex justify-between text-xs text-gray-500 border-t border-white/5 pt-3">
                        <span>${auction.bids_count} bids</span>
                        <span class="${isEnded ? 'text-gray-500' : 'text-[#6e4bff]/70'}">${auction.start_price.toFixed(2)} TON start</span>
                    </div>
                    
                    ${!isEnded ? `
                        <div class="mt-4 flex gap-2" onclick="event.stopPropagation()">
                            <input type="number" step="0.1" id="bid-input-${auction.id}" placeholder="Bid TON" class="flex-1 bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-[#6e4bff] transition-colors bid-input">
                            <button onclick="handleQuickBid(${auction.id})" class="bid-btn text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-lg shadow-[#6e4bff]/20">
                                <i class="fas fa-gavel"></i>
                            </button>
                        </div>
                    ` : `
                        ${auction.winner_address ? `
                            <div class="mt-3 text-xs text-green-400">
                                <i class="fas fa-trophy mr-1"></i> Победитель: ${state.users.find(u => u.address === auction.winner_address)?.username || 'Аноним'}
                            </div>
                        ` : `
                            <div class="mt-3 text-xs text-gray-500">Без победителя</div>
                        `}
                    `}
                </div>
            `;
        }

        function renderDetail(auctionId) {
            const auction = state.auctions.find(a => a.id === auctionId);
            if (!auction) {
                navigate('home');
                return '<div class="text-center py-20 text-gray-500">Аукцион не найден</div>';
            }
            
            const timeLeft = getTimeLeft(auction.end_time);
            const isEnded = auction.status === 'ended';
            const winner = auction.winner_address ? state.users.find(u => u.address === auction.winner_address) : null;
            
            let html = `
                <div class="page-enter max-w-5xl mx-auto">
                    <button onclick="navigate('home')" class="text-gray-400 hover:text-white mb-6 transition-colors">
                        <i class="fas fa-arrow-left mr-2"></i> Back to auctions
                    </button>
                    
                    <div class="bg-[#181825] rounded-2xl p-8 border border-white/5 glow-border">
                        <div class="flex flex-col md:flex-row gap-8">
                            <div class="flex-1">
                                <div class="text-5xl font-mono font-bold text-white mb-2">${auction.number}</div>
                                <div class="text-sm text-gray-400">Auction #${auction.id} · ${isEnded ? 'Ended' : 'Active'}</div>
                                
                                <div class="mt-6 grid grid-cols-2 gap-4">
                                    <div>
                                        <div class="text-gray-500 text-sm">Current bid</div>
                                        <div class="text-3xl font-bold ${isEnded ? 'text-gray-400' : 'text-[#6e4bff]'}">${auction.current_bid.toFixed(2)} TON</div>
                                    </div>
                                    <div>
                                        <div class="text-gray-500 text-sm">Total bids</div>
                                        <div class="text-2xl font-bold text-white">${auction.bids_count}</div>
                                    </div>
                                    <div>
                                        <div class="text-gray-500 text-sm">Start price</div>
                                        <div class="text-xl font-bold text-white">${auction.start_price.toFixed(2)} TON</div>
                                    </div>
                                    <div>
                                        <div class="text-gray-500 text-sm">Status</div>
                                        <div class="text-xl font-bold ${isEnded ? 'text-gray-400' : 'text-green-400'}">${isEnded ? 'Ended' : 'Active'}</div>
                                    </div>
                                </div>
                                
                                ${!isEnded ? `
                                    <div class="mt-8">
                                        <div class="text-sm text-gray-500 mb-2">Time remaining</div>
                                        <div class="text-3xl font-mono font-bold ${timeLeft.includes('m') && parseInt(timeLeft) < 10 ? 'timer-warning' : 'text-white'}">
                                            ${timeLeft}
                                        </div>
                                    </div>
                                    
                                    <div class="mt-8">
                                        <div class="flex gap-3">
                                            <input type="number" step="0.1" id="detail-bid-input" placeholder="Enter bid TON" class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#6e4bff] transition-colors bid-input">
                                            <button onclick="handleDetailBid(${auction.id})" class="bid-btn text-white px-8 py-3 rounded-xl font-semibold transition-all shadow-lg shadow-[#6e4bff]/20">
                                                <i class="fas fa-gavel mr-2"></i> Place Bid
                                            </button>
                                        </div>
                                    </div>
                                ` : `
                                    <div class="mt-8 p-4 bg-black/30 rounded-xl border border-white/5">
                                        <div class="text-gray-400">Аукцион завершен</div>
                                        ${winner ? `
                                            <div class="mt-2 text-green-400">
                                                <i class="fas fa-trophy mr-2"></i> Победитель: ${winner.username}
                                            </div>
                                            <div class="text-sm text-gray-500">Сумма: ${auction.current_bid.toFixed(2)} TON</div>
                                        ` : `
                                            <div class="text-gray-500">Без победителя (ставок не было)</div>
                                        `}
                                    </div>
                                `}
                            </div>
                            
                            <div class="md:w-80">
                                <div class="bg-black/30 rounded-xl p-6 border border-white/5">
                                    <div class="text-sm text-gray-400 mb-4">
                                        <i class="fas fa-clock mr-2"></i> Bid History
                                        <span class="text-xs text-gray-500 ml-2">(${auction.bids.length})</span>
                                    </div>
                                    <div class="bid-history">
                                        ${auction.bids.length === 0 ? `
                                            <div class="text-center text-gray-500 py-8 text-sm">
                                                No bids yet. Be the first!
                                            </div>
                                        ` : `
                                            ${auction.bids.slice(0, 30).map(bid => `
                                                <div class="flex justify-between items-center text-sm border-b border-white/5 py-2">
                                                    <div>
                                                        <span class="text-gray-300 font-medium">${bid.bidder_name || 'Anon'}</span>
                                                        <span class="text-gray-500 text-xs ml-2">
                                                            ${new Date(bid.created_at).toLocaleTimeString()}
                                                        </span>
                                                    </div>
                                                    <div class="font-mono text-[#6e4bff] font-bold">
                                                        ${bid.amount.toFixed(2)} TON
                                                    </div>
                                                </div>
                                            `).join('')}
                                            ${auction.bids.length > 30 ? `
                                                <div class="text-center text-gray-500 text-xs pt-2">
                                                    +${auction.bids.length - 30} more bids
                                                </div>
                                            ` : ''}
                                        `}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            return html;
        }

        function renderWallet() {
            const user = state.users.find(u => u.address === state.walletAddress) || state.users[0];
            
            let html = `
                <div class="page-enter max-w-2xl mx-auto">
                    <div class="bg-gradient-radial p-8 rounded-2xl border border-white/5 glow-border">
                        <h1 class="text-2xl font-bold mb-6">
                            <i class="fas fa-wallet mr-3 text-[#6e4bff]"></i> Wallet
                        </h1>
                        <div class="bg-black/40 rounded-xl p-6 space-y-4">
                            <div>
                                <div class="text-sm text-gray-400">Balance</div>
                                <div class="text-4xl font-bold text-white">${user.balance.toFixed(2)} TON</div>
                            </div>
                            <div>
                                <div class="text-sm text-gray-400">Address</div>
                                <div class="text-xs text-[#6e4bff]/70 break-all font-mono">${user.address}</div>
                            </div>
                            <div>
                                <div class="text-sm text-gray-400">Username</div>
                                <div class="text-lg font-semibold text-white">@${user.username}</div>
                            </div>
                            <div>
                                <div class="text-sm text-gray-400">Joined</div>
                                <div class="text-sm text-gray-300">${new Date().toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="mt-6 flex gap-4">
                            <button class="flex-1 bg-[#6e4bff]/10 hover:bg-[#6e4bff]/20 text-[#6e4bff] border border-[#6e4bff]/20 px-6 py-3 rounded-xl transition-colors">
                                <i class="fas fa-paper-plane mr-2"></i> Send
                            </button>
                            <button class="flex-1 bg-[#6e4bff] hover:bg-[#9b7cff] text-white px-6 py-3 rounded-xl transition-all shadow-lg shadow-[#6e4bff]/20">
                                <i class="fas fa-download mr-2"></i> Receive
                            </button>
                        </div>
                        <div class="mt-4 text-center">
                            <button onclick="navigate('home')" class="text-sm text-gray-500 hover:text-gray-300 transition-colors">
                                <i class="fas fa-arrow-left mr-2"></i> Back to auctions
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            return html;
        }

        function renderCreate() {
            let html = `
                <div class="page-enter max-w-2xl mx-auto">
                    <div class="bg-[#181825] rounded-2xl p-8 border border-white/5 glow-border">
                        <h1 class="text-2xl font-bold mb-6">
                            <i class="fas fa-plus-circle mr-3 text-[#6e4bff]"></i> Create New Auction
                        </h1>
                        <form onsubmit="handleCreateAuction(event)" class="space-y-6">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">Phone Number</label>
                                <input type="text" id="create-number" placeholder="e.g., +71234567890" required
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#6e4bff] transition-colors bid-input">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">Start Price (TON)</label>
                                <input type="number" step="0.1" min="0.1" id="create-price" value="1.0" required
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#6e4bff] transition-colors bid-input">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">Duration (hours)</label>
                                <input type="number" min="1" max="168" id="create-hours" value="24" required
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#6e4bff] transition-colors bid-input">
                            </div>
                            <button type="submit" class="w-full bid-btn text-white py-4 rounded-xl font-semibold transition-all shadow-lg shadow-[#6e4bff]/20">
                                <i class="fas fa-gavel mr-2"></i> Create Auction
                            </button>
                            <button type="button" onclick="navigate('home')" class="w-full text-gray-500 hover:text-gray-300 text-sm transition-colors">
                                Cancel
                            </button>
                        </form>
                    </div>
                </div>
            `;
            
            return html;
        }

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getTimeLeft(endTimeStr) {
            const end = new Date(endTimeStr);
            const now = new Date();
            const diff = end - now;
            
            if (diff <= 0) return 'Ended';
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function showToast(message, type = 'info') {
            const colors = {
                success: 'border-green-500 text-green-400',
                error: 'border-red-500 text-red-400',
                info: 'border-[#6e4bff] text-[#9b7cff]'
            };
            
            const toast = document.createElement('div');
            toast.className = `toast ${colors[type] || colors.info}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            if (state.toastTimeout) clearTimeout(state.toastTimeout);
            state.toastTimeout = setTimeout(() => {
                toast.remove();
            }, 4000);
        }

        // ============================================================
        //  НАВИГАЦИЯ И ОБРАБОТЧИКИ
        // ============================================================
        function navigate(page, id = null) {
            state.currentPage = page;
            if (page === 'detail' && id) {
                state.selectedAuctionId = id;
            }
            renderCurrentPage();
            
            // Обновляем активную ссылку в меню
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('active');
                if (el.dataset.page === page) {
                    el.classList.add('active');
                }
            });
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCurrentPage() {
            const container = document.getElementById('main-content');
            let html = '';
            
            switch(state.currentPage) {
                case 'home':
                    html = renderHome();
                    break;
                case 'detail':
                    html = renderDetail(state.selectedAuctionId);
                    break;
                case 'wallet':
                    html = renderWallet();
                    break;
                case 'create':
                    html = renderCreate();
                    break;
                default:
                    html = renderHome();
            }
            
            container.innerHTML = html;
        }

        // Обработчики для ставок
        window.handleQuickBid = function(auctionId) {
            const input = document.getElementById(`bid-input-${auctionId}`);
            if (!input) return;
            const amount = parseFloat(input.value);
            if (!amount || isNaN(amount)) {
                showToast('Введи сумму ставки, еблан', 'error');
                return;
            }
            const success = placeBid(auctionId, amount);
            if (success) {
                input.value = '';
            }
        };

        window.handleDetailBid = function(auctionId) {
            const input = document.getElementById('detail-bid-input');
            if (!input) return;
            const amount = parseFloat(input.value);
            if (!amount || isNaN(amount)) {
                showToast('Введи сумму ставки, еблан', 'error');
                return;
            }
            const success = placeBid(auctionId, amount);
            if (success) {
                input.value = '';
                renderCurrentPage();
            }
        };

        window.handleCreateAuction = function(e) {
            e.preventDefault();
            const number = document.getElementById('create-number').value.trim();
            const price = parseFloat(document.getElementById('create-price').value);
            const hours = parseInt(document.getElementById('create-hours').value);
            
            if (!number) {
                showToast('Введи номер телефона, пидор', 'error');
                return;
            }
            if (isNaN(price) || price <= 0) {
                showToast('Цена должна быть больше 0', 'error');
                return;
            }
            if (isNaN(hours) || hours < 1) {
                showToast('Минимум 1 час', 'error');
                return;
            }
            
            createAuction(number, price, hours);
        };

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        function init() {
            initData();
            startBots();
            startTimers();
            navigate('home');
            
            // Горячие клавиши для быстрого переключения
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    navigate('home');
                }
                if (e.key === 'h' && !e.ctrlKey) {
                    navigate('home');
                }
                if (e.key === 'w' && !e.ctrlKey) {
                    navigate('wallet');
                }
            });
            
            console.log('🔥 Fragmint Live запущен!');
            console.log(`📊 Активных аукционов: ${state.auctions.filter(a => a.status === 'active').length}`);
            console.log(`👤 Пользователей: ${state.users.length}`);
            console.log('💀 Сделано с любовью и ненавистью к обществу');
        }

        // Запускаем всё, когда DOM загружен
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
